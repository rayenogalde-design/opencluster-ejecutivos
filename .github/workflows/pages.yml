name: Deploy to GitHub Pages
on:
  push:
    branches: [master]
# Una publicación a la vez: si llegan varios cambios seguidos, se encolan (no fallan).
concurrency:
  group: "pages"
  cancel-in-progress: false
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
