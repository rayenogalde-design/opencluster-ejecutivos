<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progreso — Academia OpenCluster</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --oct-navy: #001A60;
  --oct-sky: #06B3FD;
  --oct-page-bg: #FAFBFC;
  --oct-softblue: #ECF6FF;
  --oct-text: #1F2937;
  --oct-text-soft: #6B7280;
  --oct-text-mute: #9CA3AF;
  --oct-border: rgba(0,0,0,0.08);
  --oct-white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Manrope', -apple-system, system-ui, sans-serif;
  background: var(--oct-page-bg);
  color: var(--oct-text);
  font-weight: 400;
  line-height: 1.5;
  min-height: 100vh;
}
.wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 64px; }

.topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--oct-text-soft); text-decoration: none; font-size: 14px; font-weight: 500;
  padding: 8px 12px; border-radius: 8px; border: 1px solid var(--oct-border); background: var(--oct-white);
}
.back:hover { color: var(--oct-navy); }

.head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.head-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, #e3ecff, #d6f3ff);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.head-text h1 { font-size: 24px; font-weight: 800; color: var(--oct-navy); letter-spacing: -0.02em; }
.head-text p { font-size: 14px; color: var(--oct-text-soft); margin-top: 2px; }
.head-left { display: flex; gap: 14px; align-items: center; }
.btn-refresh {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--oct-navy); color: #fff; border: none; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: 14px; padding: 10px 16px; border-radius: 10px;
}
.btn-refresh:hover { background: #00134a; }

.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.toolbar label { font-size: 11px; font-weight: 800; color: var(--oct-text-mute); text-transform: uppercase; letter-spacing: 0.04em; }
.toolbar select {
  font-family: inherit; font-size: 14px; font-weight: 600; color: var(--oct-text);
  background: var(--oct-white); border: 1px solid var(--oct-border); border-radius: 10px;
  padding: 9px 12px; cursor: pointer; min-width: 240px;
}

.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi { background: var(--oct-white); border: 1px solid var(--oct-border); border-radius: 14px; padding: 18px; }
.kpi .num { font-size: 28px; font-weight: 800; color: var(--oct-navy); letter-spacing: -0.02em; }
.kpi .lbl { font-size: 12px; color: var(--oct-text-mute); font-weight: 500; margin-top: 2px; }

.card-table { background: var(--oct-white); border: 1px solid var(--oct-border); border-radius: 16px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--oct-text-mute); padding: 14px 18px; border-bottom: 1px solid var(--oct-border);
}
tbody td { padding: 16px 18px; border-bottom: 1px solid var(--oct-border); font-size: 14px; vertical-align: middle; }
tbody tr.exec-row:last-of-type td { border-bottom: none; }
tbody tr.exec-row:hover { background: #fafcff; }
.exec-row { cursor: pointer; }
.exec { font-weight: 700; color: var(--oct-text); }
.bar-wrap { display: flex; align-items: center; gap: 10px; min-width: 200px; }
.bar { flex: 1; height: 8px; background: var(--oct-softblue); border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--oct-sky), var(--oct-navy)); transition: width .4s; }
.pct { font-size: 13px; font-weight: 700; color: var(--oct-navy); min-width: 38px; text-align: right; }
.mods { color: var(--oct-text-soft); }
.last { color: var(--oct-text-mute); font-size: 13px; }
.pill {
  display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
}
.pill.done { background: #E6F8EF; color: #1B8A4F; }
.pill.prog { background: var(--oct-softblue); color: var(--oct-navy); }
.pill.none { background: #F3F4F6; color: var(--oct-text-mute); }

.chev { background: none; border: none; cursor: pointer; color: var(--oct-text-mute); padding: 0 8px 0 0; vertical-align: middle; }
.chev svg { transition: transform .2s; display: block; }
.chev.open svg { transform: rotate(90deg); }

.detail-row > td { padding: 0 18px 18px; background: #fafcff; border-bottom: 1px solid var(--oct-border); }
.detail { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding-top: 4px; }
.detail-block { background: var(--oct-white); border: 1px solid var(--oct-border); border-radius: 12px; padding: 14px 16px; }
.detail-h { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--oct-text-mute); margin-bottom: 10px; }
.detail-empty { font-size: 13px; color: var(--oct-text-mute); padding: 8px 0; }
.ans-item, .rec-item { padding: 10px 0; border-bottom: 1px solid var(--oct-border); }
.ans-item:last-child, .rec-item:last-child { border-bottom: none; }
.ans-q { font-size: 13px; font-weight: 700; color: var(--oct-text); margin-bottom: 4px; }
.ans-a { font-size: 13px; color: var(--oct-text-soft); white-space: pre-wrap; background: var(--oct-page-bg); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
.ans-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.meta-mute { color: var(--oct-text-mute); font-size: 12px; }
.rec-item audio { width: 100%; margin: 8px 0 4px; }
.rec-link { font-size: 12px; font-weight: 600; color: var(--oct-sky); text-decoration: none; }
.rec-link:hover { text-decoration: underline; }

.notice { background: #FFF4EA; border: 1px solid #FFD9B0; color: #8A5200; border-radius: 12px; padding: 16px 18px; font-size: 14px; margin-bottom: 20px; }
.muted { color: var(--oct-text-mute); font-size: 13px; text-align: center; padding: 28px; }
@media (max-width: 640px) {
  .kpis { grid-template-columns: 1fr; }
  .exec-row .last { display: none; }
  .detail { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Volver a la Central
    </a>
  </div>

  <div class="head">
    <div class="head-left">
      <div class="head-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#001A60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="head-text">
        <h1>Progreso de la Academia</h1>
        <p id="subtitulo">Avance del equipo por curso</p>
      </div>
    </div>
    <button class="btn-refresh" onclick="cargar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Actualizar
    </button>
  </div>

  <div id="noticeBox"></div>

  <div class="toolbar">
    <label for="cursoSel">Curso</label>
    <select id="cursoSel"></select>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="num" id="kpiActivos">0</div><div class="lbl">Empezaron el curso</div></div>
    <div class="kpi"><div class="num" id="kpiCompletos">0</div><div class="lbl">Lo completaron</div></div>
    <div class="kpi"><div class="num" id="kpiProm">0%</div><div class="lbl">Avance promedio del equipo</div></div>
  </div>

  <div class="card-table">
    <table>
      <thead>
        <tr><th>Ejecutivo</th><th>Avance</th><th>Módulos</th><th>Estado</th><th class="last">Último acceso</th></tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="muted">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
/* URL /exec del Web App ACADEMIA_IA_API (progreso + respuestas + grabaciones). */
var ENDPOINT = 'https://script.google.com/macros/s/AKfycbzK0XFzsT-6_ImJYugk-4BsdYXft-7Mv0PhEIuw-wdv95Ln6cd1fOUVJEmENxy21ApRHg/exec';

/* Equipo a mostrar (aunque no hayan empezado → aparecen en 0%). */
var ROSTER = ['Rayen Ogalde', 'William Marín', 'Germán Alvarado', 'Roberto Cáceres', 'Maximiliano Astudillo', 'Ximena Romero', 'Mario'];

/* Total de módulos por curso (fallback cuando aún nadie reportó avance). El
   título es la clave porque la Sheet agrupa por título, igual que el front. */
var KNOWN_COURSES = { 'Outreach por email': 9, 'Discovery telefónico': 11, 'Postventa y expansión': 11 };

var DATA = { progreso: [], respuestas: [], grabaciones: [] };
var cursoActivo = '';
var abierto = {};   // primerNombre -> bool (filas expandidas)

function norm(s) { return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim(); }
function primerNombre(s) { return norm(s).split(' ')[0]; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

function fmtFecha(iso) {
  if (!iso) return '—';
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short' }) + ' ' +
           d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
  } catch (e) { return '—'; }
}

function pill(pct) {
  if (pct >= 100) return '<span class="pill done">Completado</span>';
  if (pct > 0)   return '<span class="pill prog">En curso</span>';
  return '<span class="pill none">Sin empezar</span>';
}

/* Drive: del link /view sacamos el id y armamos una URL reproducible inline. */
function driveId(url) { var s = String(url || ''); var m = s.match(/\/d\/([^/]+)/) || s.match(/[?&]id=([^&]+)/); return m ? m[1] : ''; }
function audioSrc(url) { var id = driveId(url); return id ? ('https://drive.google.com/uc?export=download&id=' + id) : String(url || ''); }

function cursosDisponibles() {
  var set = {};
  Object.keys(KNOWN_COURSES).forEach(function (c) { set[c] = true; });
  DATA.progreso.forEach(function (r) { if (r.curso) set[r.curso] = true; });
  DATA.respuestas.forEach(function (r) { if (r.curso) set[r.curso] = true; });
  DATA.grabaciones.forEach(function (r) { if (r.curso) set[r.curso] = true; });
  return Object.keys(set);
}

function totalModulos(curso) {
  var t = 0;
  DATA.progreso.forEach(function (r) { if (r.curso === curso && Number(r.total_modulos) > t) t = Number(r.total_modulos); });
  return t || KNOWN_COURSES[curso] || 0;
}

function respuestasDe(nombre, curso) {
  var pn = primerNombre(nombre);
  return DATA.respuestas.filter(function (r) { return primerNombre(r.ejecutivo) === pn && r.curso === curso; });
}
function grabacionesDe(nombre, curso) {
  var pn = primerNombre(nombre);
  return DATA.grabaciones.filter(function (r) { return primerNombre(r.ejecutivo) === pn && r.curso === curso; });
}

function buildSelector() {
  var cursos = cursosDisponibles();
  if (!cursoActivo || cursos.indexOf(cursoActivo) < 0) cursoActivo = cursos[0] || '';
  var sel = document.getElementById('cursoSel');
  sel.innerHTML = cursos.map(function (c) {
    return '<option value="' + esc(c) + '"' + (c === cursoActivo ? ' selected' : '') + '>' + esc(c) + '</option>';
  }).join('');
  document.getElementById('subtitulo').textContent = 'Avance del equipo en: ' + (cursoActivo || '—');
}

function detalleHtml(nombre) {
  var curso = cursoActivo;
  var resp = respuestasDe(nombre, curso);
  var grab = grabacionesDe(nombre, curso);
  var html = '';

  html += '<div class="detail-block"><div class="detail-h">Respuestas (' + resp.length + ')</div>';
  if (!resp.length) {
    html += '<div class="detail-empty">Sin respuestas registradas todavía.</div>';
  } else {
    html += resp.map(function (r) {
      var pillRes = /correcto/i.test(r.resultado) ? '<span class="pill done">' + esc(r.resultado) + '</span>'
        : (/incorrecto/i.test(r.resultado) ? '<span class="pill none">' + esc(r.resultado) + '</span>'
        : '<span class="pill prog">' + esc(r.resultado || '—') + '</span>');
      return '<div class="ans-item">' +
        '<div class="ans-q">' + esc(r.pregunta || r.ejercicio_id) + '</div>' +
        '<div class="ans-a">' + esc(r.respuesta) + '</div>' +
        '<div class="ans-meta">' + pillRes + '<span class="meta-mute">' + esc(r.ejercicio_id) + ' · ' + fmtFecha(r.fecha) + '</span></div>' +
      '</div>';
    }).join('');
  }
  html += '</div>';

  html += '<div class="detail-block"><div class="detail-h">Grabaciones (' + grab.length + ')</div>';
  if (!grab.length) {
    html += '<div class="detail-empty">Sin grabaciones de voz todavía.</div>';
  } else {
    html += grab.map(function (g) {
      return '<div class="rec-item">' +
        '<div class="ans-meta"><span class="exec">' + esc(g.ejercicio_id || 'Grabación') + '</span><span class="meta-mute">' + fmtFecha(g.fecha) + '</span></div>' +
        '<audio controls preload="none" src="' + esc(audioSrc(g.url_audio)) + '"></audio>' +
        '<a class="rec-link" href="' + esc(g.url_audio) + '" target="_blank" rel="noopener">Abrir en Drive</a>' +
      '</div>';
    }).join('');
  }
  html += '</div>';
  return html;
}

function pintar() {
  var curso = cursoActivo;
  var porNombre = {};
  DATA.progreso.filter(function (r) { return r.curso === curso; }).forEach(function (r) { porNombre[primerNombre(r.ejecutivo)] = r; });
  var tot = totalModulos(curso);

  var filas = ROSTER.map(function (nombre) {
    var r = porNombre[primerNombre(nombre)] || null;
    return {
      nombre: nombre,
      pct: r ? Number(r.pct) : 0,
      comp: r ? Number(r.modulos_completados) : 0,
      tot: (r && r.total_modulos) ? Number(r.total_modulos) : tot,
      ultimo: r ? r.ultimo_acceso : ''
    };
  });
  filas.sort(function (a, b) { return b.pct - a.pct; });

  var empezaron = filas.filter(function (f) { return f.pct > 0; }).length;
  var completos = filas.filter(function (f) { return f.pct >= 100; }).length;
  var prom = filas.length ? Math.round(filas.reduce(function (s, f) { return s + f.pct; }, 0) / filas.length) : 0;
  document.getElementById('kpiActivos').textContent = empezaron;
  document.getElementById('kpiCompletos').textContent = completos;
  document.getElementById('kpiProm').textContent = prom + '%';

  document.getElementById('tbody').innerHTML = filas.map(function (f) {
    var pn = primerNombre(f.nombre);
    var isOpen = !!abierto[pn];
    var row = '<tr class="exec-row" data-n="' + esc(pn) + '">' +
      '<td class="exec"><button class="chev' + (isOpen ? ' open' : '') + '" aria-label="Ver detalle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>' + esc(f.nombre) + '</td>' +
      '<td><div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:' + f.pct + '%"></div></div><span class="pct">' + f.pct + '%</span></div></td>' +
      '<td class="mods">' + f.comp + ' / ' + f.tot + '</td>' +
      '<td>' + pill(f.pct) + '</td>' +
      '<td class="last">' + fmtFecha(f.ultimo) + '</td>' +
    '</tr>';
    var det = '<tr class="detail-row" data-n="' + esc(pn) + '"' + (isOpen ? '' : ' style="display:none"') + '><td colspan="5"><div class="detail">' + detalleHtml(f.nombre) + '</div></td></tr>';
    return row + det;
  }).join('');

  Array.prototype.forEach.call(document.querySelectorAll('.exec-row'), function (row) {
    row.addEventListener('click', function () {
      var n = row.getAttribute('data-n');
      abierto[n] = !abierto[n];
      var det = document.querySelector('.detail-row[data-n="' + n + '"]');
      var chev = row.querySelector('.chev');
      if (det) det.style.display = abierto[n] ? '' : 'none';
      if (chev) chev.classList.toggle('open', abierto[n]);
    });
  });
}

function cargar() {
  var notice = document.getElementById('noticeBox');
  notice.innerHTML = '';
  document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="muted">Cargando…</td></tr>';

  var g = function (accion) {
    return fetch(ENDPOINT + '?accion=' + accion).then(function (r) { return r.json(); }).catch(function () { return { ok: false }; });
  };

  Promise.all([g('progreso_todos'), g('respuestas_todas'), g('grabaciones_todas')]).then(function (res) {
    DATA.progreso = (res[0] && res[0].ok && res[0].progreso) || [];
    DATA.respuestas = (res[1] && res[1].ok && res[1].respuestas) || [];
    DATA.grabaciones = (res[2] && res[2].ok && res[2].grabaciones) || [];
    if (!res[0] || !res[0].ok) {
      notice.innerHTML = '<div class="notice">No se pudo cargar el progreso. Revisa que el Web App esté desplegado con acceso "Cualquier usuario".</div>';
    }
    buildSelector();
    pintar();
  });
}

/* Cambiar de curso → repinta (las filas expandidas se resetean por curso). */
document.getElementById('cursoSel').addEventListener('change', function () {
  cursoActivo = this.value;
  abierto = {};
  document.getElementById('subtitulo').textContent = 'Avance del equipo en: ' + (cursoActivo || '—');
  pintar();
});

/* Guard suave: este panel es para administración. */
(function () {
  var u = '';
  try { u = localStorage.getItem('oc_central_user') || ''; } catch (e) {}
  if (u && norm(u) !== 'rayen ogalde') {
    document.getElementById('noticeBox').innerHTML = '<div class="notice">Este panel es de administración. Estás viendo el progreso general del equipo.</div>';
  }
  cargar();
})();
</script>
</body>
</html>
