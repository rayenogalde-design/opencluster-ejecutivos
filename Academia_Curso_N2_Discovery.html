<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia OpenCluster · Discovery telefónico</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="./pipeline-integration.js" onerror="window.__ocPipelineMissing=true;"></script>
<script src="./progress-integration.js" onerror="window.__ocProgressMissing=true;"></script>
<script src="./ai-integration.js" onerror="window.__ocAIMissing=true;"></script>
<script src="./audio-integration.js" onerror="window.__ocAudioMissing=true;"></script>
<style>
/* ─────────────────────────────────────────────────────────────
   VARIABLES (DESIGN_SYSTEM de OpenCluster)
   ───────────────────────────────────────────────────────────── */
:root {
  --oct-navy:       #001A60;
  --oct-sky:        #06B3FD;
  --oct-orange:     #FF7E00;
  --oct-ltblue:     #D6EEFF;
  --oct-page-bg:    #FAFBFC;
  --oct-softblue:   #ECF6FF;
  --oct-cream:      #FFF4EA;
  --oct-text:       #1F2937;
  --oct-text-soft:  #6B7280;
  --oct-text-mute:  #9CA3AF;
  --oct-divider:    #D1D5DB;
  --oct-border:     rgba(0,0,0,0.08);
  --oct-bg:         #F9FAFB;
  --green:          #059669;
  --green-bg:       #ECFDF5;
  --green-border:   #6EE7B7;
  --red:            #DC2626;
  --red-bg:         #FEF2F2;
  --red-border:     #FCA5A5;
  --amber:          #D97706;
  --amber-bg:       #FFFBEB;
  --amber-border:   #FCD34D;
}

/* ─────────────────────────────────────────────────────────────
   RESET Y BASE
   ───────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Manrope', -apple-system, system-ui, sans-serif;
  background: var(--oct-page-bg);
  color: var(--oct-text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
}

input, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

::selection {
  background: var(--oct-ltblue);
  color: var(--oct-navy);
}

/* ─────────────────────────────────────────────────────────────
   HEADER (barra superior fija)
   ───────────────────────────────────────────────────────────── */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: white;
  border-bottom: 1px solid var(--oct-border);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--oct-navy);
}

.brand-mark {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--oct-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.02em;
}

.brand-name {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}

.brand-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--oct-text-soft);
  letter-spacing: 0.04em;
  margin-top: 2px;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--oct-divider);
}

.course-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--oct-text);
}

.course-progress-pill {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: var(--oct-softblue);
  border-radius: 999px;
  font-size: 12px;
  color: var(--oct-navy);
  font-weight: 500;
}

.progress-bar-tiny {
  width: 80px;
  height: 4px;
  background: rgba(0,26,96,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-tiny-fill {
  height: 100%;
  background: var(--oct-navy);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.exit-link {
  font-size: 12px;
  color: var(--oct-text-soft);
  font-weight: 500;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.15s;
}

.exit-link:hover { background: var(--oct-bg); }

/* ─────────────────────────────────────────────────────────────
   LAYOUT PRINCIPAL
   ───────────────────────────────────────────────────────────── */
.app-main {
  max-width: 920px;
  margin: 0 auto;
  padding: 48px 24px 120px 24px;
}

/* ─────────────────────────────────────────────────────────────
   VISTA HOME (catálogo del curso)
   ───────────────────────────────────────────────────────────── */
.home-hero {
  margin-bottom: 40px;
  animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1);
}

.home-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--oct-sky);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.home-title {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--oct-navy);
  line-height: 1.15;
  margin-bottom: 12px;
  max-width: 700px;
}

.home-lede {
  font-size: 17px;
  color: var(--oct-text-soft);
  max-width: 640px;
  line-height: 1.5;
}

.home-meta {
  display: flex;
  gap: 32px;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--oct-border);
}

.home-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.home-meta-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--oct-text-mute);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.home-meta-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--oct-navy);
  letter-spacing: -0.01em;
}

/* Lista de módulos */
.modules-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 16px;
}

.module-card {
  background: white;
  border: 1px solid var(--oct-border);
  border-radius: 12px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  text-align: left;
  width: 100%;
}

.module-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,26,96,0.08);
  border-color: rgba(0,26,96,0.16);
}

.module-card.locked {
  opacity: 0.55;
  cursor: not-allowed;
}

.module-card.locked:hover {
  transform: none;
  box-shadow: none;
  border-color: var(--oct-border);
}

.module-card.completed {
  background: linear-gradient(180deg, rgba(5,150,105,0.02), white);
  border-color: rgba(5,150,105,0.2);
}

.module-num {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--oct-softblue);
  color: var(--oct-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.01em;
  flex-shrink: 0;
  transition: all 0.2s;
}

.module-card.completed .module-num {
  background: var(--green-bg);
  color: var(--green);
}

.module-card.locked .module-num {
  background: var(--oct-bg);
  color: var(--oct-text-mute);
}

.module-body {
  flex: 1;
  min-width: 0;
}

.module-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--oct-navy);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

.module-desc {
  font-size: 13px;
  color: var(--oct-text-soft);
  line-height: 1.5;
}

.module-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.module-time {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--oct-text-mute);
  font-weight: 500;
  letter-spacing: 0.04em;
}

.module-screens {
  font-size: 11px;
  color: var(--oct-text-mute);
  font-weight: 500;
  letter-spacing: 0.04em;
}

.module-status {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--oct-text-mute);
  text-transform: uppercase;
}

.module-status.in-progress {
  color: var(--oct-sky);
}

.module-status.completed {
  color: var(--green);
}

.module-arrow {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--oct-text-mute);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.module-card:hover .module-arrow {
  transform: translateX(2px);
  color: var(--oct-navy);
}

/* ─────────────────────────────────────────────────────────────
   VISTA MÓDULO (pantallas del módulo activo)
   ───────────────────────────────────────────────────────────── */
.module-header {
  margin-bottom: 28px;
  animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1);
}

.module-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--oct-text-soft);
  padding: 6px 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  margin-left: -12px;
  transition: background 0.15s;
}

.module-back:hover { background: var(--oct-bg); color: var(--oct-navy); }

.module-step-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--oct-sky);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.module-step-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--oct-navy);
  line-height: 1.2;
}

/* Barra de progreso del módulo (puntos por pantalla) */
.module-progress-dots {
  display: flex;
  gap: 4px;
  margin-top: 20px;
}

.dot {
  height: 3px;
  background: var(--oct-divider);
  border-radius: 2px;
  flex: 1;
  transition: background 0.3s;
}

.dot.completed { background: var(--oct-sky); }
.dot.active { background: var(--oct-navy); }

/* Card de contenido */
.screen-card {
  background: white;
  border: 1px solid var(--oct-border);
  border-radius: 16px;
  padding: 36px 40px;
  animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1);
  /* Blindaje: evita que extensiones, reader mode o print preview reformateen el contenido en columnas */
  column-count: 1 !important;
  column-width: auto !important;
  columns: auto !important;
}

.screen-card h2 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--oct-navy);
  line-height: 1.25;
  margin-bottom: 16px;
}

.screen-card p {
  font-size: 15px;
  color: var(--oct-text);
  line-height: 1.65;
  margin-bottom: 16px;
}

.screen-card p:last-child { margin-bottom: 0; }

.screen-card p strong {
  color: var(--oct-navy);
  font-weight: 700;
}

.screen-card ul, .screen-card ol {
  margin: 4px 0 20px 24px;
  padding: 0;
}

.screen-card li {
  font-size: 15px;
  color: var(--oct-text);
  line-height: 1.6;
  margin-bottom: 10px;
}

.screen-card li:last-child { margin-bottom: 0; }

/* Callouts (cuadros de dato destacado) */
.callout {
  border-radius: 12px;
  padding: 20px 24px;
  margin: 20px 0;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.callout-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 800;
  font-size: 13px;
}

.callout-body {
  flex: 1;
}

.callout-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.callout-text {
  font-size: 14px;
  line-height: 1.55;
}

.callout-text strong {
  font-weight: 700;
}

.callout.data {
  background: var(--oct-softblue);
}

.callout.data .callout-icon {
  background: var(--oct-sky);
  color: white;
}

.callout.data .callout-label { color: var(--oct-sky); }
.callout.data .callout-text { color: var(--oct-text); }
.callout.data .callout-text strong { color: var(--oct-navy); }

.callout.rule {
  background: var(--oct-cream);
}

.callout.rule .callout-icon {
  background: var(--oct-orange);
  color: white;
}

.callout.rule .callout-label { color: var(--oct-orange); }
.callout.rule .callout-text strong { color: var(--oct-navy); }

.callout.warning {
  background: var(--red-bg);
}

.callout.warning .callout-icon {
  background: var(--red);
  color: white;
}

.callout.warning .callout-label { color: var(--red); }
.callout.warning .callout-text strong { color: var(--red); }

/* Tablas dentro de lessons */
.lesson-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 20px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--oct-border);
}

.lesson-table th {
  background: var(--oct-navy);
  color: white;
  font-size: 12px;
  font-weight: 700;
  text-align: left;
  padding: 12px 16px;
  letter-spacing: 0.02em;
}

.lesson-table td {
  padding: 12px 16px;
  font-size: 13px;
  border-top: 1px solid var(--oct-border);
  color: var(--oct-text);
  vertical-align: top;
  line-height: 1.5;
}

.lesson-table tr:nth-child(even) td { background: #FAFBFC; }

/* Ejemplo de email dentro de lección */
.email-example {
  background: #FCFCFD;
  border: 1px solid var(--oct-border);
  border-left: 4px solid var(--oct-divider);
  border-radius: 8px;
  padding: 18px 22px;
  margin: 18px 0;
  font-size: 13.5px;
  line-height: 1.6;
}

.email-example.good { border-left-color: var(--green); background: var(--green-bg); }
.email-example.bad { border-left-color: var(--red); background: var(--red-bg); }

.email-example-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.email-example.good .email-example-tag { background: var(--green); color: white; }
.email-example.bad .email-example-tag { background: var(--red); color: white; }

.email-example-subject {
  font-size: 12px;
  color: var(--oct-text-soft);
  margin-bottom: 8px;
}

.email-example-subject strong { color: var(--oct-text); font-weight: 700; }

.email-example-body {
  font-size: 13.5px;
  color: var(--oct-text);
  white-space: pre-line;
  line-height: 1.6;
}

/* Glosario - tabla expandible */
.glossary {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--oct-border);
  border-radius: 12px;
  overflow: hidden;
  margin: 16px 0;
  border: 1px solid var(--oct-border);
}

.glossary-row {
  display: grid;
  grid-template-columns: 180px 1fr;
  background: white;
  padding: 14px 18px;
  gap: 16px;
  align-items: start;
}

.glossary-term {
  font-size: 13px;
  font-weight: 700;
  color: var(--oct-navy);
}

.glossary-def {
  font-size: 13.5px;
  color: var(--oct-text);
  line-height: 1.55;
}

.glossary-def em {
  color: var(--oct-text-soft);
  font-style: normal;
  font-size: 12px;
  display: block;
  margin-top: 4px;
}

/* ─────────────────────────────────────────────────────────────
   EJERCICIOS
   ───────────────────────────────────────────────────────────── */
.exercise-intro {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--oct-orange);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.exercise-intro::before {
  content: "";
  width: 4px;
  height: 16px;
  background: var(--oct-orange);
  border-radius: 2px;
}

.question {
  font-size: 19px;
  font-weight: 700;
  color: var(--oct-navy);
  letter-spacing: -0.01em;
  line-height: 1.35;
  margin-bottom: 6px;
}

.question-hint {
  font-size: 13px;
  color: var(--oct-text-soft);
  margin-bottom: 24px;
}

/* Opciones de quiz */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  background: white;
  border: 1.5px solid var(--oct-border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  font-size: 14px;
  line-height: 1.5;
  color: var(--oct-text);
}

.option:hover:not(.disabled) {
  border-color: var(--oct-sky);
  background: var(--oct-softblue);
}

.option.selected {
  border-color: var(--oct-navy);
  background: var(--oct-softblue);
}

.option.correct {
  border-color: var(--green);
  background: var(--green-bg);
}

.option.incorrect {
  border-color: var(--red);
  background: var(--red-bg);
}

.option.disabled { cursor: default; }

.option-marker {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--oct-divider);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  margin-top: 1px;
}

.option-marker.square {
  border-radius: 5px;
}

.option.selected .option-marker {
  border-color: var(--oct-navy);
  background: var(--oct-navy);
}

.option.correct .option-marker {
  border-color: var(--green);
  background: var(--green);
}

.option.incorrect .option-marker {
  border-color: var(--red);
  background: var(--red);
}

.option-marker svg {
  width: 14px;
  height: 14px;
  color: white;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.15s;
}

.option.selected .option-marker svg,
.option.correct .option-marker svg,
.option.incorrect .option-marker svg {
  opacity: 1;
  transform: scale(1);
}

.option-text {
  flex: 1;
  padding-top: 1px;
}

.option-text em {
  color: var(--oct-text-soft);
  font-style: normal;
  font-size: 12px;
  display: block;
  margin-top: 2px;
}

/* Feedback */
.feedback {
  border-radius: 12px;
  padding: 18px 22px;
  margin-top: 20px;
  animation: fadeUp 0.3s cubic-bezier(0.4,0,0.2,1);
}

.feedback.correct {
  background: var(--green-bg);
  border: 1px solid var(--green-border);
}

.feedback.incorrect {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
}

.feedback.partial {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
}

.feedback-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.feedback.correct .feedback-title { color: var(--green); }
.feedback.incorrect .feedback-title { color: var(--red); }
.feedback.partial .feedback-title { color: var(--amber); }

.feedback-body {
  font-size: 14px;
  color: var(--oct-text);
  line-height: 1.55;
}

.feedback-body strong { color: var(--oct-navy); font-weight: 700; }

/* Ejercicio de escritura (asunto, correo) */
.write-input {
  width: 100%;
  background: white;
  border: 1.5px solid var(--oct-border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 15px;
  color: var(--oct-text);
  transition: border-color 0.15s;
  margin-bottom: 8px;
  font-family: inherit;
}

.write-input:focus {
  outline: none;
  border-color: var(--oct-navy);
}

.write-textarea {
  width: 100%;
  background: white;
  border: 1.5px solid var(--oct-border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--oct-text);
  min-height: 180px;
  resize: vertical;
  font-family: inherit;
  line-height: 1.55;
  transition: border-color 0.15s;
}

.write-textarea:focus {
  outline: none;
  border-color: var(--oct-navy);
}

.write-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--oct-text-mute);
  margin-bottom: 16px;
  letter-spacing: 0.04em;
}

/* ═════════════════════════════════════════════════════════════
   SISTEMA DE CONTACTOS DEL PIPELINE
   ─────────────────────────────────────────────────────────────
   Integración con el CRM existente vía window.OpenClusterPipeline.
   Claude Code conecta el CRM_API (solo lectura) implementando:

     window.OpenClusterPipeline = {
       fetchContacts: async () => [ {institucion, nombre, cargo,
         ciudad, etapa, etiquetas, productoSugerido, nota}, ... ]
     }

   NUNCA se exponen email ni teléfono. Si la integración no existe
   o el pipeline está vacío, el ejercicio usa el caso de ejemplo
   (modo laboratorio).
   ═════════════════════════════════════════════════════════════ */

// Caso de ejemplo (fallback / empty state / modo laboratorio)
const FALLBACK_CONTACT = {
  id: 'demo-antares',
  esDemo: true,
  institucion: 'Colegio Antares',
  nombre: 'Marcela Soto',
  cargo: 'Coordinadora del Programa PIE',
  ciudad: 'Maipú, Santiago',
  etapa: 'Prospecto',
  etiquetas: ['PIE 2026', 'perfiles TEA y TDAH', 'aula sensorial nueva'],
  productoSugerido: 'TD Snap · software de comunicación aumentativa',
  notaContexto: 'Programa PIE recién iniciado en 2026. Inauguraron el aula sensorial el mes pasado (visto en Instagram). La coordinadora lleva 8 meses en el cargo (visto en LinkedIn). Colegio particular subvencionado con financiamiento SEP.'
};

// Etapas consideradas "frías": aptas para practicar una primera llamada de discovery.
const COLD_STAGES = ['prospecto', 'nuevo', 'sin contactar', 'por contactar', 'lead', 'frío', 'frio', 'identificado'];

// Palabras genéricas que NO sirven para detectar mención de la institución.
const GENERIC_INST_WORDS = ['colegio','clinica','clínica','hogar','centro','mutual','ortopedia','escuela','jardin','jardín','residencia','fundacion','fundación','instituto','liceo','hospital','de','del','la','el','los','las','y','san','santa','santo'];

function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// Extrae las palabras distintivas del nombre de una institución.
function institutionKeywords(institucion) {
  if (!institucion) return [];
  return institucion.split(/\s+/).filter(w => w.length > 2 && !GENERIC_INST_WORDS.includes(w.toLowerCase().replace(/[.,]/g,'')));
}

// Normaliza un contacto del CRM a la forma segura (descarta email/teléfono).
function normalizeContact(c) {
  if (!c) return null;
  const institucion = c.institucion || c.institution || c.empresa || c.nombreInstitucion || c.razonSocial || '';
  if (!institucion) return null;
  return {
    id: c.id || ('c-' + institucion.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'')),
    esDemo: false,
    institucion: institucion,
    nombre: c.nombre || c.nombreContacto || c.contacto || '',
    cargo: c.cargo || c.rol || c.puesto || '',
    ciudad: c.ciudad || c.comuna || c.ubicacion || '',
    etapa: c.etapa || c.estado || c.stage || '',
    etiquetas: Array.isArray(c.etiquetas) ? c.etiquetas : (Array.isArray(c.tags) ? c.tags : []),
    productoSugerido: c.productoSugerido || c.producto || (Array.isArray(c.etiquetas) && c.etiquetas.length ? c.etiquetas[0] : ''),
    notaContexto: c.nota || c.notaContexto || c.notas || ''
  };
}

// Carga los contactos del pipeline del ejecutivo (async, solo lectura).
async function loadPipelineContacts() {
  try {
    if (window.OpenClusterPipeline && typeof window.OpenClusterPipeline.fetchContacts === 'function') {
      const raw = await window.OpenClusterPipeline.fetchContacts();
      if (Array.isArray(raw) && raw.length) {
        const safe = raw.map(normalizeContact).filter(Boolean);
        if (safe.length) return safe;
      }
    }
  } catch (e) { /* si la integración falla, caemos al modo laboratorio */ }
  return [FALLBACK_CONTACT];
}

// Smart default: primer contacto en etapa fría, o el primero disponible.
function pickSmartDefault(contacts) {
  if (!contacts || !contacts.length) return null;
  const cold = contacts.find(c => {
    const e = (c.etapa || '').toLowerCase().trim();
    return COLD_STAGES.some(s => e.includes(s));
  });
  return cold || contacts[0];
}

function getActiveContact() {
  if (!state.availableContacts) return null;
  return state.availableContacts.find(c => c.id === state.activeContactId) || state.availableContacts[0] || null;
}

// Dispara la carga del pipeline una sola vez; re-renderiza al terminar.
function ensureContactsLoaded() {
  if (state.contactsLoaded || state._loadingContacts) return;
  state._loadingContacts = true;
  loadPipelineContacts().then(contacts => {
    state.availableContacts = contacts;
    state.contactsLoaded = true;
    state._loadingContacts = false;
    if (!state.activeContactId || !contacts.find(c => c.id === state.activeContactId)) {
      const def = pickSmartDefault(contacts);
      state.activeContactId = def ? def.id : null;
    }
    if (state.view === 'screen') render();
  });
}

function selectContact(id) {
  state.activeContactId = id;
  saveState();
  render();
}

function copyEmailToClipboard() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.text) return;
  const btn = document.getElementById('copyEmailBtn');
  const done = () => { if (btn) { const o = btn.innerHTML; btn.innerHTML = 'Copiado ✓'; setTimeout(() => { btn.innerHTML = o; }, 1800); } };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(sel.text).then(done).catch(() => {
      const ta = document.getElementById('practiceEmail'); if (ta) { ta.select(); document.execCommand('copy'); done(); }
    });
  } else {
    const ta = document.getElementById('practiceEmail'); if (ta) { ta.select(); document.execCommand('copy'); done(); }
  }
}


/* ═════════════════════════════════════════════════════════════
   HELPERS DE IA — patrón compartido entre M2/M4/M5/M6/M7/Mvoz
   ─────────────────────────────────────────────────────────────
   Diseño:
   - La IA es coaching cualitativo, NO gatekeeper. Las validaciones
     regex siguen como mínimo estructural; la IA da feedback profundo.
   - Cualquier llamada que falle (null) muestra fallback útil, nunca
     rompe el ejercicio.
   - El curso NUNCA muestra opiniones de la IA sobre voz/tono/energía
     (regla dura). El renderer filtra esos campos por si la IA se desvía.
   ═════════════════════════════════════════════════════════════ */

const AI_FORBIDDEN_TERMS = /\b(tu energ[ií]a|tu tono emocional|tu emoci[óo]n|tu sonrisa|sonr[íi]e (m[áa]s|menos)|m[áa]s c[áa]lid[oa]|m[áa]s asertiv[oa]|tu prosodia|tu entonaci[óo]n|tu intensidad|m[áa]s expresiv[oa])\b/gi;

function aiFilterTextDeOpinionDeVoz(t) {
  if (!t || typeof t !== 'string') return t || '';
  return t.replace(AI_FORBIDDEN_TERMS, '').replace(/\s{2,}/g, ' ').trim();
}

function aiFilterArrayDeOpinionDeVoz(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(aiFilterTextDeOpinionDeVoz).filter(t => t && t.trim().length > 0);
}

function aiFilterResultado(r) {
  if (!r) return r;
  return {
    feedback: aiFilterTextDeOpinionDeVoz(r.feedback || ''),
    puntos_fuertes: aiFilterArrayDeOpinionDeVoz(r.puntos_fuertes || []),
    puntos_a_mejorar: aiFilterArrayDeOpinionDeVoz(r.puntos_a_mejorar || []),
    sugerencias: aiFilterArrayDeOpinionDeVoz(r.sugerencias || []),
    reescritura: aiFilterTextDeOpinionDeVoz(r.reescritura || '')
  };
}

function aiRenderLoader(texto, hint) {
  return `<div class="ai-loader">
    <div class="ai-loader-spinner"></div>
    <div class="ai-loader-text">
      <strong>${texto}</strong>
      ${hint ? `<div class="ai-loader-hint">${hint}</div>` : ''}
    </div>
  </div>`;
}

function aiRenderError(msg, onReintentar) {
  return `<div class="ai-error">
    <div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">!</div>
    <div style="flex:1;">
      <strong>${msg}</strong>
      <div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">Tu trabajo no se perdió. Puedes reintentar o seguir adelante con tu propia revisión.</div>
      ${onReintentar ? `<button class="btn-ai-ghost" style="margin-top:8px;" onclick="${onReintentar}">Reintentar</button>` : ''}
    </div>
  </div>`;
}

function aiRenderFeedback(r) {
  if (!r) return '';
  const r2 = aiFilterResultado(r);
  let html = '<div class="ai-feedback">';
  if (r2.feedback) {
    html += `<div class="ai-feedback-summary">
      <div class="ai-feedback-summary-label">Lectura general</div>
      <div class="ai-feedback-summary-text">${r2.feedback}</div>
    </div>`;
  }
  if (r2.puntos_fuertes.length) {
    html += `<div class="ai-feedback-block good">
      <div class="ai-feedback-block-title"><span class="ai-feedback-block-title-dot"></span>Lo que está bien</div>
      <ul>${r2.puntos_fuertes.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`;
  }
  if (r2.puntos_a_mejorar.length) {
    html += `<div class="ai-feedback-block warn">
      <div class="ai-feedback-block-title"><span class="ai-feedback-block-title-dot"></span>A mejorar</div>
      <ul>${r2.puntos_a_mejorar.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`;
  }
  if (r2.sugerencias.length) {
    html += `<div class="ai-feedback-block tip">
      <div class="ai-feedback-block-title"><span class="ai-feedback-block-title-dot"></span>Sugerencias accionables</div>
      <ul>${r2.sugerencias.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`;
  }
  if (r2.reescritura && r2.reescritura.trim()) {
    html += `<div class="ai-feedback-reescritura">
      <div class="ai-feedback-reescritura-label">Reescritura sugerida</div>
      <div class="ai-feedback-reescritura-text">${r2.reescritura}</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

/* Llamada wrapper para evaluate con render automático y manejo de estado */
const AI_STATE = {
  busy: {},          // key -> bool, evita doble click durante una llamada
  cooldownUntil: {}, // key -> timestamp ms hasta cuándo el botón Reintentar queda bloqueado
  cooldownTimers: {} // key -> interval id (para refrescar el contador visible)
};

const AI_COOLDOWN_MS = 5000;
const AI_STRIKE_LIMIT = 3;
const AI_TIMEOUT_MS = 30000; // si la IA no responde en 30s, se trata como fallo (evita loader infinito)

/* Envuelve cualquier promesa de IA contra un timeout. Si la promesa nunca
   resuelve (se cuelga), igual devuelve null y cae en el path de error/strike/cooldown.
   NUNCA deja el loader girando para siempre. */
function aiConTimeout(promesa, ms) {
  ms = ms || AI_TIMEOUT_MS;
  return Promise.race([
    Promise.resolve(promesa).catch(() => null),
    new Promise((resolve) => setTimeout(() => resolve(null), ms))
  ]);
}

function aiIsModuleInReplay() {
  // Replay = el ejecutivo ya completó este módulo antes y volvió a entrar a repasar.
  // En replay el feedback IA es opcional.
  return state.completedModules instanceof Set ? state.completedModules.has(state.moduleIdx) : false;
}

function aiStartCooldown(key) {
  AI_STATE.cooldownUntil[key] = Date.now() + AI_COOLDOWN_MS;
  if (AI_STATE.cooldownTimers[key]) clearInterval(AI_STATE.cooldownTimers[key]);
  AI_STATE.cooldownTimers[key] = setInterval(() => {
    if (Date.now() >= AI_STATE.cooldownUntil[key]) {
      clearInterval(AI_STATE.cooldownTimers[key]);
      delete AI_STATE.cooldownTimers[key];
      delete AI_STATE.cooldownUntil[key];
      render();
    } else {
      // refresca solo el botón de cooldown sin re-renderizar todo
      const btn = document.getElementById('aiRetryBtn-' + key);
      if (btn) {
        const restante = Math.ceil((AI_STATE.cooldownUntil[key] - Date.now()) / 1000);
        btn.innerHTML = `Reintentar en ${restante}…`;
      }
    }
  }, 250);
}

function aiCooldownRemaining(key) {
  const until = AI_STATE.cooldownUntil[key];
  if (!until) return 0;
  const left = until - Date.now();
  return left > 0 ? Math.ceil(left / 1000) : 0;
}

async function aiPedirFeedback(ejercicioId, textoUsuario, loaderTexto, loaderHint) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  if (AI_STATE.busy[key]) return;
  if (aiCooldownRemaining(key) > 0) return; // bloqueado por cooldown

  state.selections[key] = state.selections[key] || {};
  const sel = state.selections[key];
  sel.aiFailCount = sel.aiFailCount || 0;

  if (window.__ocAIMissing || !window.OpenClusterAI || typeof window.OpenClusterAI.evaluate !== 'function') {
    sel.aiResult = 'unavailable';
    saveState();
    render();
    return;
  }

  AI_STATE.busy[key] = true;
  sel.aiLoading = { texto: loaderTexto, hint: loaderHint };
  render();

  const contexto = getActiveContact ? getActiveContact() : null;
  let resultado = null;
  try {
    resultado = await aiConTimeout(window.OpenClusterAI.evaluate({
      ejercicioId: ejercicioId,
      texto: textoUsuario,
      contexto: contexto
    }));
  } catch (e) { resultado = null; }

  AI_STATE.busy[key] = false;
  sel.aiLoading = null;

  if (resultado) {
    sel.aiResult = resultado;
    sel.aiFailCount = 0; // reset al éxito
  } else {
    sel.aiResult = 'error';
    sel.aiFailCount += 1;
    aiStartCooldown(key);
  }
  saveState();
  render();
}

function aiResetFeedback() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  if (state.selections[key]) {
    state.selections[key].aiResult = null;
    state.selections[key].aiLoading = null;
    // NOTA: no resetea aiAccepted ni aiFailCount — son trazas persistentes.
    saveState();
    render();
  }
}

function aiAceptarFeedback() {
  // El ejecutivo confirma "Entendido, avanzar" — esto es el gate de avance.
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  if (!state.selections[key] || !state.selections[key].aiResult) return;
  state.selections[key].aiAccepted = true;
  saveState();
  render();
}

function aiSaltarPorStrikes() {
  // Salvaguarda: solo se activa si aiFailCount >= AI_STRIKE_LIMIT.
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || (sel.aiFailCount || 0) < AI_STRIKE_LIMIT) return;
  sel.aiSkippedByStrikes = true;
  saveState();
  render();
}

/* Render del bloque IA después del feedback estructural (Pattern A) */
function aiRenderBloqueParaPracticeEmail(ejercicioId, textoUsuario, opciones) {
  opciones = opciones || {};
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || {};
  const loaderTexto = opciones.loaderTexto || 'La IA está leyendo tu respuesta…';
  const loaderHint = opciones.loaderHint || 'Esto puede tardar entre 5 y 10 segundos. Es feedback cualitativo, no una nota.';
  const btnTexto = opciones.btnTexto || 'Pedir feedback de la IA';
  const reintentoMsg = opciones.reintentoMsg || 'La IA no respondió esta vez.';

  if (sel.aiLoading) {
    return aiRenderLoader(sel.aiLoading.texto, sel.aiLoading.hint);
  }

  if (sel.aiResult === 'unavailable') {
    return `<div class="ai-error">
      <div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--oct-text-mute); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">i</div>
      <div style="flex:1;"><strong>Coaching de IA no disponible en este entorno</strong><div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">El servicio de IA no está cargado. Puedes avanzar de todas formas.</div></div>
    </div>`;
  }

  const inReplay = aiIsModuleInReplay();

  if (sel.aiResult === 'error') {
    return aiRenderErrorObligatorio(key, ejercicioId, loaderTexto, loaderHint, sel.aiFailCount || 0, reintentoMsg);
  }

  if (sel.aiResult && typeof sel.aiResult === 'object') {
    if (sel.aiAccepted || inReplay) {
      // Ya aceptado (o en replay) — solo muestra el feedback con opción de pedir otra lectura
      return aiRenderFeedback(sel.aiResult) +
        `<div class="ai-actions">
          <button class="btn-ai-ghost" onclick="aiResetFeedback()">Pedir otra lectura</button>
          ${inReplay && !sel.aiAccepted ? '<span style="font-size:11.5px; color:var(--oct-text-mute); align-self:center;">Modo repaso — feedback opcional.</span>' : ''}
        </div>`;
    }
    // Feedback recibido pero no aceptado todavía → gate explícito
    return aiRenderFeedback(sel.aiResult) +
      `<div class="ai-actions" style="margin-top:14px;">
        <button class="btn-ai-primary" onclick="aiAceptarFeedback()">Entendido, avanzar</button>
        <button class="btn-ai-ghost" onclick="aiResetFeedback()">Pedir otra lectura</button>
      </div>
      <div style="font-size:11.5px; color:var(--oct-text-mute); margin-top:6px;">Lee el feedback y pulsa "Entendido, avanzar" para habilitar el botón de continuar.</div>`;
  }

  // Estado inicial: aún no pedió feedback
  const obligatorio = !inReplay;
  return `<div class="ai-actions" style="margin-top:8px;">
    <button class="btn-ai-secondary" onclick="aiPedirFeedback('${ejercicioId}', getPracticeText(), ${JSON.stringify(loaderTexto)}, ${JSON.stringify(loaderHint)})">${btnTexto}</button>
    <span style="font-size:11.5px; color:var(--oct-text-mute); align-self:center;">${obligatorio ? 'Obligatorio para avanzar.' : 'Modo repaso — opcional.'}</span>
  </div>`;
}

/* Render del error con contador de strikes + cooldown + salvaguarda al 3er fallo */
function aiRenderErrorObligatorio(key, ejercicioId, loaderTexto, loaderHint, failCount, customMsg) {
  const cooldown = aiCooldownRemaining(key);
  const reachedLimit = failCount >= AI_STRIKE_LIMIT;
  const retryCall = `aiPedirFeedback('${ejercicioId}', getPracticeText(), ${JSON.stringify(loaderTexto)}, ${JSON.stringify(loaderHint)})`;
  let inner = `<div class="ai-error">
    <div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">!</div>
    <div style="flex:1;">
      <strong>${reachedLimit ? 'No se pudo conectar a la IA tras 3 intentos.' : (customMsg || 'La IA no respondió esta vez.')}</strong>
      <div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">${reachedLimit ? 'Avanza por ahora; te recomendamos volver a hacer este ejercicio cuando el servicio esté disponible.' : 'Tu trabajo no se perdió. Intenta de nuevo en unos segundos.'}</div>
      <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <button id="aiRetryBtn-${key}" class="btn-ai-secondary" ${cooldown > 0 ? 'disabled' : ''} onclick="${retryCall}">${cooldown > 0 ? 'Reintentar en ' + cooldown + '…' : 'Reintentar'}</button>
        ${reachedLimit ? `<button class="btn-ai-ghost" onclick="aiSaltarPorStrikes()">Saltar (no se pudo conectar a la IA)</button>` : ''}
        <span style="font-size:11.5px; color:var(--oct-text-mute);">Intentos fallidos: ${failCount} / ${AI_STRIKE_LIMIT}</span>
      </div>
    </div>
  </div>`;
  return inner;
}

/* Helper para que aiPedirFeedback recupere el texto sin volver a inyectarlo */
function getPracticeText() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || {};
  return sel.text || '';
}

const state = {
  view: 'home',
  availableContacts: null,
  activeContactId: null,
  contactsLoaded: false,
  _loadingContacts: false,
  moduleIdx: null,
  screenIdx: 0,
  completedModules: new Set(),
  selections: {}
};

const STORAGE_KEY = 'opencluster_academy_discovery';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedModules: Array.from(state.completedModules),
      selections: state.selections,
      activeContactId: state.activeContactId
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.completedModules = new Set(data.completedModules || []);
    state.selections = data.selections || {};
    state.activeContactId = data.activeContactId || null;
  } catch(e) {}
}

function resetCourse() {
  if (!confirm('¿Reiniciar el curso? Vas a perder el progreso guardado.')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state.view = 'home';
  state.moduleIdx = null;
  state.screenIdx = 0;
  state.completedModules = new Set();
  state.selections = {};
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER PRINCIPAL
   ═════════════════════════════════════════════════════════════ */
function render() {
  const main = document.getElementById('mainContent');
  const footer = document.getElementById('footerNav');
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');

  updateGlobalProgress();
  btnBack.classList.remove('hidden');
  btnNext.classList.remove('hidden');

  if (state.view === 'home') {
    main.innerHTML = renderHome();
    footer.classList.add('hidden');
  } else if (state.view === 'module') {
    const mod = COURSE.modules[state.moduleIdx];

    if (state.screenIdx >= mod.screens.length) {
      main.innerHTML = renderModuleComplete(mod);
      footer.classList.remove('hidden');
      btnBack.onclick = goHome;
      btnBack.innerHTML = '← Volver al curso';
      btnBack.disabled = false;
      const nextMod = COURSE.modules[state.moduleIdx + 1];
      if (nextMod) {
        btnNext.innerHTML = 'Empezar siguiente módulo →';
        btnNext.onclick = () => openModule(state.moduleIdx + 1);
      } else {
        btnNext.innerHTML = 'Finalizar curso →';
        btnNext.onclick = () => { state.view = 'finish'; render(); };
      }
      btnNext.disabled = false;
    } else {
      const screen = mod.screens[state.screenIdx];
      main.innerHTML = renderScreen(mod, screen);
      footer.classList.remove('hidden');
      updateFooterNav(mod, screen);
    }
  } else if (state.view === 'finish') {
    main.innerHTML = renderCourseComplete();
    footer.classList.remove('hidden');
    btnBack.onclick = goHome;
    btnBack.innerHTML = '← Volver al inicio';
    btnBack.disabled = false;
    btnNext.classList.add('hidden');
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═════════════════════════════════════════════════════════════
   RENDER VISTA HOME
   ═════════════════════════════════════════════════════════════ */
// Desbloqueo de revisión para la jefatura (Rayen): puede entrar a cualquier
// módulo sin completar los anteriores, para revisar el contenido. Solo aplica
// a su usuario (oc_central_user contiene "rayen"); el resto del equipo avanza
// en orden normal.
function esUsuarioRevisor() {
  try {
    var u = (localStorage.getItem('oc_central_user') || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    return u.indexOf('rayen') >= 0;
  } catch (e) { return false; }
}

function renderHome() {
  const completed = state.completedModules.size;
  const total = COURSE.modules.length;
  const isComplete = completed === total;
  const revisorUnlock = esUsuarioRevisor();

  const modulesHtml = COURSE.modules.map((mod, idx) => {
    const isCompleted = state.completedModules.has(idx);
    const prevCompleted = idx === 0 || state.completedModules.has(idx - 1) || revisorUnlock;
    const isLocked = !prevCompleted && !isCompleted;
    const classes = ['module-card'];
    if (isCompleted) classes.push('completed');
    if (isLocked) classes.push('locked');

    const status = isCompleted
      ? '<div class="module-status completed">Completado</div>'
      : (prevCompleted && !isLocked ? '<div class="module-status in-progress">Disponible</div>' : '<div class="module-status">Bloqueado</div>');

    const onClick = isLocked ? '' : `onclick="openModule(${idx})"`;

    return `
      <button class="${classes.join(' ')}" ${onClick}>
        <div class="module-num">${idx + 1}</div>
        <div class="module-body">
          <div class="module-title">${mod.title}</div>
          <div class="module-desc">${mod.desc}</div>
          <div class="module-meta">
            <span class="module-time">⏱  ${mod.time}</span>
            <span class="module-screens">${mod.screens.length} pantallas</span>
          </div>
        </div>
        ${status}
        <div class="module-arrow">→</div>
      </button>
    `;
  }).join('');

  return `
    <div class="home-hero">
      <a href="./Academia_OpenCluster.html" style="display:inline-flex; align-items:center; gap:6px; margin-bottom:16px; color:var(--oct-navy); text-decoration:none; font-size:13px; font-weight:600;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>Volver a la Academia</a>
      <div class="home-eyebrow">Curso · Comunicación comercial</div>
      <h1 class="home-title">Discovery telefónico: la conversación que define el negocio</h1>
      <p class="home-lede">Aprende a conducir el primer llamado a una institución para que se convierta en una reunión real. Basado en investigación de Gong (519.000 llamadas), Neil Rackham (35.000 llamadas analizadas), HubSpot y Chorus.</p>
      <div class="home-meta">
        <div class="home-meta-item">
          <div class="home-meta-label">Módulos</div>
          <div class="home-meta-value">${total}</div>
        </div>
        <div class="home-meta-item">
          <div class="home-meta-label">Duración total</div>
          <div class="home-meta-value">~60 min</div>
        </div>
        <div class="home-meta-item">
          <div class="home-meta-label">Tu progreso</div>
          <div class="home-meta-value">${completed} / ${total}</div>
        </div>
        ${isComplete ? '<div class="home-meta-item"><div class="home-meta-label">Estado</div><div class="home-meta-value" style="color: var(--green);">Completado ✓</div></div>' : ''}
      </div>
    </div>
    <div class="modules-list">${modulesHtml}</div>
  `;
}

/* ═════════════════════════════════════════════════════════════
   RENDER PANTALLA DE MÓDULO
   ═════════════════════════════════════════════════════════════ */
function renderScreen(mod, screen) {
  const dotsHtml = mod.screens.map((_, idx) => {
    let cls = 'dot';
    if (idx < state.screenIdx) cls += ' completed';
    else if (idx === state.screenIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const header = `
    <div class="module-header">
      <button class="module-back" onclick="goHome()">← Volver al curso</button>
      <div class="module-step-label">${screen.stepLabel} · ${mod.title}</div>
      <div class="module-step-title">${screen.stepTitle}</div>
      <div class="module-progress-dots">${dotsHtml}</div>
    </div>
  `;

  let cardContent = '';

  if (screen.type === 'lesson') {
    cardContent = screen.body;
  } else if (screen.type === 'glossary') {
    const rows = screen.terms.map(t => `
      <div class="glossary-row">
        <div class="glossary-term">${t.term}</div>
        <div class="glossary-def">${t.def}${t.example ? `<em>${t.example}</em>` : ''}</div>
      </div>
    `).join('');
    cardContent = `<p>${screen.intro}</p><div class="glossary">${rows}</div>`;
  } else if (screen.type === 'quiz_single' || screen.type === 'quiz_multi') {
    cardContent = renderQuiz(mod, screen);
  } else if (screen.type === 'practice_subject') {
    cardContent = renderPracticeSubject(mod, screen);
  } else if (screen.type === 'practice_email') {
    cardContent = renderPracticeEmail(mod, screen);
  } else if (screen.type === 'practice_roleplay_chat') {
    cardContent = renderPracticeRoleplayChat(mod, screen);
  } else if (screen.type === 'practice_roleplay_voz') {
    cardContent = renderPracticeRoleplayVoz(mod, screen);
  } else if (screen.type === 'practice_voz_bloques') {
    cardContent = renderPracticeVozBloques(mod, screen);
  }

  return header + `<div class="screen-card">${cardContent}</div>`;
}

/* ═════════════════════════════════════════════════════════════
   RENDER QUIZ
   ═════════════════════════════════════════════════════════════ */
function renderQuiz(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { picked: [], validated: false };
  const isMulti = screen.type === 'quiz_multi';
  const customRender = screen.customRender || '';

  const optsHtml = screen.options.map((opt, idx) => {
    const picked = sel.picked.includes(idx);
    let cls = 'option';
    if (sel.validated) {
      if (picked && opt.correct) cls += ' correct';
      else if (picked && !opt.correct) cls += ' incorrect';
      else if (!picked && opt.correct) cls += ' correct';
      cls += ' disabled';
    } else if (picked) {
      cls += ' selected';
    }

    const onClick = sel.validated ? '' : `onclick="${isMulti ? 'toggleOption' : 'selectOption'}(${idx})"`;

    const markerSvg = isMulti
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
      : '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>';

    return `
      <button class="${cls}" ${onClick}>
        <div class="option-marker ${isMulti ? 'square' : ''}">${markerSvg}</div>
        <div class="option-text">${opt.text}</div>
      </button>
    `;
  }).join('');

  let feedbackHtml = '';
  if (sel.validated) feedbackHtml = renderQuizFeedback(screen, sel);

  return `
    ${customRender}
    <div class="exercise-intro">Ejercicio</div>
    <div class="question">${screen.question}</div>
    ${screen.hint ? `<div class="question-hint">${screen.hint}</div>` : ''}
    <div class="options">${optsHtml}</div>
    ${feedbackHtml}
  `;
}

function renderQuizFeedback(screen, sel) {
  const isMulti = screen.type === 'quiz_multi';
  const correctIdxs = screen.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
  const allCorrect = sel.picked.length === correctIdxs.length && sel.picked.every(i => correctIdxs.includes(i));
  const anyCorrect = sel.picked.some(i => correctIdxs.includes(i));
  const onlyCorrect = sel.picked.every(i => correctIdxs.includes(i));

  let type, body;
  if (allCorrect) {
    type = 'correct';
    body = screen.feedback.correct;
  } else if (isMulti && onlyCorrect && anyCorrect) {
    type = 'partial';
    body = screen.feedback.partial || screen.feedback.incorrect;
  } else if (isMulti && anyCorrect) {
    type = 'partial';
    body = screen.feedback.partial || screen.feedback.incorrect;
  } else {
    type = 'incorrect';
    body = screen.feedback.incorrect;
  }

  let perOption = '';
  if (!isMulti && sel.picked.length === 1) {
    const opt = screen.options[sel.picked[0]];
    if (opt.explain) {
      perOption = `<div class="feedback-body" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.08); font-style: italic; color: var(--oct-text-soft);">${opt.explain}</div>`;
    }
  }

  const titleText = type === 'correct' ? '✓ Correcto' : (type === 'partial' ? '~ Parcial' : '✗ Incorrecto');

  return `
    <div class="feedback ${type}">
      <div class="feedback-title">${titleText}</div>
      <div class="feedback-body">${body}</div>
      ${perOption}
    </div>
  `;
}

function selectOption(idx) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  state.selections[key] = { picked: [idx], validated: false };
  saveState();
  render();
}

function toggleOption(idx) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { picked: [], validated: false };
  if (sel.picked.includes(idx)) {
    sel.picked = sel.picked.filter(i => i !== idx);
  } else {
    sel.picked = [...sel.picked, idx];
  }
  state.selections[key] = sel;
  saveState();
  render();
}

function checkAnswer() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || sel.picked.length === 0) return;
  sel.validated = true;
  saveState();
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER PRACTICE SUBJECT
   ═════════════════════════════════════════════════════════════ */
function renderPracticeSubject(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  const text = sel.text || '';
  const charCount = text.length;
  let charCls = '';
  if (charCount > 60) charCls = 'err';
  else if (charCount >= 30 && charCount <= 60) charCls = 'ok';
  else if (charCount > 0) charCls = 'warn';

  let feedbackHtml = '';
  if (sel.validated) {
    const items = screen.validations.map(v => {
      const passed = v.test(text);
      return `
        <li class="validation-item">
          <div class="validation-check ${passed ? 'pass' : 'fail'}">
            ${passed
              ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
              : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'}
          </div>
          <div class="validation-text">${v.label}<em>${v.hint}</em></div>
        </li>`;
    }).join('');
    const passedCount = screen.validations.filter(v => v.test(text)).length;
    const totalCount = screen.validations.length;
    const fbType = passedCount === totalCount ? 'correct' : (passedCount >= totalCount - 1 ? 'partial' : 'incorrect');
    const fbTitle = passedCount === totalCount ? '✓ Asunto excelente' : (passedCount >= totalCount - 1 ? '~ Casi perfecto' : '✗ Hay cosas por mejorar');
    feedbackHtml = `
      <div class="feedback ${fbType}">
        <div class="feedback-title">${fbTitle} — ${passedCount} de ${totalCount} criterios</div>
        <div class="feedback-body" style="margin-top: 10px;"><ul class="validation-list">${items}</ul></div>
      </div>`;
  }

  return `
    <p>${screen.context}</p>
    <p style="margin-top: 12px;"><strong>${screen.instruction}</strong></p>
    <div style="margin-top: 24px;">
      <input type="text" class="write-input" id="practiceInput" placeholder="${screen.placeholder}" value="${text.replace(/"/g, '&quot;')}" oninput="updatePracticeSubject(this.value)" ${sel.validated ? 'disabled' : ''}>
      <div class="write-meta">
        <span class="${charCls}">${charCount} caracteres</span>
        <span>Idealmente entre 30 y 60</span>
      </div>
    </div>
    ${feedbackHtml}`;
}

function updatePracticeSubject(value) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  sel.text = value;
  state.selections[key] = sel;
  saveState();
  const metas = document.querySelectorAll('.write-meta span');
  if (metas.length) {
    metas[0].textContent = `${value.length} caracteres`;
    metas[0].className = value.length > 60 ? 'err' : (value.length >= 30 && value.length <= 60 ? 'ok' : (value.length > 0 ? 'warn' : ''));
  }
  updateFooterNav(COURSE.modules[state.moduleIdx], COURSE.modules[state.moduleIdx].screens[state.screenIdx]);
}

function validatePracticeSubject() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.text || sel.text.trim().length === 0) return;
  sel.validated = true;
  state.selections[key] = sel;
  saveState();
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER PRACTICE EMAIL
   ═════════════════════════════════════════════════════════════ */
function renderPracticeEmail(mod, screen) {
  // ── Ejercicio con contacto dinámico (pipeline real o caso de ejemplo) ──
  let contactSelectorHtml = '';
  if (screen.dynamicContact) {
    if (!state.contactsLoaded) {
      ensureContactsLoaded();
      return `<div style="text-align:center; padding:40px 20px; color:var(--oct-text-soft); font-size:14px;">
        <div style="display:inline-block; width:22px; height:22px; border:3px solid var(--oct-ltblue); border-top-color:var(--oct-sky); border-radius:50%; animation:ocspin 0.7s linear infinite; margin-bottom:12px;"></div>
        <div>Cargando tu pipeline…</div>
      </div>`;
    }
    const contact = getActiveContact();
    if (!contact) {
      return `<div style="text-align:center; padding:40px 20px; color:var(--oct-text-soft);">No se pudo cargar un contacto. Recarga la página para intentar de nuevo.</div>`;
    }
    // Materializar contexto y validaciones desde el contacto activo.
    screen.context = screen.buildContext(contact);
    screen.validations = screen.buildValidations(contact);
    contactSelectorHtml = renderContactSelector();
  }

  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  const text = sel.text || '';
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  let feedbackHtml = '';
  let copyBtnHtml = '';
  if (sel.validated) {
    const items = screen.validations.map(v => {
      const passed = v.test(text);
      const info = v.getInfo ? `<span style="color: var(--oct-text-mute); font-size: 11px; margin-left: 8px;">(${v.getInfo(text)})</span>` : '';
      return `
        <li class="validation-item">
          <div class="validation-check ${passed ? 'pass' : 'fail'}">
            ${passed
              ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
              : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'}
          </div>
          <div class="validation-text">${v.label}${info}<em>${v.hint}</em></div>
        </li>`;
    }).join('');
    const passedCount = screen.validations.filter(v => v.test(text)).length;
    const totalCount = screen.validations.length;
    const fbType = passedCount === totalCount ? 'correct' : (passedCount >= Math.ceil(totalCount * 0.75) ? 'partial' : 'incorrect');
    const fbTitle = passedCount === totalCount
      ? '✓ Correo excelente — cumple todos los criterios'
      : (passedCount >= Math.ceil(totalCount * 0.75) ? `~ Buen correo, mejorable — ${passedCount} de ${totalCount} criterios` : `✗ Por mejorar — ${passedCount} de ${totalCount} criterios`);
    feedbackHtml = `
      <div class="feedback ${fbType}">
        <div class="feedback-title">${fbTitle}</div>
        <div class="feedback-body" style="margin-top: 10px;"><ul class="validation-list">${items}</ul></div>
      </div>`;
    // Botón copiar: cuando es contacto real, el correo se puede usar de verdad.
    if (screen.dynamicContact) {
      const c = getActiveContact();
      const usable = c && !c.esDemo;
      copyBtnHtml = `
        <div style="margin-top:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <button id="copyEmailBtn" onclick="copyEmailToClipboard()" style="background:var(--oct-navy); color:#fff; border:none; border-radius:8px; padding:9px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:transform 0.1s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">Copiar correo</button>
          <span style="font-size:12px; color:var(--oct-text-soft);">${usable ? 'Pégalo en tu correo y envíalo a tu contacto real.' : 'Cópialo si quieres reutilizar la estructura.'}</span>
        </div>`;
    }
  }

  // Bloque de feedback IA — solo aparece si el ejercicio tiene aiEjercicioId
  // y el ejecutivo ya pasó las validaciones estructurales (regex).
  let aiBlockHtml = '';
  if (screen.aiEjercicioId && sel.validated) {
    const allOk = screen.validations && screen.validations.every(v => v.test(text));
    if (allOk) {
      aiBlockHtml = aiRenderBloqueParaPracticeEmail(screen.aiEjercicioId, text, screen.aiOpciones || {});
    }
  }

  return `
    ${contactSelectorHtml}
    <div style="background: var(--oct-softblue); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; font-size: 13.5px; line-height: 1.55;">${screen.context}</div>
    <textarea class="write-textarea" id="practiceEmail" placeholder="${screen.placeholder}" oninput="updatePracticeEmail(this.value)" ${sel.validated ? 'disabled' : ''}>${text}</textarea>
    <div class="write-meta">
      <span class="${wordCount > 150 ? 'err' : (wordCount >= 60 && wordCount <= 150 ? 'ok' : (wordCount > 0 ? 'warn' : ''))}">${wordCount} palabras</span>
      <span>Idealmente entre 60 y 150</span>
    </div>
    ${feedbackHtml}
    ${aiBlockHtml}
    ${copyBtnHtml}`;
}

/* ═════════════════════════════════════════════════════════════
   ROLEPLAY POR CHAT (Pattern B — M2 Patricia)
   ═════════════════════════════════════════════════════════════ */
function renderPracticeRoleplayChat(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || {};
  // Inicialización del historial
  if (!sel.rpMessages) {
    sel.rpMessages = [{ rol: 'persona', texto: screen.mensajeInicial }];
    sel.rpEnded = false;
    sel.rpFinalReady = false;
    sel.rpLoading = false;
    sel.rpError = null;
    state.selections[key] = sel;
  }

  // Selector de contacto (el contacto se usa para que la IA sepa con qué institución habla Patricia)
  const contactSelectorHtml = renderContactSelector();

  // Render del historial de mensajes
  const msgsHtml = sel.rpMessages.map(m => {
    const avatar = m.rol === 'persona' ? (screen.personajeNombre || 'A').charAt(0).toUpperCase() : 'TÚ';
    const cls = m.rol === 'persona' ? 'ai' : 'user';
    return `<div class="rp-msg ${cls}">
      <div class="rp-msg-avatar">${avatar}</div>
      <div class="rp-msg-bubble">${m.texto}</div>
    </div>`;
  }).join('');

  let typingHtml = '';
  if (sel.rpLoading) {
    typingHtml = `<div class="rp-msg ai">
      <div class="rp-msg-avatar">${(screen.personajeNombre || 'A').charAt(0).toUpperCase()}</div>
      <div class="rp-msg-bubble"><div class="rp-typing"><span></span><span></span><span></span></div></div>
    </div>`;
  }

  // Input o estado final
  let inputHtml = '';
  if (!sel.rpEnded && !sel.rpLoading) {
    const turnosEjecutivo = sel.rpMessages.filter(m => m.rol === 'ejecutivo').length;
    const escapeVisible = turnosEjecutivo >= 6;
    inputHtml = `<div class="rp-input-wrap">
      <textarea class="rp-input" id="rpInput" placeholder="${screen.inputPlaceholder || 'Escribe tu respuesta…'}" rows="1" oninput="this.style.height='auto'; this.style.height=Math.min(120,this.scrollHeight)+'px';"></textarea>
      <button class="btn-ai-primary" onclick="rpEnviarTurno()">Enviar</button>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px; flex-wrap:wrap; gap:8px;">
      <span style="font-size:11px; color:var(--oct-text-mute);">Cada respuesta de ${screen.personajeNombre || 'la IA'} tarda 5-7 s. Mantén tus turnos breves.</span>
      ${escapeVisible ? `<button class="btn-ai-ghost" style="font-size:11.5px; padding:5px 10px;" onclick="rpTerminarManual()">Terminar y evaluar →</button>` : ''}
    </div>`;
  }

  // Errores y acciones post-cierre
  if (sel.rpError) {
    inputHtml = aiRenderError(`La línea se cayó. ${screen.personajeNombre || 'La IA'} no respondió esta vez.`, 'rpReintentarUltimoTurno()');
  }

  let finalHtml = '';
  if (sel.rpEnded) {
    const motivo = sel.rpEndManual
      ? 'Terminaste la conversación manualmente.'
      : (screen.personajeNombre || 'La IA') + ' ' + (sel.rpEndReason === 'paso' ? 'decidió pasarte con el decisor.' : (sel.rpEndReason === 'mensaje' ? 'ofreció tomar mensaje.' : 'cerró la llamada.'));
    finalHtml = `<div style="margin-top:14px; padding:14px 18px; background:var(--oct-cream); border:1px solid var(--amber-border); border-radius:12px;">
      <strong style="color:var(--oct-text);">La conversación terminó.</strong>
      <div style="margin-top:6px; font-size:13px; color:var(--oct-text-soft);">${motivo}</div>
    </div>`;
    finalHtml += rpRenderEvalFinal(sel, screen, 'discovery-m2-filtro');
  }

  return `
    ${contactSelectorHtml}
    <div style="background: var(--oct-softblue); border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; font-size: 13.5px; line-height: 1.55;">${screen.context}</div>
    <div class="rp-chat" id="rpChat">${msgsHtml}${typingHtml}</div>
    ${inputHtml}
    ${finalHtml}`;
}

async function rpEnviarTurno() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || sel.rpLoading || sel.rpEnded) return;
  const input = document.getElementById('rpInput');
  if (!input) return;
  const texto = input.value.trim();
  if (texto.length < 2) return;

  const mod = COURSE.modules[state.moduleIdx];
  const screen = mod.screens[state.screenIdx];

  sel.rpMessages.push({ rol: 'ejecutivo', texto });
  sel.rpLoading = true;
  sel.rpError = null;
  saveState();
  render();

  if (window.__ocAIMissing || !window.OpenClusterAI || typeof window.OpenClusterAI.conversar !== 'function') {
    sel.rpLoading = false;
    sel.rpError = 'IA no disponible';
    saveState();
    render();
    return;
  }

  const contexto = getActiveContact ? getActiveContact() : null;
  let turno = null;
  try {
    turno = await aiConTimeout(window.OpenClusterAI.conversar({
      ejercicioId: screen.aiEjercicioId,
      mensajes: sel.rpMessages.slice(),
      contexto: contexto
    }));
  } catch (e) { turno = null; }

  if (!turno) {
    // Reintento automático una vez antes de declarar la caída: la IA gratis a
    // veces tiene un hipo transitorio y el segundo intento entra bien.
    try {
      await new Promise(r => setTimeout(r, 900));
      turno = await aiConTimeout(window.OpenClusterAI.conversar({
        ejercicioId: screen.aiEjercicioId,
        mensajes: sel.rpMessages.slice(),
        contexto: contexto
      }));
    } catch (e) { turno = null; }
  }

  sel.rpLoading = false;
  if (!turno) {
    // Mantenemos el último turno del ejecutivo pero damos opción de reintentar
    sel.rpError = 'Sin respuesta';
    saveState();
    render();
    return;
  }
  sel.rpMessages.push({ rol: 'persona', texto: turno.respuesta || '' });
  if (turno.terminar === true) {
    sel.rpEnded = true;
    sel.rpEndReason = turno.razon || 'cerro';
  }
  saveState();
  render();
}

async function rpReintentarUltimoTurno() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  // El último mensaje en historial es del ejecutivo (sin respuesta) — reintentamos la llamada
  sel.rpError = null;
  sel.rpLoading = true;
  saveState();
  render();

  const mod = COURSE.modules[state.moduleIdx];
  const screen = mod.screens[state.screenIdx];
  const contexto = getActiveContact ? getActiveContact() : null;
  let turno = null;
  try {
    turno = await aiConTimeout(window.OpenClusterAI.conversar({
      ejercicioId: screen.aiEjercicioId,
      mensajes: sel.rpMessages.slice(),
      contexto: contexto
    }));
  } catch (e) { turno = null; }

  sel.rpLoading = false;
  if (!turno) {
    sel.rpError = 'Sin respuesta';
  } else {
    sel.rpMessages.push({ rol: 'persona', texto: turno.respuesta || '' });
    if (turno.terminar === true) {
      sel.rpEnded = true;
      sel.rpEndReason = turno.razon || 'cerro';
    }
  }
  saveState();
  render();
}

async function rpPedirEvaluacionFinal() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.rpEnded) return;
  if (aiCooldownRemaining(key) > 0) return;
  const mod = COURSE.modules[state.moduleIdx];
  const screen = mod.screens[state.screenIdx];

  sel.rpEvalFailCount = sel.rpEvalFailCount || 0;

  if (window.__ocAIMissing || !window.OpenClusterAI || typeof window.OpenClusterAI.evaluate !== 'function') {
    sel.rpFinalReady = true;
    sel.rpFinalResult = 'unavailable';
    saveState();
    render();
    return;
  }

  sel.rpEvalLoading = true;
  saveState();
  render();

  const transcript = sel.rpMessages.map(m => `${m.rol === 'persona' ? (screen.personajeNombre || 'PERSONAJE') : 'EJECUTIVO'}: ${m.texto}`).join('\n');
  const contexto = getActiveContact ? getActiveContact() : null;

  let resultado = null;
  try {
    resultado = await aiConTimeout(window.OpenClusterAI.evaluate({
      ejercicioId: screen.aiEjercicioId,
      texto: transcript,
      contexto: contexto
    }));
  } catch (e) { resultado = null; }

  sel.rpEvalLoading = false;
  sel.rpFinalReady = true;
  sel.rpFinalResult = resultado;
  if (!resultado) {
    sel.rpEvalFailCount += 1;
    aiStartCooldown(key);
  } else {
    sel.rpEvalFailCount = 0;
  }
  saveState();
  render();
}

function rpAceptarEvalFinal() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.rpFinalResult || typeof sel.rpFinalResult !== 'object') return;
  sel.rpFinalAccepted = true;
  saveState();
  render();
}

function rpSaltarEvalFinalPorStrikes() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  if ((sel.rpEvalFailCount || 0) < AI_STRIKE_LIMIT) return;
  sel.rpSkippedByStrikes = true;
  saveState();
  render();
}

function rpTerminarManual() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || sel.rpEnded) return;
  sel.rpEnded = true;
  sel.rpEndManual = true;
  sel.rpEndReason = 'manual';
  saveState();
  render();
}

// Render compartido del bloque de evaluación final (usado por chat y voz)
function rpRenderEvalFinal(sel, screen, _ignored) {
  const inReplay = aiIsModuleInReplay();
  // Estado inicial: aún no se pidió evaluación
  if (!sel.rpFinalReady && !sel.rpEvalLoading) {
    return `<div class="ai-actions" style="margin-top:12px;">
      <button class="btn-ai-secondary" onclick="rpPedirEvaluacionFinal()">Ver evaluación de la IA</button>
      <span style="font-size:11.5px; color:var(--oct-text-mute); align-self:center;">${inReplay ? 'Modo repaso — opcional.' : 'Obligatorio para avanzar.'}</span>
    </div>`;
  }
  if (sel.rpEvalLoading) {
    return aiRenderLoader('La IA está evaluando toda la conversación…', 'Repasando los criterios del ejercicio. ~7-12 segundos.');
  }
  // Servicio no disponible
  if (sel.rpFinalResult === 'unavailable') {
    return `<div class="ai-error">
      <div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--oct-text-mute); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">i</div>
      <div style="flex:1;"><strong>Coaching de IA no disponible en este entorno.</strong><div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">Puedes avanzar de todas formas.</div></div>
    </div>`;
  }
  // Error en la última llamada
  if (sel.rpFinalReady && !sel.rpFinalResult) {
    const failCount = sel.rpEvalFailCount || 0;
    const reached = failCount >= AI_STRIKE_LIMIT;
    const key = `${state.moduleIdx}-${state.screenIdx}`;
    const cooldown = aiCooldownRemaining(key);
    return `<div class="ai-error">
      <div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">!</div>
      <div style="flex:1;">
        <strong>${reached ? 'No se pudo conectar a la IA tras 3 intentos.' : 'La evaluación final falló.'}</strong>
        <div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">${reached ? 'Avanza por ahora; te recomendamos volver a hacer este ejercicio cuando el servicio esté disponible.' : 'Tu conversación quedó arriba intacta. Intenta de nuevo.'}</div>
        <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          <button id="aiRetryBtn-${key}" class="btn-ai-secondary" ${cooldown > 0 ? 'disabled' : ''} onclick="rpPedirEvaluacionFinal()">${cooldown > 0 ? 'Reintentar en ' + cooldown + '…' : 'Reintentar'}</button>
          ${reached ? `<button class="btn-ai-ghost" onclick="rpSaltarEvalFinalPorStrikes()">Saltar (no se pudo conectar a la IA)</button>` : ''}
          <span style="font-size:11.5px; color:var(--oct-text-mute);">Intentos fallidos: ${failCount} / ${AI_STRIKE_LIMIT}</span>
        </div>
      </div>
    </div>`;
  }
  // Tenemos resultado objeto
  if (sel.rpFinalResult && typeof sel.rpFinalResult === 'object') {
    const feedbackHtml = aiRenderFeedback(sel.rpFinalResult);
    if (sel.rpFinalAccepted || inReplay) {
      return feedbackHtml + `<div class="ai-actions" style="margin-top:12px;"><span style="font-size:11.5px; color:var(--oct-text-mute); align-self:center;">${inReplay && !sel.rpFinalAccepted ? 'Modo repaso — feedback recibido.' : 'Feedback aceptado.'}</span></div>`;
    }
    return feedbackHtml + `<div class="ai-actions" style="margin-top:14px;">
      <button class="btn-ai-primary" onclick="rpAceptarEvalFinal()">Entendido, avanzar</button>
    </div>
    <div style="font-size:11.5px; color:var(--oct-text-mute); margin-top:6px;">Lee el feedback y pulsa "Entendido, avanzar" para habilitar el botón de continuar.</div>`;
  }
  return '';
}

/* ═════════════════════════════════════════════════════════════
   ROLEPLAY POR VOZ (Pattern C — M7 cierre del discovery)
   Web Speech API + STT + TTS por turnos. Fallback automático a texto.

// Género de la voz por personaje (para que la síntesis hable mujer/hombre).
// El M7 (decisor) varía A/B según segmento → se deja en voz por defecto.
const RP_VOZ_GENERO = {
  'discovery-m2-filtro': 'f',     // Patricia
  'discovery-sim-filtro': 'f',    // Jeannette
  'discovery-sim-aliado': 'm',    // Felipe
  'discovery-sim-apertura': 'f',  // Sra. Carmen
  'discovery-sim-spin': 'm',      // Dr. Pérez
  'discovery-sim-objecion': 'm'   // Don Rodrigo
};

// Elige una voz en español acorde al género. Si no hay match, voz por defecto.
function ocPickVoiceEs(genero) {
  if (genero !== 'f' && genero !== 'm') return null;
  try {
    const voices = (window.speechSynthesis.getVoices() || []).filter(v => /^es/i.test(v.lang || ''));
    if (!voices.length) return null;
    const fem = /(helena|sabina|laura|elena|paulina|m[oó]nica|esperanza|marisol|conchita|luc[ií]a|female|mujer|femenin)/i;
    const masc = /(pablo|ra[uú]l|jorge|diego|miguel|carlos|enrique|alvaro|álvaro|male|hombre|masculin)/i;
    let v = null;
    if (genero === 'f') v = voices.find(x => fem.test(x.name)) || voices.find(x => !masc.test(x.name));
    else v = voices.find(x => masc.test(x.name)) || voices.find(x => !fem.test(x.name));
    return v || voices[0] || null;
  } catch (e) { return null; }
}
