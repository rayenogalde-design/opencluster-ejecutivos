let __ocRecognition = null;
let __ocNetworkSlow = false;

/* ─── Grabación de audio del roleplay de voz ─────────────────────
   Captura el lado del ejecutivo durante toda la conversación (en paralelo
   al reconocimiento de voz, con un getUserMedia propio) y sube el audio al
   panel de progreso al cerrarse la llamada. Desacoplado y fire-and-forget:
   no bloquea ni rompe el ejercicio si no hay soporte o no está conectado.
   No muestra ningún aviso al ejecutivo. */
let __ocRpRec = { mr: null, chunks: [], stream: null, active: false, key: null, ejercicioId: null };

function ocRpEnsureRecording(key, ejercicioId) {
  if (__ocRpRec.active && __ocRpRec.key === key) return; // ya grabando este ejercicio
  if (__ocRpRec.active) ocRpFinishRecording(__ocRpRec.key); // cerrar uno previo si quedó abierto
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') return;
  __ocRpRec = { mr: null, chunks: [], stream: null, active: true, key: key, ejercicioId: ejercicioId };
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    if (!__ocRpRec.active || __ocRpRec.key !== key) { try { stream.getTracks().forEach(t => t.stop()); } catch(e){} return; }
    try {
      const mr = new MediaRecorder(stream);
      __ocRpRec.mr = mr; __ocRpRec.stream = stream;
      mr.ondataavailable = (e) => { if (e.data && e.data.size > 0) __ocRpRec.chunks.push(e.data); };
      mr.start();
    } catch (e) { try { stream.getTracks().forEach(t => t.stop()); } catch(_){} }
  }).catch(() => { /* sin permiso de micrófono: la transcripción sigue, no grabamos */ });
}

function ocRpFinishRecording(key) {
  if (!__ocRpRec.active || __ocRpRec.key !== key) return;
  const rec = __ocRpRec;
  __ocRpRec = { mr: null, chunks: [], stream: null, active: false, key: null, ejercicioId: null };
  const finalize = () => {
    try {
      if (rec.chunks.length && !window.__ocAudioMissing && window.OpenClusterAcademyAudio && typeof window.OpenClusterAcademyAudio.upload === 'function') {
        const blob = new Blob(rec.chunks, { type: 'audio/webm' });
        try {
          window.OpenClusterAcademyAudio.upload({
            curso: 'proceso',
            ejercicioId: rec.ejercicioId || 'postventa-roleplay-voz',
            blob: blob,
            mime: 'audio/webm',
            fecha: new Date().toISOString()
          });
        } catch (e) { /* la subida nunca rompe el ejercicio */ }
      }
    } catch (e) {}
    try { if (rec.stream) rec.stream.getTracks().forEach(t => t.stop()); } catch(e){}
  };
  if (rec.mr && rec.mr.state !== 'inactive') {
    try { rec.mr.onstop = finalize; rec.mr.stop(); } catch (e) { finalize(); }
  } else { finalize(); }
}

function rpVozCambiarModo() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  // Detener cualquier reconocimiento activo
  if (__ocRecognition) { try { __ocRecognition.abort(); } catch(e){} __ocRecognition = null; }
  sel.rpMode = sel.rpMode === 'voz' ? 'texto' : 'voz';
  sel.rpListening = false;
  saveState();
  render();
}

function rpVozMicToggle() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  if (sel.rpListening) {
    sel.rpUserStopped = true;
    if (__ocRecognition) { try { __ocRecognition.stop(); } catch(e){} }
    return;
  }
  // Iniciar escucha (continua: no se corta en la primera pausa)
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) { sel.rpMode = 'texto'; saveState(); render(); return; }
  const rec = new Rec();
  rec.lang = 'es-CL';
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  rec.continuous = true;
  __ocRecognition = rec;
  sel.rpUserStopped = false;
  let committedText = '';
  let currentText = '';
  const finalizar = (txt) => {
    __ocRecognition = null;
    sel.rpListening = false;
    sel.rpUserStopped = false;
    const finalText = (txt || '').trim();
    if (finalText.length > 1) {
      sel.rpSTTFailCount = 0;
      rpVozProcesarRespuesta(finalText);
    } else {
      sel.rpSTTFailCount = (sel.rpSTTFailCount || 0) + 1;
      if (sel.rpSTTFailCount >= 2) {
        sel.rpMode = 'texto';
        sel.rpError = 'No se entendió la voz dos veces seguidas. Cambiamos a texto.';
        sel.rpSTTFailCount = 0;
      }
      saveState();
      render();
    }
  };
  rec.onresult = (e) => {
    let full = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i] && e.results[i][0]) full += e.results[i][0].transcript;
    }
    currentText = full;
  };
  rec.onend = () => {
    if (sel.rpUserStopped) {
      finalizar(committedText + ' ' + currentText);
    } else {
      committedText = (committedText + ' ' + currentText).trim();
      currentText = '';
      try { rec.start(); } catch (e) { finalizar(committedText); }
    }
  };
  rec.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    __ocRecognition = null;
    sel.rpListening = false;
    sel.rpUserStopped = false;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      sel.rpMode = 'texto';
      sel.rpError = 'El micrófono está bloqueado. Cambiamos a texto.';
    } else {
      sel.rpSTTFailCount = (sel.rpSTTFailCount || 0) + 1;
      if (sel.rpSTTFailCount >= 2) {
        sel.rpMode = 'texto';
        sel.rpError = 'Reconocimiento de voz falló dos veces. Cambiamos a texto.';
        sel.rpSTTFailCount = 0;
      }
    }
    saveState();
    render();
  };
  try {
    rec.start();
    sel.rpListening = true;
    sel.rpError = null;
    // Iniciar (si aún no) la grabación de audio de toda la conversación para el panel.
    try { const __scr = COURSE.modules[state.moduleIdx].screens[state.screenIdx]; ocRpEnsureRecording(key, __scr && __scr.aiEjercicioId); } catch(e){}
    saveState();
    render();
  } catch (e) {
    sel.rpListening = false;
    sel.rpMode = 'texto';
    saveState();
    render();
  }
}

function rpVozEnviarTexto() {
  const input = document.getElementById('rpInput');
  if (!input) return;
  const texto = input.value.trim();
  if (texto.length < 2) return;
  rpVozProcesarRespuesta(texto);
}

async function rpVozProcesarRespuesta(texto) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  const mod = COURSE.modules[state.moduleIdx];
  const screen = mod.screens[state.screenIdx];

  sel.rpMessages.push({ rol: 'ejecutivo', texto });
  sel.rpLoading = true;
  sel.rpError = null;
  saveState();
  render();

  if (window.__ocAIMissing || !window.OpenClusterAI || typeof window.OpenClusterAI.conversar !== 'function') {
    sel.rpLoading = false;
    sel.rpError = 'IA no disponible.';
    saveState();
    render();
    return;
  }

  const contexto = getActiveContact ? getActiveContact() : null;
  const t0 = Date.now();
  let turno = null;
  try {
    turno = await aiConTimeout(window.OpenClusterAI.conversar({
      ejercicioId: screen.aiEjercicioId,
      mensajes: sel.rpMessages.slice(),
      contexto: contexto
    }));
  } catch (e) { turno = null; }
  const elapsed = Date.now() - t0;
  if (elapsed > 18000) __ocNetworkSlow = true;

  if (!turno) {
    // Reintento automático una vez antes de declarar la caída.
    try {
      await new Promise(r => setTimeout(r, 900));
      turno = await aiConTimeout(window.OpenClusterAI.conversar({
        ejercicioId: screen.aiEjercicioId,
        mensajes: sel.rpMessages.slice(),
        contexto: contexto
      }));
    } catch (e) { turno = null; }
  }

  sel.rpLoading = false;
  if (!turno) {
    sel.rpError = 'La línea se cayó. Intenta de nuevo.';
    saveState();
    render();
    return;
  }
  sel.rpMessages.push({ rol: 'persona', texto: turno.respuesta || '' });
  if (rpDebeTerminar(sel, screen, turno)) {
    sel.rpEnded = true;
    sel.rpEndReason = turno.razon || 'cerro';
    ocRpFinishRecording(key);
  }
  saveState();
  render();

  // TTS solo si estamos en modo voz
  if (sel.rpMode === 'voz' && turno.respuesta && window.speechSynthesis) {
    try {
      sel.rpSpeaking = true;
      saveState();
      render();
      const u = new SpeechSynthesisUtterance(turno.respuesta);
      u.lang = 'es-CL';
      u.rate = 1.0;
      const voz = ocPickVoiceEs(RP_VOZ_GENERO[screen.aiEjercicioId]);
      if (voz) { u.voice = voz; if (voz.lang) u.lang = voz.lang; }
      u.onend = () => {
        sel.rpSpeaking = false;
        saveState();
        render();
      };
      u.onerror = () => {
        sel.rpSpeaking = false;
        saveState();
        render();
      };
      window.speechSynthesis.speak(u);
    } catch(e) {
      sel.rpSpeaking = false;
      saveState();

   MÓDULO VOZ — 3 BLOQUES (Pattern D)

function renderPracticeVozBloques(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || {};
  if (!sel.vozChecklist) {
    sel.vozChecklist = { energia: 0, sonrisa: 0, tono: 0, autoridad: 0 };

  }

  const sttSupported = (typeof window !== 'undefined') && (window.SpeechRecognition || window.webkitSpeechRecognition);

    grabacionHtml = `<div class="ai-error"><div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">!</div>
      <div style="flex:1;"><strong>Este ejercicio requiere grabar tu voz, y tu navegador no lo soporta.</strong><div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">La grabación es obligatoria para completar esta práctica. Ábrela en Chrome o Edge de escritorio, con el micrófono habilitado, para poder grabarte y avanzar.</div></div></div>`;
  } else if (!sel.vozGrabado) {
    grabacionHtml = `<div class="voz-controls">
      <button class="btn-mic ${sel.vozListening ? 'listening' : ''}" onclick="vozGrabarToggle()" aria-label="Grabar">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"></rect><path d="M5 11a7 7 0 0 0 14 0"></path><line x1="12" y1="18" x2="12" y2="22"></line></svg>
      </button>
      <div class="voz-state">${sel.vozListening ? 'Grabando… habla con naturalidad. Pulsa de nuevo para terminar.' : (screen.guion ? 'Pulsa el micrófono y lee el guion en voz alta.' : 'Pulsa el micrófono y habla lo que practicaste.')}</div>
      ${screen.guion ? `<div style="margin-top:8px; padding:12px 14px; background:var(--oct-softblue); border-radius:8px; font-size:13px; line-height:1.55; max-width:520px; text-align:left;">${screen.guion}</div>` : ''}
    </div>`;
  }

  // Resultado en 3 bloques (solo aparece tras grabar)
  let bloquesHtml = '';
  if (sel.vozGrabado) {
    const ppm = sel.vozPPM || 0;
    const palabras = sel.vozPalabras || 0;
    const pausas = sel.vozPausas || 0;
    const ppmClass = (ppm >= 140 && ppm <= 160) ? 'ok' : ((ppm >= 120 && ppm <= 180) ? 'warn' : '');
    bloquesHtml = `
      <!-- BLOQUE 1 — Datos objetivos -->
      <div class="voz-bloque voz-bloque-1">
        <div class="voz-bloque-header">Datos objetivos · lo que sí se puede medir</div>
        <div class="voz-metrics">
          <div class="voz-metric"><div class="voz-metric-label">Ritmo</div><div class="voz-metric-value ${ppmClass}">${ppm}</div><div class="voz-metric-range">palabras/min · ideal 140-160</div></div>
          <div class="voz-metric"><div class="voz-metric-label">Total</div><div class="voz-metric-value">${palabras}</div><div class="voz-metric-range">palabras</div></div>
          <div class="voz-metric"><div class="voz-metric-label">Pausas</div><div class="voz-metric-value">${pausas}</div><div class="voz-metric-range">silencios &gt; 0.6 s</div></div>
        </div>
      </div>

      <!-- BLOQUE 2 — Contenido (IA) -->
      <div class="voz-bloque voz-bloque-2">
        <div class="voz-bloque-header">Contenido · evaluación de IA</div>
        ${renderVozBloque2(sel, screen)}
      </div>

      <!-- BLOQUE 3 — Autoevaluación guiada -->
      <div class="voz-bloque voz-bloque-3">
        <div class="voz-bloque-header">Autoevaluación · solo tú puedes juzgar esto</div>
        <div class="voz-honesty">Estas dimensiones las juzgas tú: requieren tu propio oído. Aprender a escucharte es la habilidad que más vas a usar en tu carrera.</div>
        ${sel.vozAudioURL ? `<div style="margin-bottom:12px;"><audio controls src="${sel.vozAudioURL}" style="width:100%; max-width:420px;"></audio></div>` : ''}
        <div class="voz-checklist">
          ${renderVozChecklistItem('energia', 'Energía', sel.vozChecklist.energia)}
          ${renderVozChecklistItem('sonrisa', 'Sonrisa que se escucha', sel.vozChecklist.sonrisa)}
          ${renderVozChecklistItem('tono', 'Tono ajustado a la etapa', sel.vozChecklist.tono)}
          ${renderVozChecklistItem('autoridad', 'Sensación general de autoridad', sel.vozChecklist.autoridad)}
        </div>
        ${sel.vozChecklistCompleto ? `<div style="margin-top:12px; padding:10px 14px; background:rgba(255,255,255,0.7); border-radius:8px; font-size:12.5px; color:var(--oct-text-soft);">Checklist completo. Puedes avanzar.</div>` : `<div style="margin-top:12px; font-size:12.5px; color:var(--oct-text-soft);">Marca cada dimensión del 1 al 5 para avanzar.</div>`}
      </div>

      <div class="ai-actions" style="margin-top:14px;">
        <button class="btn-ai-ghost" onclick="vozReiniciar()">Volver a grabar</button>
      </div>`;
  }

  return `
    <div style="background: var(--oct-softblue); border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; font-size: 13.5px; line-height: 1.55;">${screen.context}</div>

function renderVozChecklistItem(id, label, val) {
  let scaleHtml = '';
  for (let i = 1; i <= 5; i++) {
    scaleHtml += `<button class="${val === i ? 'selected' : ''}" onclick="vozChecklistSet('${id}', ${i})">${i}</button>`;
  }
  return `<div class="voz-checklist-item">
    <div class="voz-checklist-label">${label}</div>
    <div class="voz-scale">${scaleHtml}</div>
  </div>`;
}

function renderVozBloque2(sel, screen) {
  if (sel.vozBloque2Loading) return aiRenderLoader('La IA está evaluando el contenido de tu grabación…', 'Solo el contenido. NO opina sobre voz, tono ni energía. ~5-10 segundos.');
  if (sel.vozBloque2Result === 'unavailable') return `<div class="ai-error" style="background:#fff;"><div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--oct-text-mute); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">i</div><div style="flex:1;"><strong>Evaluación de contenido no disponible.</strong><div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">Continúa con los otros dos bloques.</div></div></div>`;

  const inReplay = aiIsModuleInReplay();

  if (sel.vozBloque2Result === 'error') {
    const failCount = sel.vozBloque2FailCount || 0;
    const reached = failCount >= AI_STRIKE_LIMIT;
    const key = `${state.moduleIdx}-${state.screenIdx}`;
    const cooldown = aiCooldownRemaining(key);
    return `<div class="ai-error" style="background:#fff;">
      <div style="flex-shrink:0; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:11px;">!</div>
      <div style="flex:1;">
        <strong>${reached ? 'No se pudo conectar a la IA tras 3 intentos.' : 'No se pudo evaluar el contenido.'}</strong>
        <div style="margin-top:6px; font-size:12px; color:var(--oct-text-soft);">${reached ? 'Avanza por ahora; te recomendamos volver a hacer este ejercicio cuando el servicio esté disponible.' : 'Intenta de nuevo en unos segundos.'}</div>
        <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          <button id="aiRetryBtn-${key}" class="btn-ai-secondary" ${cooldown > 0 ? 'disabled' : ''} onclick="vozPedirBloque2()">${cooldown > 0 ? 'Reintentar en ' + cooldown + '…' : 'Reintentar'}</button>
          ${reached ? `<button class="btn-ai-ghost" onclick="vozSaltarBloque2PorStrikes()">Saltar (no se pudo conectar a la IA)</button>` : ''}
          <span style="font-size:11.5px; color:var(--oct-text-mute);">Intentos fallidos: ${failCount} / ${AI_STRIKE_LIMIT}</span>
        </div>
      </div>
    </div>`;
  }

  if (sel.vozBloque2Result && typeof sel.vozBloque2Result === 'object') {
    const feedbackHtml = aiRenderFeedback(sel.vozBloque2Result);
    if (sel.vozBloque2Accepted || inReplay) {
      return feedbackHtml;
    }
    return feedbackHtml + `<div class="ai-actions" style="margin-top:14px;">
      <button class="btn-ai-primary" onclick="vozAceptarBloque2()">Entendido, avanzar</button>
    </div>`;
  }

  return `<div class="ai-actions">
    <button class="btn-ai-secondary" onclick="vozPedirBloque2()">Pedir evaluación del contenido</button>
    <span style="font-size:11.5px; color:var(--oct-text-mute); align-self:center;">${inReplay ? 'Modo repaso — opcional.' : 'Obligatorio para avanzar.'}</span>
  </div>`;
}

function vozAceptarBloque2() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.vozBloque2Result || typeof sel.vozBloque2Result !== 'object') return;
  sel.vozBloque2Accepted = true;
  saveState();
  render();
}

function vozSaltarBloque2PorStrikes() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  if ((sel.vozBloque2FailCount || 0) < AI_STRIKE_LIMIT) return;
  sel.vozBloque2SkippedByStrikes = true;
  saveState();
  render();
}

let __ocVozRec = null;
let __ocVozChunks = [];
let __ocVozMediaRec = null;
let __ocVozStartTime = 0;
let __ocVozLastResultTime = 0;
let __ocVozPausas = 0;

function vozGrabarToggle() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  if (sel.vozListening) {
    // Detener
    if (__ocVozRec) { try { __ocVozRec.stop(); } catch(e){} }
    if (__ocVozMediaRec && __ocVozMediaRec.state === 'recording') { try { __ocVozMediaRec.stop(); } catch(e){} }
    return;
  }
  // Iniciar
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) return;
  let transcriptFull = '';
  __ocVozPausas = 0;
  __ocVozStartTime = Date.now();
  __ocVozLastResultTime = __ocVozStartTime;

  const rec = new Rec();
  rec.lang = 'es-CL';
  rec.interimResults = true;
  rec.continuous = true;
  __ocVozRec = rec;
  rec.onresult = (e) => {
    const now = Date.now();
    if (now - __ocVozLastResultTime > 600) __ocVozPausas++;
    __ocVozLastResultTime = now;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        transcriptFull += e.results[i][0].transcript + ' ';
      }
    }
  };
  rec.onerror = () => { /* manejado en onend */ };
  rec.onend = async () => {
    const duracionMs = Date.now() - __ocVozStartTime;
    const segundos = Math.max(1, duracionMs / 1000);
    const palabras = transcriptFull.trim() ? transcriptFull.trim().split(/\s+/).filter(Boolean).length : 0;
    const ppm = Math.round((palabras / segundos) * 60);
    sel.vozListening = false;
    sel.vozGrabado = palabras >= 3;
    sel.vozPalabras = palabras;
    sel.vozPPM = ppm;
    sel.vozPausas = __ocVozPausas;
    sel.vozTranscript = transcriptFull.trim();
    if (!sel.vozGrabado) {
      sel.vozError = 'No se detectó voz suficiente. Intenta de nuevo hablando más cerca del micrófono.';
    }
    saveState();
    render();
  };

  // Capturar audio para reescuchar (Bloque 3)
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      try {
        __ocVozChunks = [];
        const mr = new MediaRecorder(stream);
        __ocVozMediaRec = mr;
        mr.ondataavailable = (e) => { if (e.data && e.data.size > 0) __ocVozChunks.push(e.data); };
        mr.onstop = () => {
          try {
            const blob = new Blob(__ocVozChunks, { type: 'audio/webm' });
            sel.vozAudioURL = URL.createObjectURL(blob);
            // Subir la grabación para que la jefatura pueda reescucharla desde el panel de progreso.
            // Desacoplado: no-op si audio-integration.js no está conectado. Fire-and-forget: no bloquea la UI.
            if (!window.__ocAudioMissing && window.OpenClusterAcademyAudio && typeof window.OpenClusterAcademyAudio.upload === 'function') {
              try {
                window.OpenClusterAcademyAudio.upload({
                  curso: 'proceso',
                  ejercicioId: 'discovery-mvoz-grabacion',
                  blob: blob,
                  mime: 'audio/webm',
                  fecha: new Date().toISOString()
                });
              } catch (e) { /* la subida nunca rompe el ejercicio */ }
            }
            saveState();
            render();
          } catch(e){}
          // detener tracks
          try { stream.getTracks().forEach(t => t.stop()); } catch(e){}
        };
        mr.start();
      } catch(e){}
    }).catch(() => {
      // sin audio para reescuchar — el bloque 3 funciona igual con su checklist
    });
  }

  try {
    rec.start();
    sel.vozListening = true;
    sel.vozError = null;
    saveState();
    render();
  } catch(e) {
    sel.vozListening = false;
    saveState();
    render();
  }
}

async function vozPedirBloque2() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.vozTranscript) return;
  if (aiCooldownRemaining(key) > 0) return;
  sel.vozBloque2FailCount = sel.vozBloque2FailCount || 0;
  if (window.__ocAIMissing || !window.OpenClusterAI || typeof window.OpenClusterAI.evaluate !== 'function') {
    sel.vozBloque2Result = 'unavailable';
    saveState();
    render();
    return;
  }
  sel.vozBloque2Loading = true;
  saveState();
  render();
  const contexto = getActiveContact ? getActiveContact() : null;
  let r = null;
  try {
    r = await aiConTimeout(window.OpenClusterAI.evaluate({
      ejercicioId: 'discovery-mvoz-contenido',
      texto: sel.vozTranscript,
      contexto: contexto
    }));
  } catch (e) { r = null; }
  sel.vozBloque2Loading = false;
  if (r) {
    sel.vozBloque2Result = r;
    sel.vozBloque2FailCount = 0;
  } else {
    sel.vozBloque2Result = 'error';
    sel.vozBloque2FailCount += 1;
    aiStartCooldown(key);
  }
  saveState();
  render();
}

function vozChecklistSet(id, val) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.vozChecklist) return;
  sel.vozChecklist[id] = val;
  const all = ['energia', 'sonrisa', 'tono', 'autoridad'].every(k => sel.vozChecklist[k] > 0);
  sel.vozChecklistCompleto = all;
  saveState();
  render();
}

function vozReiniciar() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel) return;
  if (sel.vozAudioURL) { try { URL.revokeObjectURL(sel.vozAudioURL); } catch(e){} }
  sel.vozGrabado = false;
  sel.vozChecklistCompleto = false;
  sel.vozChecklist = { energia: 0, sonrisa: 0, tono: 0, autoridad: 0 };
  sel.vozPalabras = 0;
  sel.vozPPM = 0;
  sel.vozPausas = 0;
  sel.vozTranscript = '';
  sel.vozAudioURL = null;
  sel.vozBloque2Result = null;
  sel.vozBloque2Loading = false;
  saveState();
  render();
}

function renderModuleComplete(mod) {
  let exercises = 0, correct = 0;
  mod.screens.forEach((s, idx) => {
    if (s.type === 'quiz_single' || s.type === 'quiz_multi') {
      exercises++;
      const sel = state.selections[`${state.moduleIdx}-${idx}`];
      if (sel && sel.validated) {
        const correctIdxs = s.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
        const allCorrect = sel.picked.length === correctIdxs.length && sel.picked.every(i => correctIdxs.includes(i));
        if (allCorrect) correct++;
      }
    }
  });

  const statsHtml = exercises > 0 ? `
    <div class="completion-stats">
      <div class="stat"><div class="stat-label">Ejercicios</div><div class="stat-value">${correct}/${exercises}</div></div>
      <div class="stat"><div class="stat-label">Pantallas</div><div class="stat-value">${mod.screens.length}</div></div>
      <div class="stat"><div class="stat-label">Duración</div><div class="stat-value">${mod.time}</div></div>
    </div>` : '';

  return `
    <div class="completion-card">
      <div class="completion-badge">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2 class="completion-title">Módulo completado</h2>
      <div class="completion-desc">Has terminado el módulo "${mod.title}". Sigue con el siguiente para profundizar.</div>
      ${statsHtml}
    </div>`;
}

function goHome() {
  // Seguridad: si quedó una grabación de roleplay abierta, cerrarla (y subirla).
  try { if (__ocRpRec && __ocRpRec.active) ocRpFinishRecording(__ocRpRec.key); } catch(e){}
  try { if (__ocRecognition) { __ocRecognition.abort(); __ocRecognition = null; } } catch(e){}
  state.view = 'home';
  state.moduleIdx = null;
  state.screenIdx = 0;
  render();
}

function openModule(idx) {
  state.view = 'module';
  state.moduleIdx = idx;
  state.screenIdx = 0;
  render();
}

function navBack() {
  if (state.view !== 'module') return;
  if (state.screenIdx > 0) {
    state.screenIdx--;
    render();
  } else {
    goHome();
  }
}

function navNext() {
  if (state.view !== 'module') return;
  const mod = COURSE.modules[state.moduleIdx];
  const screen = mod.screens[state.screenIdx];
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];

  // Quiz aún no validado → validar
  if ((screen.type === 'quiz_single' || screen.type === 'quiz_multi') && sel && sel.picked.length > 0 && !sel.validated) {
    checkAnswer();
    return;
  }
  // Practice subject aún no validado → validar
  if (screen.type === 'practice_subject' && sel && sel.text && sel.text.trim().length > 0 && !sel.validated) {
    validatePracticeSubject();
    return;
  }
  // Practice email aún no validado → validar
  if (screen.type === 'practice_email' && sel && sel.text && sel.text.trim().length > 10 && !sel.validated) {
    validatePracticeEmail();
    return;
  }

  // Quiz validado pero incorrecto/parcial → REINTENTAR (no avanza)
  if ((screen.type === 'quiz_single' || screen.type === 'quiz_multi') && sel && sel.validated && !isExerciseCorrect(screen, sel)) {
    retryExercise();
    return;
  }
  // Practice validado pero no 100% → REINTENTAR (no avanza)
  if ((screen.type === 'practice_subject' || screen.type === 'practice_email') && sel && sel.validated && !isExerciseCorrect(screen, sel)) {
    retryPractice();
    return;
  }

  // Avanzar (solo si ejercicio está perfecto, o si es lección sin validación)
  if (state.screenIdx < mod.screens.length - 1) {
    state.screenIdx++;
    render();
  } else {
    state.completedModules.add(state.moduleIdx);
    saveState();
    try {
      if (window.OpenClusterProgress && typeof window.OpenClusterProgress.onModuleComplete === 'function') {
        window.OpenClusterProgress.onModuleComplete({
          curso: 'proceso',
          moduloId: mod.id,
          moduloTitulo: mod.title,
          segmento: mod.segmento || null,
          completados: ocCompletedVisible(),
          total: ocVisibleCount()
        });
      }
    } catch (e) { /* el reporte de progreso nunca debe romper el curso */ }
    state.screenIdx = mod.screens.length;
    render();
  }
}

/* ═════════════════════════════════════════════════════════════
   VERIFICAR SI EJERCICIO ESTÁ PERFECTO
   ═════════════════════════════════════════════════════════════ */
function isExerciseCorrect(screen, sel) {
  if (!sel) return false;

  // Helper: ¿ya cumplió el gate de IA para los ejercicios que tienen aiEjercicioId?
  // El gate se cumple si:
  //  - aceptó el feedback con "Entendido, avanzar" (aiAccepted), o
  //  - estamos en replay (módulo ya completado antes), o
  //  - hubo 3+ fallos consecutivos y usó el salvavidas (aiSkippedByStrikes), o
  //  - el servicio de IA no está cargado en el entorno (aiResult === 'unavailable').
  function aiGateOk() {
    if (!screen.aiEjercicioId) return true; // ejercicios sin IA: no aplica
    if (aiIsModuleInReplay()) return true;
    if (sel.aiSkippedByStrikes) return true;
    if (sel.aiResult === 'unavailable') return true;
    return !!sel.aiAccepted;
  }

  if (screen.type === 'quiz_single' || screen.type === 'quiz_multi') {
    if (!sel.validated) return false;
    const correctIdxs = screen.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
    return sel.picked.length === correctIdxs.length && sel.picked.every(i => correctIdxs.includes(i));
  }
  if (screen.type === 'checklist') {
    const items = screen.items || [];
    const checked = (sel && sel.checked) || {};
    return items.length > 0 && items.every((_, i) => checked[i]);
  }
  if (screen.type === 'practice_subject' || screen.type === 'practice_email') {
    if (!sel.validated) return false;
    if (!screen.validations) return false;
    const structuralOk = screen.validations.every(v => v.test(sel.text || ''));
    // Feedback de IA OPCIONAL: pasar los criterios estructurales basta para avanzar.
    return structuralOk;
  }
  if (screen.type === 'practice_roleplay_chat' || screen.type === 'practice_roleplay_voz') {
    // Para roleplays: hay que terminar la conversación Y aceptar la evaluación final
    // (o saltarla por strikes, o estar en replay, o no tener IA disponible).
    if (!sel.rpEnded) return false;
    if (aiIsModuleInReplay()) return true;
    if (sel.rpSkippedByStrikes) return true;
    if (sel.rpFinalResult === 'unavailable') return true;
    return !!sel.rpFinalAccepted;
  }
  if (screen.type === 'practice_voz_bloques') {
    // Bloques 1 y 3 mantienen su propia regla; el bloque 2 (IA) es obligatorio aceptarlo
    // salvo replay/strikes/no disponible.
    if (!sel.vozGrabado || !sel.vozChecklistCompleto) return false;
    if (aiIsModuleInReplay()) return true;
    if (sel.vozBloque2SkippedByStrikes) return true;
    if (sel.vozBloque2Result === 'unavailable') return true;
    return !!sel.vozBloque2Accepted;
  }
  return false;
}

/* ═════════════════════════════════════════════════════════════
   REINTENTAR EJERCICIO (resetea selecciones, mantiene el feedback un momento)
   ═════════════════════════════════════════════════════════════ */
function retryExercise() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  delete state.selections[key];
  saveState();
  render();
}

function retryPractice() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (sel) {
    // Mantener el texto que el usuario escribió, solo quitar la validación
    sel.validated = false;
    state.selections[key] = sel;
    saveState();
    render();
  }
}

/* ═════════════════════════════════════════════════════════════
   UPDATE FOOTER NAV
   ═════════════════════════════════════════════════════════════ */
function updateFooterNav(mod, screen) {
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');

  btnNext.classList.remove('hidden');
  btnBack.onclick = navBack;
  btnNext.onclick = navNext;
  btnBack.innerHTML = '← Anterior';
  btnBack.disabled = false;

  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];

  if (screen.type === 'lesson' || screen.type === 'glossary') {
    btnNext.disabled = false;
    btnNext.innerHTML = 'Continuar →';
  } else if (screen.type === 'quiz_single' || screen.type === 'quiz_multi') {
    if (!sel || sel.picked.length === 0) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Selecciona una respuesta';
    } else if (!sel.validated) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Verificar respuesta';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = false;
      btnNext.innerHTML = '↻ Intentar de nuevo';
    } else {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Continuar →';
    }
  } else if (screen.type === 'checklist') {
    const items = screen.items || [];
    const checked = (sel && sel.checked) || {};
    const faltan = items.filter((_, i) => !checked[i]).length;
    if (faltan === 0 && items.length) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Continuar →';
    } else {
      btnNext.disabled = true;
      btnNext.innerHTML = `Marca los ${faltan} pasos que faltan`;
    }
  } else if (screen.type === 'practice_subject') {
    if (!sel || !sel.text || sel.text.trim().length === 0) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Escribe tu respuesta';
    } else if (!sel.validated) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Validar asunto';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = false;
      btnNext.innerHTML = '↻ Corregir y volver a validar';
    } else {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Continuar →';
    }
  } else if (screen.type === 'practice_email') {
    const wc = sel && sel.text ? sel.text.trim().split(/\s+/).filter(Boolean).length : 0;
    if (!sel || wc < 20) {
      btnNext.disabled = true;
      btnNext.innerHTML = wc === 0 ? 'Escribe tu correo' : 'Escribe al menos 20 palabras';
    } else if (!sel.validated) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Validar correo';
    } else if (!isExerciseCorrect(screen, sel)) {
      // Distinguir: ¿falta arreglar estructura, o falta el gate IA?
      const structuralOk = screen.validations && screen.validations.every(v => v.test(sel.text || ''));
      if (!structuralOk) {
        btnNext.disabled = false;
        btnNext.innerHTML = '↻ Corregir y volver a validar';
      } else if (screen.aiEjercicioId && !sel.aiAccepted && !sel.aiSkippedByStrikes && sel.aiResult !== 'unavailable' && !aiIsModuleInReplay()) {
        btnNext.disabled = true;
        btnNext.title = 'Pide y lee el feedback de la IA para avanzar.';
        btnNext.innerHTML = sel.aiResult ? 'Pulsa "Entendido" para avanzar' : 'Pide el feedback de la IA';
      } else {
        btnNext.disabled = false;
        btnNext.innerHTML = '↻ Corregir y volver a validar';
      }
    } else {
      btnNext.disabled = false;
      btnNext.title = '';
      btnNext.innerHTML = 'Continuar →';
    }
  } else if (screen.type === 'practice_roleplay_chat' || screen.type === 'practice_roleplay_voz') {
    if (!sel || !sel.rpEnded) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Termina la conversación primero';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = true;
      btnNext.title = 'Pide y lee el feedback de la IA para avanzar.';
      btnNext.innerHTML = sel.rpFinalResult && typeof sel.rpFinalResult === 'object' ? 'Pulsa "Entendido" para avanzar' : 'Pide la evaluación de la IA';
    } else {
      btnNext.disabled = false;
      btnNext.title = '';
      btnNext.innerHTML = 'Continuar →';
    }
  } else if (screen.type === 'practice_voz_bloques') {
    if (!sel || !sel.vozGrabado) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Graba tu voz primero';
    } else if (!sel.vozChecklistCompleto) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Completa la autoevaluación';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = true;
      btnNext.title = 'Pide y lee el feedback de la IA para avanzar.';
      btnNext.innerHTML = sel.vozBloque2Result && typeof sel.vozBloque2Result === 'object' ? 'Pulsa "Entendido" para avanzar' : 'Pide la evaluación de contenido';
    } else {
      btnNext.disabled = false;
      btnNext.title = '';
      btnNext.innerHTML = 'Continuar →';
    }
  }

  // Texto de "Finalizar módulo" cuando es último screen y el ejercicio está perfecto (o es lección)
  const isLastScreen = state.screenIdx === mod.screens.length - 1;
  const isLessonType = screen.type === 'lesson' || screen.type === 'glossary';
  const isExerciseDone = sel && isExerciseCorrect(screen, sel);
  if (isLastScreen && (isLessonType || isExerciseDone)) {
    btnNext.innerHTML = 'Finalizar módulo →';
  }
}

/* ═════════════════════════════════════════════════════════════
   UPDATE PROGRESO GLOBAL
   ═════════════════════════════════════════════════════════════ */
function updateGlobalProgress() {
  const total = ocVisibleCount();
  const completed = ocCompletedVisible();
  const pct = total ? (completed / total) * 100 : 0;
  document.getElementById('globalProgressFill').style.width = pct + '%';
  document.getElementById('globalProgressLabel').textContent = `${completed} de ${total} módulos`;
}

/* ═════════════════════════════════════════════════════════════
   INICIO
   ═════════════════════════════════════════════════════════════ */
loadState();
render();
</script>
