<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia OpenCluster · El arte del outreach por email</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────
   VARIABLES (DESIGN_SYSTEM de OpenCluster)
   ───────────────────────────────────────────────────────────── */
:root {
  --oct-navy:       #001A60;
  --oct-sky:        #06B3FD;
  --oct-orange:     #FF7E00;
  --oct-ltblue:     #D6EEFF;
  --oct-page-bg:    #FAFBFC;
  --oct-softblue:   #ECF6FF;
  --oct-cream:      #FFF4EA;
  --oct-text:       #1F2937;
  --oct-text-soft:  #6B7280;
  --oct-text-mute:  #9CA3AF;
  --oct-divider:    #D1D5DB;
  --oct-border:     rgba(0,0,0,0.08);
  --oct-bg:         #F9FAFB;
  --green:          #059669;
  --green-bg:       #ECFDF5;
  --green-border:   #6EE7B7;
  --red:            #DC2626;
  --red-bg:         #FEF2F2;
  --red-border:     #FCA5A5;
  --amber:          #D97706;
  --amber-bg:       #FFFBEB;
  --amber-border:   #FCD34D;
}

/* ─────────────────────────────────────────────────────────────
   RESET Y BASE
   ───────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Manrope', -apple-system, system-ui, sans-serif;
  background: var(--oct-page-bg);
  color: var(--oct-text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
}

input, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

::selection {
  background: var(--oct-ltblue);
  color: var(--oct-navy);
}

/* ─────────────────────────────────────────────────────────────
   HEADER (barra superior fija)
   ───────────────────────────────────────────────────────────── */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: white;
  border-bottom: 1px solid var(--oct-border);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--oct-navy);
}

.brand-mark {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--oct-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.02em;
}

.brand-name {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}

.brand-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--oct-text-soft);
  letter-spacing: 0.04em;
  margin-top: 2px;
}

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--oct-divider);
}

.course-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--oct-text);
}

.course-progress-pill {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: var(--oct-softblue);
  border-radius: 999px;
  font-size: 12px;
  color: var(--oct-navy);
  font-weight: 500;
}

.progress-bar-tiny {
  width: 80px;
  height: 4px;
  background: rgba(0,26,96,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-tiny-fill {
  height: 100%;
  background: var(--oct-navy);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.exit-link {
  font-size: 12px;
  color: var(--oct-text-soft);
  font-weight: 500;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 8px;
  transition: background 0.15s;
}

.exit-link:hover { background: var(--oct-bg); }

/* ─────────────────────────────────────────────────────────────
   LAYOUT PRINCIPAL
   ───────────────────────────────────────────────────────────── */
.app-main {
  max-width: 920px;
  margin: 0 auto;
  padding: 48px 24px 120px 24px;
}

/* ─────────────────────────────────────────────────────────────
   VISTA HOME (catálogo del curso)
   ───────────────────────────────────────────────────────────── */
.home-hero {
  margin-bottom: 40px;
  animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1);
}

.home-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--oct-sky);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.home-title {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--oct-navy);
  line-height: 1.15;
  margin-bottom: 12px;
  max-width: 700px;
}

.home-lede {
  font-size: 17px;
  color: var(--oct-text-soft);
  max-width: 640px;
  line-height: 1.5;
}

.home-meta {
  display: flex;
  gap: 32px;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--oct-border);
}

.home-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.home-meta-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--oct-text-mute);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.home-meta-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--oct-navy);
  letter-spacing: -0.01em;
}

/* Lista de módulos */
.modules-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 16px;
}

.module-card {
  background: white;
  border: 1px solid var(--oct-border);
  border-radius: 12px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  text-align: left;
  width: 100%;
}

.module-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,26,96,0.08);
  border-color: rgba(0,26,96,0.16);
}

.module-card.locked {
  opacity: 0.55;
  cursor: not-allowed;
}

.module-card.locked:hover {
  transform: none;
  box-shadow: none;
  border-color: var(--oct-border);
}

.module-card.completed {
  background: linear-gradient(180deg, rgba(5,150,105,0.02), white);
  border-color: rgba(5,150,105,0.2);
}

.module-num {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--oct-softblue);
  color: var(--oct-navy);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.01em;
  flex-shrink: 0;
  transition: all 0.2s;
}

.module-card.completed .module-num {
  background: var(--green-bg);
  color: var(--green);
}

.module-card.locked .module-num {
  background: var(--oct-bg);
  color: var(--oct-text-mute);
}

.module-body {
  flex: 1;
  min-width: 0;
}

.module-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--oct-navy);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

.module-desc {
  font-size: 13px;
  color: var(--oct-text-soft);
  line-height: 1.5;
}

.module-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.module-time {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--oct-text-mute);
  font-weight: 500;
  letter-spacing: 0.04em;
}

.module-screens {
  font-size: 11px;
  color: var(--oct-text-mute);
  font-weight: 500;
  letter-spacing: 0.04em;
}

.module-status {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--oct-text-mute);
  text-transform: uppercase;
}

.module-status.in-progress {
  color: var(--oct-sky);
}

.module-status.completed {
  color: var(--green);
}

.module-arrow {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--oct-text-mute);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.module-card:hover .module-arrow {
  transform: translateX(2px);
  color: var(--oct-navy);
}

/* ─────────────────────────────────────────────────────────────
   VISTA MÓDULO (pantallas del módulo activo)
   ───────────────────────────────────────────────────────────── */
.module-header {
  margin-bottom: 28px;
  animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1);
}

.module-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--oct-text-soft);
  padding: 6px 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  margin-left: -12px;
  transition: background 0.15s;
}

.module-back:hover { background: var(--oct-bg); color: var(--oct-navy); }

.module-step-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--oct-sky);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.module-step-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--oct-navy);
  line-height: 1.2;
}

/* Barra de progreso del módulo (puntos por pantalla) */
.module-progress-dots {
  display: flex;
  gap: 4px;
  margin-top: 20px;
}

.dot {
  height: 3px;
  background: var(--oct-divider);
  border-radius: 2px;
  flex: 1;
  transition: background 0.3s;
}

.dot.completed { background: var(--oct-sky); }
.dot.active { background: var(--oct-navy); }

/* Card de contenido */
.screen-card {
  background: white;
  border: 1px solid var(--oct-border);
  border-radius: 16px;
  padding: 36px 40px;
  animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1);
}

.screen-card h2 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--oct-navy);
  line-height: 1.25;
  margin-bottom: 16px;
}

.screen-card p {
  font-size: 15px;
  color: var(--oct-text);
  line-height: 1.65;
  margin-bottom: 16px;
}

.screen-card p:last-child { margin-bottom: 0; }

.screen-card p strong {
  color: var(--oct-navy);
  font-weight: 700;
}

.screen-card ul, .screen-card ol {
  margin: 4px 0 20px 24px;
  padding: 0;
}

.screen-card li {
  font-size: 15px;
  color: var(--oct-text);
  line-height: 1.6;
  margin-bottom: 10px;
}

.screen-card li:last-child { margin-bottom: 0; }

/* Callouts (cuadros de dato destacado) */
.callout {
  border-radius: 12px;
  padding: 20px 24px;
  margin: 20px 0;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.callout-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 800;
  font-size: 13px;
}

.callout-body {
  flex: 1;
}

.callout-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.callout-text {
  font-size: 14px;
  line-height: 1.55;
}

.callout-text strong {
  font-weight: 700;
}

.callout.data {
  background: var(--oct-softblue);
}

.callout.data .callout-icon {
  background: var(--oct-sky);
  color: white;
}

.callout.data .callout-label { color: var(--oct-sky); }
.callout.data .callout-text { color: var(--oct-text); }
.callout.data .callout-text strong { color: var(--oct-navy); }

.callout.rule {
  background: var(--oct-cream);
}

.callout.rule .callout-icon {
  background: var(--oct-orange);
  color: white;
}

.callout.rule .callout-label { color: var(--oct-orange); }
.callout.rule .callout-text strong { color: var(--oct-navy); }

.callout.warning {
  background: var(--red-bg);
}

.callout.warning .callout-icon {
  background: var(--red);
  color: white;
}

.callout.warning .callout-label { color: var(--red); }
.callout.warning .callout-text strong { color: var(--red); }

/* Tablas dentro de lessons */
.lesson-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 20px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--oct-border);
}

.lesson-table th {
  background: var(--oct-navy);
  color: white;
  font-size: 12px;
  font-weight: 700;
  text-align: left;
  padding: 12px 16px;
  letter-spacing: 0.02em;
}

.lesson-table td {
  padding: 12px 16px;
  font-size: 13px;
  border-top: 1px solid var(--oct-border);
  color: var(--oct-text);
  vertical-align: top;
  line-height: 1.5;
}

.lesson-table tr:nth-child(even) td { background: #FAFBFC; }

/* Ejemplo de email dentro de lección */
.email-example {
  background: #FCFCFD;
  border: 1px solid var(--oct-border);
  border-left: 4px solid var(--oct-divider);
  border-radius: 8px;
  padding: 18px 22px;
  margin: 18px 0;
  font-size: 13.5px;
  line-height: 1.6;
}

.email-example.good { border-left-color: var(--green); background: var(--green-bg); }
.email-example.bad { border-left-color: var(--red); background: var(--red-bg); }

.email-example-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.email-example.good .email-example-tag { background: var(--green); color: white; }
.email-example.bad .email-example-tag { background: var(--red); color: white; }

.email-example-subject {
  font-size: 12px;
  color: var(--oct-text-soft);
  margin-bottom: 8px;
}

.email-example-subject strong { color: var(--oct-text); font-weight: 700; }

.email-example-body {
  font-size: 13.5px;
  color: var(--oct-text);
  white-space: pre-line;
  line-height: 1.6;
}

/* Glosario - tabla expandible */
.glossary {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--oct-border);
  border-radius: 12px;
  overflow: hidden;
  margin: 16px 0;
  border: 1px solid var(--oct-border);
}

.glossary-row {
  display: grid;
  grid-template-columns: 180px 1fr;
  background: white;
  padding: 14px 18px;
  gap: 16px;
  align-items: start;
}

.glossary-term {
  font-size: 13px;
  font-weight: 700;
  color: var(--oct-navy);
}

.glossary-def {
  font-size: 13.5px;
  color: var(--oct-text);
  line-height: 1.55;
}

.glossary-def em {
  color: var(--oct-text-soft);
  font-style: normal;
  font-size: 12px;
  display: block;
  margin-top: 4px;
}

/* ─────────────────────────────────────────────────────────────
   EJERCICIOS
   ───────────────────────────────────────────────────────────── */
.exercise-intro {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--oct-orange);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.exercise-intro::before {
  content: "";
  width: 4px;
  height: 16px;
  background: var(--oct-orange);
  border-radius: 2px;
}

.question {
  font-size: 19px;
  font-weight: 700;
  color: var(--oct-navy);
  letter-spacing: -0.01em;
  line-height: 1.35;
  margin-bottom: 6px;
}

.question-hint {
  font-size: 13px;
  color: var(--oct-text-soft);
  margin-bottom: 24px;
}

/* Opciones de quiz */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  background: white;
  border: 1.5px solid var(--oct-border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  width: 100%;
  font-size: 14px;
  line-height: 1.5;
  color: var(--oct-text);
}

.option:hover:not(.disabled) {
  border-color: var(--oct-sky);
  background: var(--oct-softblue);
}

.option.selected {
  border-color: var(--oct-navy);
  background: var(--oct-softblue);
}

.option.correct {
  border-color: var(--green);
  background: var(--green-bg);
}

.option.incorrect {
  border-color: var(--red);
  background: var(--red-bg);
}

.option.disabled { cursor: default; }

.option-marker {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--oct-divider);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  margin-top: 1px;
}

.option-marker.square {
  border-radius: 5px;
}

.option.selected .option-marker {
  border-color: var(--oct-navy);
  background: var(--oct-navy);
}

.option.correct .option-marker {
  border-color: var(--green);
  background: var(--green);
}

.option.incorrect .option-marker {
  border-color: var(--red);
  background: var(--red);
}

.option-marker svg {
  width: 14px;
  height: 14px;
  color: white;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.15s;
}

.option.selected .option-marker svg,
.option.correct .option-marker svg,
.option.incorrect .option-marker svg {
  opacity: 1;
  transform: scale(1);
}

.option-text {
  flex: 1;
  padding-top: 1px;
}

.option-text em {
  color: var(--oct-text-soft);
  font-style: normal;
  font-size: 12px;
  display: block;
  margin-top: 2px;
}

/* Feedback */
.feedback {
  border-radius: 12px;
  padding: 18px 22px;
  margin-top: 20px;
  animation: fadeUp 0.3s cubic-bezier(0.4,0,0.2,1);
}

.feedback.correct {
  background: var(--green-bg);
  border: 1px solid var(--green-border);
}

.feedback.incorrect {
  background: var(--red-bg);
  border: 1px solid var(--red-border);
}

.feedback.partial {
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
}

.feedback-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.feedback.correct .feedback-title { color: var(--green); }
.feedback.incorrect .feedback-title { color: var(--red); }
.feedback.partial .feedback-title { color: var(--amber); }

.feedback-body {
  font-size: 14px;
  color: var(--oct-text);
  line-height: 1.55;
}

.feedback-body strong { color: var(--oct-navy); font-weight: 700; }

/* Ejercicio de escritura (asunto, correo) */
.write-input {
  width: 100%;
  background: white;
  border: 1.5px solid var(--oct-border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 15px;
  color: var(--oct-text);
  transition: border-color 0.15s;
  margin-bottom: 8px;
  font-family: inherit;
}

.write-input:focus {
  outline: none;
  border-color: var(--oct-navy);
}

.write-textarea {
  width: 100%;
  background: white;
  border: 1.5px solid var(--oct-border);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--oct-text);
  min-height: 180px;
  resize: vertical;
  font-family: inherit;
  line-height: 1.55;
  transition: border-color 0.15s;
}

.write-textarea:focus {
  outline: none;
  border-color: var(--oct-navy);
}

.write-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--oct-text-mute);
  margin-bottom: 16px;
  letter-spacing: 0.04em;
}

.write-meta .warn { color: var(--amber); font-weight: 700; }
.write-meta .err { color: var(--red); font-weight: 700; }
.write-meta .ok { color: var(--green); font-weight: 700; }

/* Checklist de validación */
.validation-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.validation-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-top: 1px solid var(--oct-border);
  font-size: 13.5px;
}

            <p>La Academia OpenCluster nace para acompañarte en ese camino. Vamos a tener cursos sobre los productos (Tobii, TD Snap, bipedestadores, equipamiento clínico, sillas Kirón, productos para colegios y ortopedias), cursos sobre los procesos internos (CRM, cotización, postventa) y cursos sobre las habilidades comerciales del día a día. La idea es sumar uno por semana.</p>

            <p>Lo que sí cambió, y mucho, es la barra de calidad. Los compradores B2B detectan el envío masivo en segundos. Los filtros antispam de Gmail y Outlook se endurecieron. Y el comprador promedio decide si abre o elimina tu correo en menos de cuatro segundos.</p>

            <p>Para OpenCluster esto importa especialmente porque vendemos a instituciones que toman decisiones con procesos formales. El primer contacto rara vez es por teléfono (los decisores no atienden números desconocidos) y casi nunca es presencial. Es por email. Es ahí donde el receptor lee tu propuesta, donde queda constancia escrita de tu profesionalismo y donde, en muchos casos, comienza o termina la relación.</p>

/* ═════════════════════════════════════════════════════════════
   ESTADO
   ═════════════════════════════════════════════════════════════ */
const state = {
  view: 'home',
  moduleIdx: null,
  screenIdx: 0,
  completedModules: new Set(),
  selections: {}
};

const STORAGE_KEY = 'opencluster_academy_outreach_v1';

/* ─── Sync de progreso con el backend ACADEMIA_API (panel admin de Rayen) ───
   Mientras ACADEMIA_API esté vacío, pushProgress() no hace nada (modo solo-local).
   Pegar aquí la URL /exec del Web App cuando esté desplegado. */
const ACADEMIA_API = 'https://script.google.com/macros/s/AKfycbzK0XFzsT-6_ImJYugk-4BsdYXft-7Mv0PhEIuw-wdv95Ln6cd1fOUVJEmENxy21ApRHg/exec';
const COURSE_ID = 'Outreach por email';

function getEjecutivo() {
  try { return localStorage.getItem('oc_central_user') || ''; } catch (e) { return ''; }
}

function pushProgress() {
  if (!ACADEMIA_API) return;            // backend aún no configurado → solo localStorage
  var ejecutivo = getEjecutivo();
  if (!ejecutivo) return;               // entró sin login de la Central → no se puede atribuir
  var total = COURSE.modules.length;
  var completados = state.completedModules.size;
  var pct = total ? Math.round(completados / total * 100) : 0;
  var payload = {
    ejecutivo: ejecutivo,
    curso: COURSE_ID,
    modulos_completados: completados,
    total_modulos: total,
    pct: pct,
    modulos_idx: Array.from(state.completedModules).sort(function(a, b){ return a - b; }).join(',')
  };
  try {
    fetch(ACADEMIA_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).catch(function(){});
  } catch (e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedModules: Array.from(state.completedModules),
      selections: state.selections
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.completedModules = new Set(data.completedModules || []);
    state.selections = data.selections || {};
  } catch(e) {}
}

function resetCourse() {
  if (!confirm('¿Reiniciar el curso? Vas a perder el progreso guardado.')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state.view = 'home';
  state.moduleIdx = null;
  state.screenIdx = 0;
  state.completedModules = new Set();
  state.selections = {};
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER PRINCIPAL
   ═════════════════════════════════════════════════════════════ */
function render() {
  const main = document.getElementById('mainContent');
  const footer = document.getElementById('footerNav');
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');

  updateGlobalProgress();
  btnBack.classList.remove('hidden');
  btnNext.classList.remove('hidden');

  if (state.view === 'home') {
    main.innerHTML = renderHome();
    footer.classList.add('hidden');
  } else if (state.view === 'module') {
    const mod = COURSE.modules[state.moduleIdx];

    if (state.screenIdx >= mod.screens.length) {
      main.innerHTML = renderModuleComplete(mod);
      footer.classList.remove('hidden');
      btnBack.onclick = goHome;
      btnBack.innerHTML = '← Volver al curso';
      btnBack.disabled = false;
      const nextMod = COURSE.modules[state.moduleIdx + 1];
      if (nextMod) {
        btnNext.innerHTML = 'Empezar siguiente módulo →';
        btnNext.onclick = () => openModule(state.moduleIdx + 1);
      } else {
        btnNext.innerHTML = 'Finalizar curso →';
        btnNext.onclick = () => { state.view = 'finish'; render(); };
      }
      btnNext.disabled = false;
    } else {
      const screen = mod.screens[state.screenIdx];
      main.innerHTML = renderScreen(mod, screen);
      footer.classList.remove('hidden');
      updateFooterNav(mod, screen);
    }
  } else if (state.view === 'finish') {
    main.innerHTML = renderCourseComplete();
    footer.classList.remove('hidden');
    btnBack.onclick = goHome;
    btnBack.innerHTML = '← Volver al inicio';
    btnBack.disabled = false;
    btnNext.classList.add('hidden');
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═════════════════════════════════════════════════════════════
   RENDER VISTA HOME
   ═════════════════════════════════════════════════════════════ */
function renderHome() {
  const completed = state.completedModules.size;
  const total = COURSE.modules.length;
  const isComplete = completed === total;

  const modulesHtml = COURSE.modules.map((mod, idx) => {
    const isCompleted = state.completedModules.has(idx);
    const prevCompleted = idx === 0 || state.completedModules.has(idx - 1);
    const isLocked = !prevCompleted && !isCompleted;
    const classes = ['module-card'];
    if (isCompleted) classes.push('completed');
    if (isLocked) classes.push('locked');

    const status = isCompleted
      ? '<div class="module-status completed">Completado</div>'
      : (prevCompleted && !isLocked ? '<div class="module-status in-progress">Disponible</div>' : '<div class="module-status">Bloqueado</div>');

    const onClick = isLocked ? '' : `onclick="openModule(${idx})"`;

    return `
      <button class="${classes.join(' ')}" ${onClick}>
        <div class="module-num">${idx + 1}</div>
        <div class="module-body">
          <div class="module-title">${mod.title}</div>
          <div class="module-desc">${mod.desc}</div>
          <div class="module-meta">
            <span class="module-time">⏱  ${mod.time}</span>
            <span class="module-screens">${mod.screens.length} pantallas</span>
          </div>
        </div>
        ${status}
        <div class="module-arrow">→</div>
      </button>
    `;
  }).join('');

  return `
    <div class="home-hero">
      <div class="home-eyebrow">Curso · Comunicación comercial</div>
      <h1 class="home-title">El arte del outreach por email</h1>
      <p class="home-lede">Aprende a escribir cold emails que se abran, se lean y reciban respuesta. Basado en investigación de Gong, HubSpot, Salesforce, Lavender, Apollo, Belkins, Boomerang y Lemlist.</p>
      <div class="home-meta">
        <div class="home-meta-item">
          <div class="home-meta-label">Módulos</div>
          <div class="home-meta-value">${total}</div>
        </div>
        <div class="home-meta-item">
          <div class="home-meta-label">Duración total</div>
          <div class="home-meta-value">~60 min</div>
        </div>
        <div class="home-meta-item">
          <div class="home-meta-label">Tu progreso</div>
          <div class="home-meta-value">${completed} / ${total}</div>
        </div>
        ${isComplete ? '<div class="home-meta-item"><div class="home-meta-label">Estado</div><div class="home-meta-value" style="color: var(--green);">Completado ✓</div></div>' : ''}
      </div>
    </div>
    <div class="modules-list">${modulesHtml}</div>
  `;
}

/* ═════════════════════════════════════════════════════════════
   RENDER PANTALLA DE MÓDULO
   ═════════════════════════════════════════════════════════════ */
function renderScreen(mod, screen) {
  const dotsHtml = mod.screens.map((_, idx) => {
    let cls = 'dot';
    if (idx < state.screenIdx) cls += ' completed';
    else if (idx === state.screenIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const header = `
    <div class="module-header">
      <button class="module-back" onclick="goHome()">← Volver al curso</button>
      <div class="module-step-label">${screen.stepLabel} · ${mod.title}</div>
      <div class="module-step-title">${screen.stepTitle}</div>
      <div class="module-progress-dots">${dotsHtml}</div>
    </div>
  `;

  let cardContent = '';

  if (screen.type === 'lesson') {
    cardContent = screen.body;
  } else if (screen.type === 'glossary') {
    const rows = screen.terms.map(t => `
      <div class="glossary-row">
        <div class="glossary-term">${t.term}</div>
        <div class="glossary-def">${t.def}${t.example ? `<em>${t.example}</em>` : ''}</div>
      </div>
    `).join('');
    cardContent = `<p>${screen.intro}</p><div class="glossary">${rows}</div>`;
  } else if (screen.type === 'quiz_single' || screen.type === 'quiz_multi') {
    cardContent = renderQuiz(mod, screen);
  } else if (screen.type === 'practice_subject') {
    cardContent = renderPracticeSubject(mod, screen);
  } else if (screen.type === 'practice_email') {
    cardContent = renderPracticeEmail(mod, screen);
  }

  return header + `<div class="screen-card">${cardContent}</div>`;
}

/* ═════════════════════════════════════════════════════════════
   RENDER QUIZ
   ═════════════════════════════════════════════════════════════ */
function renderQuiz(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { picked: [], validated: false };
  const isMulti = screen.type === 'quiz_multi';
  const customRender = screen.customRender || '';

  const optsHtml = screen.options.map((opt, idx) => {
    const picked = sel.picked.includes(idx);
    let cls = 'option';
    if (sel.validated) {
      if (picked && opt.correct) cls += ' correct';
      else if (picked && !opt.correct) cls += ' incorrect';
      else if (!picked && opt.correct) cls += ' correct';
      cls += ' disabled';
    } else if (picked) {
      cls += ' selected';
    }

    const onClick = sel.validated ? '' : `onclick="${isMulti ? 'toggleOption' : 'selectOption'}(${idx})"`;

    const markerSvg = isMulti
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
      : '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>';

    return `
      <button class="${cls}" ${onClick}>
        <div class="option-marker ${isMulti ? 'square' : ''}">${markerSvg}</div>
        <div class="option-text">${opt.text}</div>
      </button>
    `;
  }).join('');

  let feedbackHtml = '';
  if (sel.validated) feedbackHtml = renderQuizFeedback(screen, sel);

  return `
    ${customRender}
    <div class="exercise-intro">Ejercicio</div>
    <div class="question">${screen.question}</div>
    ${screen.hint ? `<div class="question-hint">${screen.hint}</div>` : ''}
    <div class="options">${optsHtml}</div>
    ${feedbackHtml}
  `;
}

function renderQuizFeedback(screen, sel) {
  const isMulti = screen.type === 'quiz_multi';
  const correctIdxs = screen.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
  const allCorrect = sel.picked.length === correctIdxs.length && sel.picked.every(i => correctIdxs.includes(i));
  const anyCorrect = sel.picked.some(i => correctIdxs.includes(i));
  const onlyCorrect = sel.picked.every(i => correctIdxs.includes(i));

  let type, body;
  if (allCorrect) {
    type = 'correct';
    body = screen.feedback.correct;
  } else if (isMulti && onlyCorrect && anyCorrect) {
    type = 'partial';
    body = screen.feedback.partial || screen.feedback.incorrect;
  } else if (isMulti && anyCorrect) {
    type = 'partial';
    body = screen.feedback.partial || screen.feedback.incorrect;
  } else {
    type = 'incorrect';
    body = screen.feedback.incorrect;
  }

  let perOption = '';
  if (!isMulti && sel.picked.length === 1) {
    const opt = screen.options[sel.picked[0]];
    if (opt.explain) {
      perOption = `<div class="feedback-body" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.08); font-style: italic; color: var(--oct-text-soft);">${opt.explain}</div>`;
    }
  }

  const titleText = type === 'correct' ? '✓ Correcto' : (type === 'partial' ? '~ Parcial' : '✗ Incorrecto');

  return `
    <div class="feedback ${type}">
      <div class="feedback-title">${titleText}</div>
      <div class="feedback-body">${body}</div>
      ${perOption}
    </div>
  `;
}

function selectOption(idx) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  state.selections[key] = { picked: [idx], validated: false };
  saveState();
  render();
}

function toggleOption(idx) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { picked: [], validated: false };
  if (sel.picked.includes(idx)) {
    sel.picked = sel.picked.filter(i => i !== idx);
  } else {
    sel.picked = [...sel.picked, idx];
  }
  state.selections[key] = sel;
  saveState();
  render();
}

function checkAnswer() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || sel.picked.length === 0) return;
  sel.validated = true;
  saveState();
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER PRACTICE SUBJECT
   ═════════════════════════════════════════════════════════════ */
function renderPracticeSubject(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  const text = sel.text || '';
  const charCount = text.length;
  let charCls = '';
  if (charCount > 60) charCls = 'err';
  else if (charCount >= 30 && charCount <= 60) charCls = 'ok';
  else if (charCount > 0) charCls = 'warn';

  let feedbackHtml = '';
  if (sel.validated) {
    const items = screen.validations.map(v => {
      const passed = v.test(text);
      return `
        <li class="validation-item">
          <div class="validation-check ${passed ? 'pass' : 'fail'}">
            ${passed
              ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
              : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'}
          </div>
          <div class="validation-text">${v.label}<em>${v.hint}</em></div>
        </li>`;
    }).join('');
    const passedCount = screen.validations.filter(v => v.test(text)).length;
    const totalCount = screen.validations.length;
    const fbType = passedCount === totalCount ? 'correct' : (passedCount >= totalCount - 1 ? 'partial' : 'incorrect');
    const fbTitle = passedCount === totalCount ? '✓ Asunto excelente' : (passedCount >= totalCount - 1 ? '~ Casi perfecto' : '✗ Hay cosas por mejorar');
    feedbackHtml = `
      <div class="feedback ${fbType}">
        <div class="feedback-title">${fbTitle} — ${passedCount} de ${totalCount} criterios</div>
        <div class="feedback-body" style="margin-top: 10px;"><ul class="validation-list">${items}</ul></div>
      </div>`;
  }

  return `
    <p>${screen.context}</p>
    <p style="margin-top: 12px;"><strong>${screen.instruction}</strong></p>
    <div style="margin-top: 24px;">
      <input type="text" class="write-input" id="practiceInput" placeholder="${screen.placeholder}" value="${text.replace(/"/g, '&quot;')}" oninput="updatePracticeSubject(this.value)" ${sel.validated ? 'disabled' : ''}>
      <div class="write-meta">
        <span class="${charCls}">${charCount} caracteres</span>
        <span>Idealmente entre 30 y 60</span>
      </div>
    </div>
    ${feedbackHtml}`;
}

function updatePracticeSubject(value) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  sel.text = value;
  state.selections[key] = sel;
  saveState();
  const metas = document.querySelectorAll('.write-meta span');
  if (metas.length) {
    metas[0].textContent = `${value.length} caracteres`;
    metas[0].className = value.length > 60 ? 'err' : (value.length >= 30 && value.length <= 60 ? 'ok' : (value.length > 0 ? 'warn' : ''));
  }
  updateFooterNav(COURSE.modules[state.moduleIdx], COURSE.modules[state.moduleIdx].screens[state.screenIdx]);
}

function validatePracticeSubject() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.text || sel.text.trim().length === 0) return;
  sel.validated = true;
  state.selections[key] = sel;
  saveState();
  render();
}

/* ═════════════════════════════════════════════════════════════
   RENDER PRACTICE EMAIL
   ═════════════════════════════════════════════════════════════ */
function renderPracticeEmail(mod, screen) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  const text = sel.text || '';
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  let feedbackHtml = '';
  if (sel.validated) {
    const items = screen.validations.map(v => {
      const passed = v.test(text);
      const info = v.getInfo ? `<span style="color: var(--oct-text-mute); font-size: 11px; margin-left: 8px;">(${v.getInfo(text)})</span>` : '';
      return `
        <li class="validation-item">
          <div class="validation-check ${passed ? 'pass' : 'fail'}">
            ${passed
              ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
              : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'}
          </div>
          <div class="validation-text">${v.label}${info}<em>${v.hint}</em></div>
        </li>`;
    }).join('');
    const passedCount = screen.validations.filter(v => v.test(text)).length;
    const totalCount = screen.validations.length;
    const fbType = passedCount === totalCount ? 'correct' : (passedCount >= Math.ceil(totalCount * 0.75) ? 'partial' : 'incorrect');
    const fbTitle = passedCount === totalCount
      ? '✓ Correo excelente — cumple todos los criterios'
      : (passedCount >= Math.ceil(totalCount * 0.75) ? `~ Buen correo, mejorable — ${passedCount} de ${totalCount} criterios` : `✗ Por mejorar — ${passedCount} de ${totalCount} criterios`);
    feedbackHtml = `
      <div class="feedback ${fbType}">
        <div class="feedback-title">${fbTitle}</div>
        <div class="feedback-body" style="margin-top: 10px;"><ul class="validation-list">${items}</ul></div>
      </div>`;
  }

  return `
    <div style="background: var(--oct-softblue); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; font-size: 13.5px; line-height: 1.55;">${screen.context}</div>
    <textarea class="write-textarea" id="practiceEmail" placeholder="${screen.placeholder}" oninput="updatePracticeEmail(this.value)" ${sel.validated ? 'disabled' : ''}>${text}</textarea>
    <div class="write-meta">
      <span class="${wordCount > 150 ? 'err' : (wordCount >= 60 && wordCount <= 150 ? 'ok' : (wordCount > 0 ? 'warn' : ''))}">${wordCount} palabras</span>
      <span>Idealmente entre 60 y 150</span>
    </div>
    ${feedbackHtml}`;
}

function updatePracticeEmail(value) {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key] || { text: '', validated: false };
  sel.text = value;
  state.selections[key] = sel;
  saveState();
  const w = value.trim().split(/\s+/).filter(Boolean).length;
  const metas = document.querySelectorAll('.write-meta span');
  if (metas.length) {
    metas[0].textContent = `${w} palabras`;
    metas[0].className = w > 150 ? 'err' : (w >= 60 && w <= 150 ? 'ok' : (w > 0 ? 'warn' : ''));
  }
  updateFooterNav(COURSE.modules[state.moduleIdx], COURSE.modules[state.moduleIdx].screens[state.screenIdx]);
}

function validatePracticeEmail() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (!sel || !sel.text || sel.text.trim().length === 0) return;
  sel.validated = true;
  state.selections[key] = sel;
  saveState();
  render();
}

/* ═════════════════════════════════════════════════════════════
   PANTALLA DE MÓDULO COMPLETADO
   ═════════════════════════════════════════════════════════════ */
function renderModuleComplete(mod) {
  let exercises = 0, correct = 0;
  mod.screens.forEach((s, idx) => {
    if (s.type === 'quiz_single' || s.type === 'quiz_multi') {
      exercises++;
      const sel = state.selections[`${state.moduleIdx}-${idx}`];
      if (sel && sel.validated) {
        const correctIdxs = s.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
        const allCorrect = sel.picked.length === correctIdxs.length && sel.picked.every(i => correctIdxs.includes(i));
        if (allCorrect) correct++;
      }
    }
  });

  const statsHtml = exercises > 0 ? `
    <div class="completion-stats">
      <div class="stat"><div class="stat-label">Ejercicios</div><div class="stat-value">${correct}/${exercises}</div></div>
      <div class="stat"><div class="stat-label">Pantallas</div><div class="stat-value">${mod.screens.length}</div></div>
      <div class="stat"><div class="stat-label">Duración</div><div class="stat-value">${mod.time}</div></div>
    </div>` : '';

  return `
    <div class="completion-card">
      <div class="completion-badge">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2 class="completion-title">Módulo completado</h2>
      <div class="completion-desc">Has terminado el módulo "${mod.title}". Sigue con el siguiente para profundizar.</div>
      ${statsHtml}
    </div>`;
}

/* ═════════════════════════════════════════════════════════════
   PANTALLA DE CURSO FINALIZADO
   ═════════════════════════════════════════════════════════════ */
function renderCourseComplete() {
  return `
    <div class="course-finish">
      <div class="course-finish-badge">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.4 7.3H22l-6.2 4.5 2.4 7.2L12 16.6l-6.2 4.4 2.4-7.2L2 9.3h7.6L12 2z"/>
        </svg>
      </div>
      <div class="course-finish-eyebrow">Insignia obtenida</div>
      <h2 class="course-finish-title">Especialista en outreach por email</h2>
      <div class="course-finish-desc">Has completado los 6 módulos del curso. A partir de ahora, cada cold email que escribas tiene una base de conocimiento sólida detrás. Aplica lo aprendido en tus próximos contactos y mide el impacto.</div>
      <div class="completion-stats">
        <div class="stat"><div class="stat-label">Módulos</div><div class="stat-value">${COURSE.modules.length}/${COURSE.modules.length}</div></div>
        <div class="stat"><div class="stat-label">Estado</div><div class="stat-value" style="color: var(--green);">Completo</div></div>
      </div>
    </div>`;
}

/* ═════════════════════════════════════════════════════════════
   NAVEGACIÓN
   ═════════════════════════════════════════════════════════════ */
function goHome() {
  state.view = 'home';
  state.moduleIdx = null;
  state.screenIdx = 0;
  render();
}

function openModule(idx) {
  state.view = 'module';
  state.moduleIdx = idx;
  state.screenIdx = 0;
  render();
}

function navBack() {
  if (state.view !== 'module') return;
  if (state.screenIdx > 0) {
    state.screenIdx--;
    render();
  } else {
    goHome();
  }
}

function navNext() {
  if (state.view !== 'module') return;
  const mod = COURSE.modules[state.moduleIdx];
  const screen = mod.screens[state.screenIdx];
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];

  // Quiz aún no validado → validar
  if ((screen.type === 'quiz_single' || screen.type === 'quiz_multi') && sel && sel.picked.length > 0 && !sel.validated) {
    checkAnswer();
    return;
  }
  // Practice subject aún no validado → validar
  if (screen.type === 'practice_subject' && sel && sel.text && sel.text.trim().length > 0 && !sel.validated) {
    validatePracticeSubject();
    return;
  }
  // Practice email aún no validado → validar
  if (screen.type === 'practice_email' && sel && sel.text && sel.text.trim().length > 10 && !sel.validated) {
    validatePracticeEmail();
    return;
  }

  // Quiz validado pero incorrecto/parcial → REINTENTAR (no avanza)
  if ((screen.type === 'quiz_single' || screen.type === 'quiz_multi') && sel && sel.validated && !isExerciseCorrect(screen, sel)) {
    retryExercise();
    return;
  }
  // Practice validado pero no 100% → REINTENTAR (no avanza)
  if ((screen.type === 'practice_subject' || screen.type === 'practice_email') && sel && sel.validated && !isExerciseCorrect(screen, sel)) {
    retryPractice();
    return;
  }

  // Avanzar (solo si ejercicio está perfecto, o si es lección sin validación)
  if (state.screenIdx < mod.screens.length - 1) {
    state.screenIdx++;
    render();
  } else {
    state.completedModules.add(state.moduleIdx);
    saveState();
    pushProgress();
    state.screenIdx = mod.screens.length;
    render();
  }
}

/* ═════════════════════════════════════════════════════════════
   VERIFICAR SI EJERCICIO ESTÁ PERFECTO
   ═════════════════════════════════════════════════════════════ */
function isExerciseCorrect(screen, sel) {
  if (!sel || !sel.validated) return false;
  if (screen.type === 'quiz_single' || screen.type === 'quiz_multi') {
    const correctIdxs = screen.options.map((o, i) => o.correct ? i : -1).filter(i => i >= 0);
    return sel.picked.length === correctIdxs.length && sel.picked.every(i => correctIdxs.includes(i));
  }
  if (screen.type === 'practice_subject' || screen.type === 'practice_email') {
    return screen.validations.every(v => v.test(sel.text || ''));
  }
  return false;
}

/* ═════════════════════════════════════════════════════════════
   REINTENTAR EJERCICIO (resetea selecciones, mantiene el feedback un momento)
   ═════════════════════════════════════════════════════════════ */
function retryExercise() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  delete state.selections[key];
  saveState();
  render();
}

function retryPractice() {
  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];
  if (sel) {
    // Mantener el texto que el usuario escribió, solo quitar la validación
    sel.validated = false;
    state.selections[key] = sel;
    saveState();
    render();
  }
}

/* ═════════════════════════════════════════════════════════════
   UPDATE FOOTER NAV
   ═════════════════════════════════════════════════════════════ */
function updateFooterNav(mod, screen) {
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');

  btnNext.classList.remove('hidden');
  btnBack.onclick = navBack;
  btnNext.onclick = navNext;
  btnBack.innerHTML = '← Anterior';
  btnBack.disabled = false;

  const key = `${state.moduleIdx}-${state.screenIdx}`;
  const sel = state.selections[key];

  if (screen.type === 'lesson' || screen.type === 'glossary') {
    btnNext.disabled = false;
    btnNext.innerHTML = 'Continuar →';
  } else if (screen.type === 'quiz_single' || screen.type === 'quiz_multi') {
    if (!sel || sel.picked.length === 0) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Selecciona una respuesta';
    } else if (!sel.validated) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Verificar respuesta';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = false;
      btnNext.innerHTML = '↻ Intentar de nuevo';
    } else {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Continuar →';
    }
  } else if (screen.type === 'practice_subject') {
    if (!sel || !sel.text || sel.text.trim().length === 0) {
      btnNext.disabled = true;
      btnNext.innerHTML = 'Escribe tu respuesta';
    } else if (!sel.validated) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Validar asunto';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = false;
      btnNext.innerHTML = '↻ Corregir y volver a validar';
    } else {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Continuar →';
    }
  } else if (screen.type === 'practice_email') {
    const wc = sel && sel.text ? sel.text.trim().split(/\s+/).filter(Boolean).length : 0;
    if (!sel || wc < 20) {
      btnNext.disabled = true;
      btnNext.innerHTML = wc === 0 ? 'Escribe tu correo' : 'Escribe al menos 20 palabras';
    } else if (!sel.validated) {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Validar correo';
    } else if (!isExerciseCorrect(screen, sel)) {
      btnNext.disabled = false;
      btnNext.innerHTML = '↻ Corregir y volver a validar';
    } else {
      btnNext.disabled = false;
      btnNext.innerHTML = 'Continuar →';
    }
  }

  // Texto de "Finalizar módulo" cuando es último screen y el ejercicio está perfecto (o es lección)
  const isLastScreen = state.screenIdx === mod.screens.length - 1;
  const isLessonType = screen.type === 'lesson' || screen.type === 'glossary';
  const isExerciseDone = sel && sel.validated && isExerciseCorrect(screen, sel);
  if (isLastScreen && (isLessonType || isExerciseDone)) {
    btnNext.innerHTML = 'Finalizar módulo →';
  }
}

/* ═════════════════════════════════════════════════════════════
   UPDATE PROGRESO GLOBAL
   ═════════════════════════════════════════════════════════════ */
function updateGlobalProgress() {
  const total = COURSE.modules.length;
  const completed = state.completedModules.size;
  const pct = total ? (completed / total) * 100 : 0;
  document.getElementById('globalProgressFill').style.width = pct + '%';
  document.getElementById('globalProgressLabel').textContent = `${completed} de ${total} módulos`;
}

/* ═════════════════════════════════════════════════════════════
   INICIO
   ═════════════════════════════════════════════════════════════ */
loadState();
render();
</script>
