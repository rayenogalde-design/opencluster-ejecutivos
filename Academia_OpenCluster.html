<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia OpenCluster</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --oct-navy: #001A60;
  --oct-sky: #06B3FD;
  --oct-page-bg: #FAFBFC;
  --oct-softblue: #ECF6FF;
  --oct-text: #1F2937;
  --oct-text-soft: #6B7280;
  --oct-text-mute: #9CA3AF;
  --oct-border: rgba(0,0,0,0.08);
  --oct-white: #FFFFFF;
  --oct-success: #1B8A4F;
  --oct-success-bg: #E6F8EF;
  --oct-locked: #D1D5DB;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Manrope', -apple-system, system-ui, sans-serif;
  background: var(--oct-page-bg);
  color: var(--oct-text);
  font-weight: 400;
  line-height: 1.5;
  min-height: 100vh;
}
.wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }

.back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--oct-text-soft); text-decoration: none; font-size: 14px; font-weight: 500;
  padding: 8px 12px; border-radius: 8px; border: 1px solid var(--oct-border); background: var(--oct-white);
  margin-bottom: 28px;
}
.back:hover { color: var(--oct-navy); }

.hero { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 12px; }
.hero-icon {
  width: 56px; height: 56px; border-radius: 16px; flex-shrink: 0;
  background: linear-gradient(135deg, #e3ecff, #d6f3ff);
  display: flex; align-items: center; justify-content: center;
}
.hero h1 {
  font-size: 30px; font-weight: 800; color: var(--oct-navy);
  letter-spacing: -0.02em; line-height: 1.15;
}
.hero p { color: var(--oct-text-soft); font-size: 15px; margin-top: 6px; max-width: 580px; }

.path-note {
  margin: 6px 0 28px 0; padding-left: 74px;
  color: var(--oct-text-mute); font-size: 13px;
}

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

.course {
  display: block; text-decoration: none; color: inherit;
  background: var(--oct-white); border: 1px solid var(--oct-border);
  border-radius: 16px; overflow: hidden; position: relative;
  transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}
.course.unlocked:hover {
  transform: translateY(-2px);
  border-color: var(--oct-sky);
  box-shadow: 0 10px 28px rgba(0, 26, 96, 0.10);
}
.course.unlocked.done:hover { border-color: var(--oct-success); box-shadow: 0 10px 28px rgba(27, 138, 79, 0.12); }

.course-stripe { height: 6px; background: linear-gradient(90deg, var(--oct-sky), var(--oct-navy)); }
.course.done .course-stripe { background: linear-gradient(90deg, #4DC589, var(--oct-success)); }
.course.locked .course-stripe { background: var(--oct-locked); }

.course-body { padding: 22px 22px 24px; position: relative; }
.course-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.course-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #e3ecff, #d6f3ff);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.course.done .course-icon { background: linear-gradient(135deg, #DCF4E7, #B6E6CB); }
.course.locked .course-icon { background: #F3F4F6; }

.badge {
  font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
  background: var(--oct-softblue); color: var(--oct-navy); letter-spacing: 0.02em;
  display: inline-flex; align-items: center; gap: 4px;
}
.badge.done { background: var(--oct-success-bg); color: var(--oct-success); }
.badge.locked { background: #F3F4F6; color: var(--oct-text-mute); }

.course h3 {
  font-size: 18px; font-weight: 800; color: var(--oct-navy);
  margin-top: 16px; letter-spacing: -0.01em;
}
.course.locked h3 { color: var(--oct-text-mute); }

.course-desc { color: var(--oct-text-soft); font-size: 14px; margin-top: 6px; line-height: 1.55; }
.course.locked .course-desc { color: var(--oct-text-mute); }

.course-meta {
  display: flex; align-items: center; gap: 10px; margin-top: 14px;
  color: var(--oct-text-mute); font-size: 12px; font-weight: 500;
}
.course-meta .dot { width: 3px; height: 3px; background: currentColor; border-radius: 999px; }

.progress-row {
  display: flex; align-items: center; gap: 10px; margin-top: 14px;
}
.progress-bar {
  flex: 1; height: 6px; background: var(--oct-softblue);
  border-radius: 999px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--oct-sky), var(--oct-navy));
  border-radius: 999px; transition: width .4s;
}
.course.done .progress-fill { background: var(--oct-success); }
.progress-text { font-size: 12px; color: var(--oct-text-soft); font-weight: 600; min-width: 50px; text-align: right; }

.cta {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 18px; color: var(--oct-navy); font-weight: 700; font-size: 14px;
}
.course.done .cta { color: var(--oct-success); }
.course.locked .cta { color: var(--oct-text-mute); cursor: not-allowed; }
.course.unlocked:hover .cta { gap: 9px; }

/* Botón "Descargar resumen del curso" */
.resumen-row { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--oct-border); }
.resumen-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  padding: 9px 14px; border-radius: 9px; cursor: pointer;
  background: var(--oct-navy); color: #fff; border: none; line-height: 1.2;
  transition: background .15s ease;
}
.resumen-btn:hover { background: #00237d; }
.resumen-btn svg { width: 15px; height: 15px; flex: none; }
.resumen-btn.locked {
  background: #F3F4F6; color: var(--oct-text-mute); cursor: not-allowed;
}
.resumen-btn.locked:hover { background: #F3F4F6; }

.lock-overlay {
  position: absolute; top: 18px; right: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 999px;
  background: #F3F4F6; color: var(--oct-text-mute);
}

.placeholder {
  background: var(--oct-white); border: 1px dashed #C7D2E5; border-radius: 16px;
  padding: 22px; color: var(--oct-text-mute); font-size: 14px;
  display: flex; align-items: center; gap: 14px;
}
.placeholder .ico {
  width: 44px; height: 44px; border-radius: 12px; background: var(--oct-softblue);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Volver a la Central
  </a>

  <div class="hero">
    <div class="hero-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#001A60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
      </svg>
    </div>
    <div>
      <h1>Academia OpenCluster</h1>
      <p>Cursos cortos para perfeccionar tu trabajo comercial. Avanzan en orden: para empezar el siguiente, tienes que terminar el actual.</p>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   MANIFIESTO DE CURSOS (en orden de la ruta de formación)
   ───────────────────────────────────────────────────────────────────
   Para agregar un curso nuevo: añadir un objeto al final del array.
   Cada curso debe traer:
     id          slug interno
     title       título visible en la tarjeta
     desc        copy corta
     duration    "~45 min", etc. (texto libre)
     modules     número total de módulos (para saber si está completado)
     href        archivo HTML del curso (relativo a este hub)
     storageKey  la STORAGE_KEY que ese HTML usa en localStorage
     iconSvg     contenido del SVG del ícono (path/elements internos)
   ═══════════════════════════════════════════════════════════════════ */
const COURSES = [
  {
    id: 'outreach',
    title: 'El arte del outreach por email',
    desc: 'Cómo escribir cold emails que la gente realmente abre y responde. Terminas con un correo listo para un contacto real de tu pipeline.',
    duration: '~45 min',
    modules: 9,
    href: 'Academia_Curso_Outreach.html',
    storageKey: 'opencluster_academy_outreach',
    resumen: 'Resumen_Curso1_Outreach.html',
    iconSvg:
      '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>' +
      '<polyline points="22,6 12,13 2,6"/>'
  },
  {
    id: 'discovery',
    title: 'Discovery telefónico: la conversación que define el negocio',
    desc: 'Cómo conducir llamadas que descubren la necesidad real: filtros, apertura, SPIN, escucha activa, objeciones y cierre. Con práctica de roleplay por voz y feedback de IA.',
    duration: '~90 min',
    modules: 11,
    href: 'Academia_Curso_N2_Discovery.html',
    storageKey: 'opencluster_academy_discovery',
    resumen: 'Resumen_Curso2_Discovery.html',
    iconSvg:
      '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>'
  },
  {
    id: 'postventa',
    title: 'Postventa y expansión: el negocio que ya tienes',
    desc: 'Cómo cuidar, retener y hacer crecer a los clientes que ya compraron: onboarding, QBR, prevención de churn, upsell, cross-sell y referidos. Con roleplays de voz y feedback de IA.',
    duration: '~90 min',
    modules: 11,
    href: 'Academia_Curso_N3_Postventa.html',
    storageKey: 'opencluster_academy_postventa',
    resumen: 'Resumen_Curso3_Postventa.html',
    iconSvg:
      '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>'
  },
  {
    id: 'proceso',
    title: 'El proceso completo: del primer contacto al pago',
    desc: 'Cómo se conecta todo en el día a día con las herramientas reales: el CRM, los 3 caminos para tomar un contacto, la reunión, el catálogo, el cotizador, el cierre y el despacho. Con capturas del sistema.',
    duration: '~50 min',
    modules: 11,
    href: 'Academia_Curso_N4_Proceso.html',
    storageKey: 'opencluster_academy_proceso',
    resumen: 'Resumen_Curso4_Proceso.html',
    iconSvg:
      '<path d="M3 3v18h18"/><path d="M7 15l3-3 3 2 5-6"/>'
  }
  // Próximos cursos: pegar aquí el objeto correspondiente.
];

/* ─── Estado de cada curso a partir de localStorage ─── */
function getCourseState(c) {
  try {
    const raw = localStorage.getItem(c.storageKey);
    if (!raw) return { completed: 0, total: c.modules, done: false, started: false };
    const data = JSON.parse(raw);
    const completedArr = (data && Array.isArray(data.completedModules)) ? data.completedModules : [];
    const completed = completedArr.length;
    return {
      completed: completed,
      total: c.modules,
      done: completed >= c.modules,
      started: completed > 0
    };
  } catch (e) {
    return { completed: 0, total: c.modules, done: false, started: false };
  }
}

/* ─── Decide qué curso es el "actual" (primero no completado) ─── */
function computeAccess() {
  const states = COURSES.map(getCourseState);
  let currentIdx = states.findIndex(s => !s.done);
  // Si todos están completados, no hay "current"; todos quedan "done".
  return COURSES.map((c, i) => {
    const st = states[i];
    let access;
    if (st.done) access = 'done';
    else if (currentIdx !== -1 && i === currentIdx) access = 'current';
    else access = 'locked';
    return { course: c, state: st, access: access, prev: i > 0 ? COURSES[i - 1] : null };
  });
}

/* ─── Iconos SVG inline (Tabler style) ─── */
const ICON_CHECK =
  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_LOCK =
  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
const ICON_ARROW =
  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
const ICON_DOWNLOAD =
  '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

/* Abre el resumen del curso (solo si el curso está terminado).
   Si url es null, el botón está bloqueado y no hace nada. */
function ocAbrirResumen(ev, url) {
  ev.preventDefault();
  ev.stopPropagation();
  if (!url) return;
  window.open(url, '_blank', 'noopener');
}

function renderCard(item) {
  const c = item.course, st = item.state, ax = item.access;

  const iconSvg = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${ax === 'locked' ? '#9CA3AF' : '#001A60'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${c.iconSvg}</svg>`;

  let badgeHtml, ctaText, classes;
  if (ax === 'done') {
    badgeHtml = `<span class="badge done">${ICON_CHECK} Completado</span>`;
    ctaText = 'Volver a ver';
    classes = 'course unlocked done';
  } else if (ax === 'current') {
    badgeHtml = st.started
      ? `<span class="badge">En curso</span>`
      : `<span class="badge">Disponible</span>`;
    ctaText = st.started ? 'Continuar curso' : 'Empezar curso';
    classes = 'course unlocked';
  } else {
    badgeHtml = `<span class="badge locked">${ICON_LOCK} Bloqueado</span>`;
    ctaText = item.prev
      ? `Disponible al terminar “${item.prev.title}”`
      : 'Disponible más adelante';
    classes = 'course locked';
  }

  // Barra de progreso visible solo si hay avance (started o done)
  let progressHtml = '';
  if (st.started || st.done) {
    const pct = st.total ? Math.round(st.completed / st.total * 100) : 0;
    progressHtml = `
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="progress-text">${st.completed}/${st.total}</span>
      </div>`;
  }

  // Botón "Descargar resumen del curso": habilitado solo si el curso está completo.
  let resumenHtml = '';
  if (c.resumen) {
    resumenHtml = st.done
      ? `<div class="resumen-row">
        <span class="resumen-btn" onclick="ocAbrirResumen(event, '${c.resumen}')" title="Abrir el resumen del curso. Dentro puedes guardarlo como PDF.">
          ${ICON_DOWNLOAD} Descargar resumen del curso
        </span>
      </div>`
      : `<div class="resumen-row">
        <span class="resumen-btn locked" onclick="ocAbrirResumen(event, null)" title="Disponible cuando termines el curso completo.">
          ${ICON_LOCK} Resumen — termina el curso para descargarlo
        </span>
      </div>`;
  }

  const body = `
    <div class="course-stripe"></div>
    <div class="course-body">
      ${ax === 'locked' ? `<div class="lock-overlay">${ICON_LOCK}</div>` : ''}
      <div class="course-row">
        <div class="course-icon">${iconSvg}</div>
        ${badgeHtml}
      </div>
      <h3>${c.title}</h3>
      <p class="course-desc">${c.desc}</p>
      <div class="course-meta">
        <span>${c.modules} módulos</span>
        <span class="dot"></span>
        <span>${c.duration}</span>
      </div>
      ${progressHtml}
      <div class="cta">${ctaText}${ax === 'locked' ? '' : ' ' + ICON_ARROW}</div>
      ${resumenHtml}
    </div>`;

  if (ax === 'locked') {
    return `<div class="${classes}" aria-disabled="true">${body}</div>`;
  }
  return `<a class="${classes}" href="${c.href}">${body}</a>`;
}

function renderHub() {
  const grid = document.getElementById('grid');
  const items = computeAccess();
  const cards = items.map(renderCard).join('');
  const placeholder = `
    <div class="placeholder">
      <div class="ico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#001A60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div>Más cursos en camino. Se desbloquean en orden cuando termines los anteriores.</div>
    </div>`;
  grid.innerHTML = cards + placeholder;
}

renderHub();
// Si el usuario completa el curso en otra pestaña, refrescar al volver al hub.
window.addEventListener('focus', renderHub);
</script>
</body>
</html>
