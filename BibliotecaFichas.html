<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Biblioteca de Fichas Tecnicas — OpenCluster Tech</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#001a60;--sky:#06b3fd;--gold:#C9A96E;--gold-lt:#E8D5A8;
  --bg:#f4f6fb;--card:#ffffff;--text:#1a2535;--subtle:#64748b;
  --radius:12px;--shadow:0 2px 12px rgba(0,26,96,.07);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

/* Hero */
.hero{background:linear-gradient(170deg,#0A0F1E 0%,var(--navy) 35%,#0a2e8a 65%,var(--sky) 100%);
  padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,transparent,var(--bg));}
.hero::before{content:'';position:absolute;bottom:40px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--gold) 30%,var(--gold-lt) 50%,var(--gold) 70%,transparent 95%);opacity:.35;}

.back-link{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);
  text-decoration:none;font-size:13px;font-weight:500;margin-bottom:28px;transition:color .2s;}
.back-link:hover{color:#fff;}
.back-link svg{width:16px;height:16px;}

.logo-line{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:24px;
  opacity:0;animation:fadeUp .7s .1s forwards;}
.logo-bar{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);}
.logo-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.brand{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:4px;
  color:rgba(255,255,255,.6);text-transform:uppercase;font-weight:700;}

.hero h1{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:800;color:#fff;
  letter-spacing:-.3px;margin-bottom:8px;opacity:0;animation:fadeUp .7s .25s forwards;}
.hero p.sub{font-size:14px;color:rgba(255,255,255,.55);font-weight:400;
  opacity:0;animation:fadeUp .7s .4s forwards;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* Search section */
.search-section{max-width:1100px;margin:-28px auto 0;padding:0 24px;position:relative;z-index:2;}
.search-bar{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius);
  box-shadow:0 4px 24px rgba(0,26,96,.1);padding:6px 6px 6px 20px;border:2px solid transparent;
  transition:border-color .2s;}
.search-bar:focus-within{border-color:var(--sky);}
.search-icon{flex-shrink:0;color:var(--subtle);width:20px;height:20px;}
.search-bar input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;
  font-size:16px;color:var(--text);background:transparent;padding:12px 8px;}
.search-bar input::placeholder{color:#b0b8c9;}
.search-count{flex-shrink:0;font-size:13px;color:var(--subtle);padding-right:14px;white-space:nowrap;}

/* Content area */
.content{max-width:1100px;margin:0 auto;padding:32px 24px 64px;}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:580px){.grid{grid-template-columns:1fr;}}

/* Card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:24px;display:flex;flex-direction:column;gap:12px;
  border:1px solid rgba(0,26,96,.06);transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,26,96,.12);}

.card-cat{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--sky);
  background:rgba(6,179,253,.08);padding:4px 10px;border-radius:6px;width:fit-content;}
.card-cat svg{width:14px;height:14px;}

.card-name{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:700;
  color:var(--navy);line-height:1.3;min-height:44px;}

.card-meta{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--subtle);}
.card-meta span{display:flex;align-items:center;gap:6px;}
.card-meta svg{width:14px;height:14px;flex-shrink:0;color:var(--gold);}

.card-actions{display:flex;gap:8px;margin-top:auto;padding-top:8px;}
.btn{flex:1;padding:10px 12px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;
  transition:background .2s,transform .1s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#002a8a;}
.btn-secondary{background:rgba(6,179,253,.1);color:var(--sky);border:1px solid rgba(6,179,253,.2);}
.btn-secondary:hover{background:rgba(6,179,253,.18);}
.btn svg{width:14px;height:14px;}

/* States */
.state-box{text-align:center;padding:80px 24px;grid-column:1/-1;}
.spinner{width:40px;height:40px;border:3px solid rgba(0,26,96,.1);border-top-color:var(--sky);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-box p{font-size:15px;color:var(--subtle);margin-bottom:16px;}
.state-box .btn-retry{display:inline-flex;padding:10px 24px;background:var(--navy);
  color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;gap:8px;align-items:center;transition:background .2s;}
.state-box .btn-retry:hover{background:#002a8a;}
.state-box .btn-retry svg{width:16px;height:16px;}

.empty-icon{width:64px;height:64px;color:rgba(0,26,96,.15);margin:0 auto 16px;}

/* Quick view modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,15,50,.5);z-index:100;
  align-items:center;justify-content:center;padding:24px;}
.modal-overlay.active{display:flex;}
.modal-box{background:#fff;border-radius:var(--radius);max-width:500px;width:100%;padding:32px;
  box-shadow:0 12px 48px rgba(0,0,0,.25);position:relative;text-align:center;}
.modal-box .spinner{margin-bottom:12px;}
.modal-box p{color:var(--subtle);font-size:14px;}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;
  background:rgba(0,26,96,.06);border-radius:8px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:background .2s;}
.modal-close:hover{background:rgba(0,26,96,.12);}
.modal-close svg{width:16px;height:16px;color:var(--subtle);}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Volver a Central
  </a>
  <div class="logo-line">
    <span class="logo-bar"></span>
    <span class="logo-diamond"></span>
    <span class="brand">OpenCluster Tech</span>
    <span class="logo-diamond"></span>
    <span class="logo-bar"></span>
  </div>
  <h1>Biblioteca de Fichas Tecnicas</h1>
  <p class="sub">Fichas de productos disponibles para el equipo comercial</p>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar ficha por nombre de producto...">
    <span class="search-count" id="searchCount"></span>
  </div>
</div>

<!-- Grid -->
<div class="content">
  <div class="grid" id="grid"></div>
</div>

<!-- Quick-view modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
    </button>
    <div class="spinner"></div>
    <p>Cargando datos de la ficha...</p>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw4StlTqupX9S0iWe1J-euztEh03qmpn5p-AGnM-ACCB3YJt9-QNLlX3-nDnAuZZXS7/exec';

let fichas = [];
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');

// Icons as SVG strings
const icons = {
  tag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
  calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  open: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
  eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  retry: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>',
  empty: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>'
};

const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function formatDate(raw) {
  if (!raw) return '';
  let d;
  if (typeof raw === 'string' && /^\d{4}-\d{2}-\d{2}/.test(raw)) {
    d = new Date(raw + 'T12:00:00');
  } else {
    d = new Date(raw);
  }
  if (isNaN(d.getTime())) return raw;
  return d.getDate() + ' de ' + MESES[d.getMonth()] + ' ' + d.getFullYear();
}

function showLoading() {
  grid.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Cargando fichas publicadas...</p></div>';
  searchCount.textContent = '';
}

function showError(msg) {
  grid.innerHTML = `<div class="state-box">
    <p>${msg || 'No se pudieron cargar las fichas. Verifica tu conexion e intenta de nuevo.'}</p>
    <button class="btn-retry" onclick="loadFichas()">${icons.retry} Reintentar</button>
  </div>`;
  searchCount.textContent = '';
}

function showEmpty() {
  grid.innerHTML = `<div class="state-box">
    <div class="empty-icon">${icons.empty}</div>
    <p>Sin fichas publicadas</p>
  </div>`;
  searchCount.textContent = '0 fichas';
}

function renderCards(list) {
  if (!list.length) {
    if (searchInput.value.trim()) {
      grid.innerHTML = '<div class="state-box"><p>No se encontraron fichas con ese nombre</p></div>';
    } else {
      showEmpty();
    }
    searchCount.textContent = list.length + ' de ' + fichas.length + ' fichas';
    return;
  }
  searchCount.textContent = (list.length === fichas.length ? fichas.length : list.length + ' de ' + fichas.length) + ' fichas';

  grid.innerHTML = list.map(f => {
    const generadorUrl = '../GeneradorFichasTecnicas.html?fichaId=' + encodeURIComponent(f.id) + '&fileId=' + encodeURIComponent(f.fileId);
    return `<div class="card">
      <span class="card-cat">${icons.tag} ${escHtml(f.categoria || 'Sin categoria')}</span>
      <div class="card-name">${escHtml(f.producto)}</div>
      <div class="card-meta">
        <span>${icons.calendar} ${formatDate(f.fecha)}</span>
        <span>${icons.user} ${escHtml(f.creador || 'Desconocido')}</span>
      </div>
      <div class="card-actions">
        <a class="btn btn-primary" href="${generadorUrl}" target="_blank">${icons.open} Abrir en Generador</a>
        <button class="btn btn-secondary" onclick="quickView('${escAttr(f.fileId)}')">${icons.eye} Vista rapida</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function filterFichas() {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { renderCards(fichas); return; }
  const filtered = fichas.filter(f => f.producto && f.producto.toLowerCase().includes(q));
  renderCards(filtered);
}

async function loadFichas() {
  showLoading();
  try {
    const resp = await fetch(API_URL + '?accion=listar_fichas');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    fichas = Array.isArray(data.fichas) ? data.fichas : [];
    if (!fichas.length) { showEmpty(); return; }
    renderCards(fichas);
  } catch (e) {
    console.error('Error cargando fichas:', e);
    showError();
  }
}

function quickView(fileId) {
  const modal = document.getElementById('modal');
  const box = modal.querySelector('.modal-box');
  box.innerHTML = `
    <button class="modal-close" onclick="closeModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
    </button>
    <div class="spinner"></div>
    <p>Cargando datos de la ficha...</p>`;
  modal.classList.add('active');

  fetch(API_URL + '?accion=obtener_ficha&fileId=' + encodeURIComponent(fileId))
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Error al obtener ficha');
      let datos;
      try { datos = typeof data.datos === 'string' ? JSON.parse(data.datos) : data.datos; } catch(e) { datos = data.datos; }
      box.innerHTML = `
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
        <div style="text-align:left;">
          <h3 style="font-family:Montserrat,sans-serif;color:var(--navy);margin-bottom:12px;font-size:18px;">${escHtml(datos.producto || datos.nombre || 'Ficha')}</h3>
          <p style="color:var(--subtle);font-size:13px;">Datos cargados correctamente. Usa "Abrir en Generador" para ver la ficha completa e imprimir como PDF.</p>
        </div>`;
    })
    .catch(e => {
      console.error('Error vista rapida:', e);
      box.innerHTML = `
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
        <p style="color:#e74c3c;">No se pudo cargar la ficha. Intenta de nuevo.</p>`;
    });
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

searchInput.addEventListener('input', filterFichas);
loadFichas();
</script>
</body>
</html>
