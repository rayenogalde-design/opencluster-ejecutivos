*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#001a60;--sky:#06b3fd;--gold:#C9A96E;--gold-lt:#E8D5A8;
  --bg:#f4f6fb;--card:#ffffff;--text:#1a2535;--subtle:#64748b;
  --radius:12px;--shadow:0 2px 12px rgba(0,26,96,.07);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

/* Hero */
.hero{background:linear-gradient(170deg,#0A0F1E 0%,var(--navy) 35%,#0a2e8a 65%,var(--sky) 100%);
  padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to bottom,transparent,var(--bg));}
.hero::before{content:'';position:absolute;bottom:40px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--gold) 30%,var(--gold-lt) 50%,var(--gold) 70%,transparent 95%);opacity:.35;}

.back-link{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);
  text-decoration:none;font-size:13px;font-weight:500;margin-bottom:28px;transition:color .2s;}
.back-link:hover{color:#fff;}
.back-link svg{width:16px;height:16px;}

.logo-line{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:24px;
  opacity:0;animation:fadeUp .7s .1s forwards;}
.logo-bar{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);}
.logo-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.brand{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:4px;
  color:rgba(255,255,255,.6);text-transform:uppercase;font-weight:700;}

.hero h1{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:800;color:#fff;
  letter-spacing:-.3px;margin-bottom:8px;opacity:0;animation:fadeUp .7s .25s forwards;}
.hero p.sub{font-size:14px;color:rgba(255,255,255,.55);font-weight:400;
  opacity:0;animation:fadeUp .7s .4s forwards;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* Search section */
.search-section{max-width:1100px;margin:-28px auto 0;padding:0 24px;position:relative;z-index:2;}
.search-bar{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius);
  box-shadow:0 4px 24px rgba(0,26,96,.1);padding:6px 6px 6px 20px;border:2px solid transparent;
  transition:border-color .2s;}
.search-bar:focus-within{border-color:var(--sky);}
.search-icon{flex-shrink:0;color:var(--subtle);width:20px;height:20px;}
.search-bar input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;
  font-size:16px;color:var(--text);background:transparent;padding:12px 8px;}
.search-bar input::placeholder{color:#b0b8c9;}
.search-count{flex-shrink:0;font-size:13px;color:var(--subtle);padding-right:14px;white-space:nowrap;}

/* Content area */
.content{max-width:1100px;margin:0 auto;padding:32px 24px 64px;}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:580px){.grid{grid-template-columns:1fr;}}

/* Card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:24px;display:flex;flex-direction:column;gap:12px;
  border:1px solid rgba(0,26,96,.06);transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,26,96,.12);}

.card-cat{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--sky);
  background:rgba(6,179,253,.08);padding:4px 10px;border-radius:6px;width:fit-content;}
.card-cat svg{width:14px;height:14px;}

.card-name{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:700;
  color:var(--navy);line-height:1.3;min-height:44px;}

.card-meta{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--subtle);}
.card-meta span{display:flex;align-items:center;gap:6px;}
.card-meta svg{width:14px;height:14px;flex-shrink:0;color:var(--gold);}

.card-actions{display:flex;gap:8px;margin-top:auto;padding-top:8px;}
.btn{flex:1;padding:10px 12px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;
  transition:background .2s,transform .1s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#002a8a;}
.btn-secondary{background:rgba(6,179,253,.1);color:var(--sky);border:1px solid rgba(6,179,253,.2);}
.btn-secondary:hover{background:rgba(6,179,253,.18);}
.btn-danger{background:#fff;color:#c0392b;border:1px solid #e8b3ad;flex:0 0 auto;width:38px;padding:10px 8px}
.btn-danger:hover{background:#fce8e6;border-color:#c0392b}
.btn svg{width:14px;height:14px;}
/* Sello de creada/aprobada (debajo de la categoria) */
.card-sellos{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--subtle);
  padding:8px 10px;background:rgba(0,26,96,.03);border-radius:6px;border-left:2px solid var(--gold)}
.card-sellos b{font-weight:600;color:var(--navy);font-family:'Montserrat',sans-serif;
  font-size:9px;text-transform:uppercase;letter-spacing:.6px;display:inline-block;min-width:75px}
.card-sellos span{display:flex;align-items:baseline;gap:6px}

/* States */
.state-box{text-align:center;padding:80px 24px;grid-column:1/-1;}
.spinner{width:40px;height:40px;border:3px solid rgba(0,26,96,.1);border-top-color:var(--sky);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-box p{font-size:15px;color:var(--subtle);margin-bottom:16px;}
.state-box .btn-retry{display:inline-flex;padding:10px 24px;background:var(--navy);
  color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;gap:8px;align-items:center;transition:background .2s;}
.state-box .btn-retry:hover{background:#002a8a;}
.state-box .btn-retry svg{width:16px;height:16px;}

.empty-icon{width:64px;height:64px;color:rgba(0,26,96,.15);margin:0 auto 16px;}

/* Quick view modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,15,50,.5);z-index:100;
  align-items:center;justify-content:center;padding:24px;}
.modal-overlay.active{display:flex;}
.modal-box{background:#fff;border-radius:var(--radius);max-width:500px;width:100%;padding:32px;
  box-shadow:0 12px 48px rgba(0,0,0,.25);position:relative;text-align:center;}
.modal-box .spinner{margin-bottom:12px;}
.modal-box p{color:var(--subtle);font-size:14px;}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;
  background:rgba(0,26,96,.06);border-radius:8px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:background .2s;}
.modal-close:hover{background:rgba(0,26,96,.12);}
.modal-close svg{width:16px;height:16px;color:var(--subtle);}
</style>

<script>
// === Apps Script Biblioteca API (sin OAuth en el cliente — corre con la cuenta de despliegue) ===
const BIBLIO_API_URL = 'https://script.google.com/macros/s/AKfycbyzLWKA2rIp15Dn1FK5Zywtvqo7dgkoVlmyv-czqVupmOy-bIH9RHIYfKy76xcX3EAH/exec';
// === OAuth + Drive API directo (legacy — solo se mantiene por compat) ===
const OAUTH_CLIENT_ID = '1006878042668-v7aft4fm0ldn5q75lp479hbpc7cohsr2.apps.googleusercontent.com';
const OAUTH_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const FICHAS_FOLDER_NAME = 'OpenCluster Fichas Tecnicas';
let _oauthTokenClient = null;
let _oauthAccessToken = null;
let _fichasFolderId = null;

function inicializarOAuth(){
  if(typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) return false;
  if(_oauthTokenClient) return true;
  _oauthTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: OAUTH_CLIENT_ID,
    scope: OAUTH_SCOPE,
    callback: ''
  });
  return true;
}

function obtenerAccessTokenOAuth(){
  return new Promise((resolve, reject) => {
    if(!inicializarOAuth()){
      reject(new Error('Google Identity Services no cargó. Recarga la página.'));
      return;
    }
    _oauthTokenClient.callback = (response) => {
      if(response.error){ reject(new Error(response.error_description || response.error)); return; }
      _oauthAccessToken = response.access_token;
      resolve(response.access_token);
    };
    if(_oauthAccessToken){
      _oauthTokenClient.requestAccessToken({ prompt: '' });
    } else {
      _oauthTokenClient.requestAccessToken({ prompt: 'consent' });
    }
  });
}

async function buscarOCrearCarpetaFichas(){
  if(_fichasFolderId) return _fichasFolderId;
  const token = await obtenerAccessTokenOAuth();
  const q = encodeURIComponent("name='" + FICHAS_FOLDER_NAME + "' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const respBuscar = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id,name)', {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if(respBuscar.ok){
    const dataBuscar = await respBuscar.json();
    if(dataBuscar.files && dataBuscar.files.length > 0){
      _fichasFolderId = dataBuscar.files[0].id;
      return _fichasFolderId;
    }
  }
  const respCrear = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: FICHAS_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const created = await respCrear.json();
  _fichasFolderId = created.id;
  return _fichasFolderId;
}

// Mapa rapido producto-normalizado → entrada completa (ejecutivo + categoria + subcat)
const CATALOGO_MAP = (function(){
  const m = {};
  const norm = s => (s || '').toString().toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  CATALOGO_EJECUTIVOS.forEach(it => { m[norm(it.producto)] = it; });
  return m;
})();
function _normProducto(s){
  return (s || '').toString().toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
function getCatalogoDe(producto){
  const key = _normProducto(producto);
  if(CATALOGO_MAP[key]) return CATALOGO_MAP[key];
  // Match parcial: probar si el nombre del producto contiene o esta contenido en alguna clave
  for(const k in CATALOGO_MAP){
    if(k.includes(key) || key.includes(k)) return CATALOGO_MAP[k];
  }
  return null;
}
function getEjecutivoDe(producto){
  const e = getCatalogoDe(producto);
  return e ? e.ejecutivo : '';
}
function getCategoriaDe(producto){
  const e = getCatalogoDe(producto);
  if(!e) return '';
  // Mostrar la subcategoria (mas especifica que la categoria principal) si existe
  return e.subcategoria || e.categoria || '';
}

const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function formatDate(raw) {
  if (!raw) return '';
  let d;
  if (typeof raw === 'string' && /^\d{4}-\d{2}-\d{2}/.test(raw)) {
    d = new Date(raw + 'T12:00:00');
  } else {
    d = new Date(raw);
  }
  if (isNaN(d.getTime())) return raw;
  return d.getDate() + ' de ' + MESES[d.getMonth()] + ' ' + d.getFullYear();
}

function showLoading() {
  grid.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Cargando fichas publicadas...</p></div>';
  searchCount.textContent = '';
}

function showError(msg) {
  grid.innerHTML = `<div class="state-box">
    <p>${msg || 'No se pudieron cargar las fichas. Verifica tu conexion e intenta de nuevo.'}</p>
    <button class="btn-retry" onclick="loadFichas()">${icons.retry} Reintentar</button>
  </div>`;
  searchCount.textContent = '';
}

function showEmpty() {
  grid.innerHTML = `<div class="state-box">
    <div class="empty-icon">${icons.empty}</div>
    <p>Sin fichas publicadas</p>
  </div>`;
  searchCount.textContent = '0 fichas';
}

function renderCards(list) {
  if (!list.length) {
    if (searchInput.value.trim()) {
      grid.innerHTML = '<div class="state-box"><p>No se encontraron fichas con ese nombre</p></div>';
    } else {
      showEmpty();
    }
    searchCount.textContent = list.length + ' de ' + fichas.length + ' fichas';
    return;
  }
  searchCount.textContent = (list.length === fichas.length ? fichas.length : list.length + ' de ' + fichas.length) + ' fichas';

  grid.innerHTML = list.map(f => {
    const generadorUrl = 'GeneradorFichasSlides.html?fichaId=' + encodeURIComponent(f.id) + '&fileId=' + encodeURIComponent(f.fileId);
    const ejecutivo = getEjecutivoDe(f.producto) || '—';
    const categoria = getCategoriaDe(f.producto) || f.categoria || 'Sin categoria';
    return `<div class="card">
      <span class="card-cat">${icons.tag} ${escHtml(categoria)}</span>
      <div class="card-name">${escHtml(f.producto)}</div>
      <div class="card-sellos">
        <span><b>Creada por:</b> ${escHtml(ejecutivo)}</span>
        <span><b>Aprobada por:</b> Rayen Ogalde</span>
      </div>
      <div class="card-meta">
        <span>${icons.calendar} ${formatDate(f.fecha)}</span>
      </div>
      <div class="card-actions">
        <a class="btn btn-primary" href="${generadorUrl}&autopdf=1" target="_blank">${icons.open} Descargar PDF</a>
        <button class="btn btn-danger" onclick="eliminarFicha('${escAttr(f.fileId)}','${escAttr(f.producto)}')" title="Eliminar ficha">${icons.trash}</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function filterFichas() {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { renderCards(fichas); return; }
  const filtered = fichas.filter(f => f.producto && f.producto.toLowerCase().includes(q));
  renderCards(filtered);
}

async function loadFichas() {
  showLoading();
  try {
    // Listamos vía Apps Script (corre con la cuenta de despliegue, ve TODA la carpeta)
    const resp = await fetch(BIBLIO_API_URL + '?accion=listar_fichas');
    if(!resp.ok) throw new Error('Biblioteca API HTTP ' + resp.status);
    const data = await resp.json();
    if(!data.ok) throw new Error(data.error || 'Respuesta no OK del Apps Script');
    // Botón "Abrir en Drive" — usa folderUrl que devuelve el Apps Script
    const btnDrive = document.getElementById('btnAbrirDrive');
    if(btnDrive && data.folderUrl) btnDrive.href = data.folderUrl;
    // Mapear al formato que espera renderCards (ya viene casi listo del Apps Script)
    fichas = (data.fichas || []).map(f => ({
      id: f.id,
      fileId: f.fileId || f.id,
      producto: f.producto || (f.name || '').replace(/\.json$/i, '').replace(/\.Ficha_Tecnica\.OCT$/i, ''),
      fecha: f.fecha || (f.modifiedTime ? f.modifiedTime.slice(0, 10) : ''),
      creador: f.creador || '',
      categoria: f.categoria || ''
    }));
    // Actualizar el contador grande arriba
    const tc = document.getElementById('totalCount');
    if(tc) tc.textContent = fichas.length;
    if (!fichas.length) { showEmpty(); return; }
    renderCards(fichas);
  } catch (e) {
    console.error('Error cargando fichas:', e);
    showError(e.message || 'No se pudieron cargar las fichas. Verifica tu conexión.');
  }
}

function quickView(fileId) {
  const modal = document.getElementById('modal');
  const box = modal.querySelector('.modal-box');
  box.innerHTML = `
    <button class="modal-close" onclick="closeModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
    </button>
    <div class="spinner"></div>
    <p>Cargando datos de la ficha...</p>`;
  modal.classList.add('active');

  obtenerAccessTokenOAuth()
    .then(token => fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
      headers: { 'Authorization': 'Bearer ' + token }
    }))
    .then(r => { if (!r.ok) throw new Error('Drive API HTTP ' + r.status); return r.text(); })
    .then(text => {
      let datos;
      try { datos = JSON.parse(text); } catch(e) { datos = { producto: 'Sin datos' }; }
      box.innerHTML = `
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
        <div style="text-align:left;">
          <h3 style="font-family:Montserrat,sans-serif;color:var(--navy);margin-bottom:12px;font-size:18px;">${escHtml(datos.producto || datos.nombre || 'Ficha')}</h3>
          <p style="color:var(--subtle);font-size:13px;">Datos cargados correctamente. Usa "Abrir en Generador" para ver la ficha completa e imprimir como PDF.</p>
        </div>`;
    })
    .catch(e => {
      console.error('Error vista rapida:', e);
      box.innerHTML = `
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
        <p style="color:#e74c3c;">No se pudo cargar la ficha. Intenta de nuevo.</p>`;
    });
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// Eliminar ficha: confirma, llama al Apps Script para mover a papelera de Drive,
// y quita la tarjeta de la grilla local. Reversible 30 dias desde la papelera de Drive.
async function eliminarFicha(fileId, nombreProducto){
  const ok = confirm('¿Eliminar la ficha "' + nombreProducto + '"?\n\nSe va a borrar del Drive y de la biblioteca. Queda en la papelera de Drive 30 dias por si fue un error.');
  if(!ok) return;
  try{
    const url = BIBLIO_API_URL + '?accion=eliminar_ficha&fileId=' + encodeURIComponent(fileId);
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if(!data.ok) throw new Error(data.error || 'Respuesta no OK');
    // Quitar la ficha del array local y re-renderizar
    fichas = fichas.filter(f => f.fileId !== fileId);
    const tc = document.getElementById('totalCount');
    if(tc) tc.textContent = fichas.length;
    filterFichas();
  } catch(e){
    console.error('Error eliminando ficha:', e);
    alert('No se pudo eliminar la ficha:\n' + (e.message || e));
  }
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

searchInput.addEventListener('input', filterFichas);
loadFichas();
