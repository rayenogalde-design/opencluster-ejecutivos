<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas — Ximena | OpenCluster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#001A60; --pink:#DB2777; --ink:#111; --sub:#6b7280; --border:#e5e7eb; }
  *{ box-sizing:border-box; }
  body{ font-family:'Manrope',sans-serif; margin:0; background:#f4f6fb; color:var(--ink); }
  .top{ background:var(--navy); color:#fff; padding:18px 24px; display:flex; align-items:center; gap:14px; }
  .top a{ color:#cdd7ff; text-decoration:none; font-size:13px; font-weight:500; }
  .top h1{ font-size:18px; font-weight:800; margin:0; }
  .wrap{ max-width:760px; margin:0 auto; padding:24px 18px 60px; }
  .intro{ color:var(--sub); font-size:14px; margin:6px 0 18px; }
  .card{ background:#fff; border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:14px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
  .card .hd{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
  .card .cli{ font-size:16px; font-weight:800; }
  .dato{ display:flex; gap:10px; padding:7px 0; border-top:1px dashed #eee; }
  .dato .k{ font-size:12px; color:var(--sub); min-width:160px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
  .dato .v{ font-size:14px; font-weight:500; }
  .pill{ font-size:11.5px; font-weight:800; padding:4px 11px; border-radius:999px; }
  .btn{ background:var(--pink); color:#fff; border:none; border-radius:9px; padding:10px 16px; font-weight:800; font-size:13px; cursor:pointer; font-family:inherit; margin-top:12px; }
  .btn.done{ background:#16A34A; }
  .muted{ color:var(--sub); text-align:center; padding:40px 20px; }
</style>
</head>
<body>
  <div class="top">
    <a href="index.html">&larr; Central</a>
    <h1>Solicitudes de etiquetas</h1>
  </div>
  <div class="wrap">
    <div class="intro">Cuando un ejecutivo cierra una venta por courier externo y pide etiquetas, la solicitud llega aquí con todos los datos para generarlas.</div>
    <div id="lista"><div class="muted">Cargando solicitudes…</div></div>
  </div>
<script>
  var CRM_API = 'https://script.google.com/macros/s/AKfycbz3Vscxz-OlTHehsnEqqTD1qfql4xzstgWM81RG79P5IiLTkRvaYTU2sNoWV_QpceeowA/exec';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fmt(iso){ if(!iso) return '—'; try{ var d=new Date(iso); return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return '—'; } }
  function dato(k,v){ return '<div class="dato"><div class="k">'+k+'</div><div class="v">'+esc(v||'—')+'</div></div>'; }

  function _fileB64(f){ return new Promise(function(res,rej){ var fr=new FileReader(); fr.onload=function(){ var s=String(fr.result||''); var c=s.indexOf(','); res(c>=0?s.slice(c+1):s); }; fr.onerror=function(){ rej(fr.error||new Error('error')); }; fr.readAsDataURL(f); }); }
  async function marcarHecha(id, btn){
    var input = document.getElementById('etf-'+id);
    if(!input || !input.files || !input.files.length){
      if(!confirm('No subiste ninguna imagen de etiqueta. ¿Marcar como lista igual (sin adjuntar)?')) return;
    }
    btn.disabled = true; btn.textContent = '…';
    try{
      var imgs = [];
      if(input && input.files){
        for(var i=0;i<input.files.length;i++){
          var f = input.files[i];
          if(f.size > 8*1024*1024){ alert('La imagen "'+f.name+'" pesa más de 8 MB. Súbela más liviana.'); btn.disabled=false; btn.textContent='Marcar lista y enviar a bodega'; return; }
          imgs.push({ data: await _fileB64(f), mime: f.type });
        }
      }
      var r = await fetch(CRM_API, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({accion:'crm_venta_estado', id:id, estado_etiqueta:'Lista', etiqueta_imagenes: imgs})});
      var j = await r.json(); if(!j.ok) throw new Error(j.error||'error');
      alert('Listo. Las etiquetas se enviaron a bodega y al ejecutivo' + (imgs.length ? ' con las imágenes adjuntas.' : '.'));
      cargar();
    }catch(e){ alert('No se pudo: '+e.message); btn.disabled=false; btn.textContent='Marcar lista y enviar a bodega'; }
  }
  window.marcarHecha = marcarHecha;

  function render(items){
    var cont = document.getElementById('lista');
    if(!items.length){ cont.innerHTML = '<div class="muted">No hay solicitudes de etiquetas por ahora.</div>'; return; }
    cont.innerHTML = items.map(function(v){
      var e = v.etiqueta || {};
      var lista = String(v.estado_etiqueta||'Pendiente') === 'Lista';
      var estPill = lista ? '<span class="pill" style="background:#DCFCE7;color:#166534;">Lista</span>' : '<span class="pill" style="background:#FCE7F3;color:#9D174D;">Pendiente</span>';
      return '<div class="card">' +
        '<div class="hd"><div class="cli">'+esc(e.nombre||v.cliente||'(sin nombre)')+'</div>'+estPill+'</div>' +
        dato('Nombre', e.nombre||v.cliente) +
        dato('RUT', e.rut) +
        dato('Dirección de despacho', e.direccion||v.direccion_despacho) +
        dato('Correo', e.correo) +
        dato('Referencias institución', e.referencias||v.institucion) +
        dato('Producto', e.producto) +
        dato('Total', e.total) +
        dato('Monto producto', e.monto_producto) +
        dato('Monto envío', e.monto_envio) +
        dato('Documento', e.documento||v.documento) +
        dato('Ejecutivo', String(v.ejecutivo||'').split(' ')[0]) +
        dato('Fecha solicitud', fmt(v.fecha)) +
        ((v.etiqueta_urls && v.etiqueta_urls.length) ? '<div class="dato"><div class="k">Etiquetas</div><div class="v">' + v.etiqueta_urls.map(function(u,ix){ return '<a href="'+esc(u)+'" target="_blank" style="color:#001A60;font-weight:700;text-decoration:none;">Ver etiqueta '+(ix+1)+'</a>'; }).join('  ·  ') + '</div></div>' : '') +
        (lista ? '' :
          '<div style="margin-top:12px;padding-top:10px;border-top:1px solid #eee;">' +
            '<div style="font-size:12.5px;font-weight:700;color:#374151;">Sube las etiquetas (imagen o PDF, puedes elegir varias):</div>' +
            '<input type="file" id="etf-'+esc(v.id)+'" accept="image/*,application/pdf" multiple style="margin:8px 0;font-size:13px;">' +
            '<br><button class="btn done" onclick="marcarHecha(\''+esc(v.id)+'\',this)">Marcar lista y enviar a bodega</button>' +
          '</div>') +
      '</div>';
    }).join('');
  }

  function cargar(){
    fetch(CRM_API + '?accion=crm_etiquetas_ximena')
      .then(function(r){ return r.json(); })
      .then(function(res){ if(!res.ok) throw new Error(res.error||'error'); render(res.etiquetas||[]); })
      .catch(function(e){ document.getElementById('lista').innerHTML = '<div class="muted">No se pudo cargar ('+e.message+').</div>'; });
  }
  cargar();
</script>
</body>
</html>
