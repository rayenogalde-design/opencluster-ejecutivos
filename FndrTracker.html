<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNDR Tracker — OpenCluster Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#001a60;--sky:#06b3fd;--gold:#C9A96E;--gold-lt:#E8D5A8;
  --orange:#ff7e00;--pale:#eaf6ff;--bg:#F4F6FB;
  --text:#1a2535;--subtle:#64748b;
  --green:#22c55e;--red:#ef4444;--gray:#94a3b8;--blue:#3b82f6;
  --card:#fff;--radius:14px;--shadow:0 2px 12px rgba(0,26,96,.07);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--navy) 0%,#002a80 50%,#001040 100%);color:#fff;padding:28px 32px 24px;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;top:-60%;right:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,179,253,.12) 0%,transparent 70%);pointer-events:none;}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:relative;z-index:1;}
.header-brand{display:flex;align-items:center;gap:14px;}
.header-logo{width:38px;height:38px;}
.header h1{font-family:'Montserrat',sans-serif;font-size:1.45rem;font-weight:800;letter-spacing:-.3px;}
.header h1 span{color:var(--sky);font-weight:600;}
.header-right{display:flex;align-items:center;gap:18px;font-size:.88rem;}
.header-user{background:rgba(255,255,255,.1);padding:6px 14px;border-radius:8px;font-weight:500;}
.header-back{color:var(--sky);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:5px;transition:color .2s;}
.header-back:hover{color:#fff;}
.header-back svg{width:16px;height:16px;}

/* ── CONTAINER ── */
.container{max-width:1100px;margin:0 auto;padding:24px 20px 60px;}

/* ── COUNTDOWN ── */
.countdown-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;margin-bottom:32px;}
.countdown-card{background:var(--card);border-radius:var(--radius);padding:22px 26px;box-shadow:var(--shadow);border-left:5px solid var(--sky);display:flex;flex-direction:column;gap:8px;}
.countdown-card.urgent{border-left-color:var(--red);}
.countdown-card.closed{border-left-color:var(--gray);opacity:.7;}
.countdown-label{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1rem;color:var(--navy);}
.countdown-region{font-size:.82rem;color:var(--subtle);font-weight:500;}
.countdown-timer{display:flex;gap:10px;margin-top:4px;}
.countdown-unit{text-align:center;}
.countdown-num{font-family:'Montserrat',sans-serif;font-size:1.55rem;font-weight:800;color:var(--navy);line-height:1;}
.countdown-card.urgent .countdown-num{color:var(--red);}
.countdown-lbl{font-size:.65rem;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.countdown-closed{font-family:'Montserrat',sans-serif;font-size:1.2rem;font-weight:800;color:var(--gray);letter-spacing:1px;}

/* ── SECTION TITLES ── */
.section-title{font-family:'Montserrat',sans-serif;font-size:1.2rem;font-weight:800;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-title svg{width:22px;height:22px;flex-shrink:0;}
.section-subtitle{font-size:.85rem;color:var(--subtle);font-weight:400;margin-left:4px;}

/* ── PROVINCE CARDS ── */
.province-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;margin-bottom:40px;}
.province-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .25s;}
.province-card:hover{box-shadow:0 4px 20px rgba(0,26,96,.12);}
.province-card-head{padding:18px 22px 14px;border-bottom:1px solid #f0f2f8;}
.province-name{font-family:'Montserrat',sans-serif;font-size:1.08rem;font-weight:700;color:var(--navy);}
.province-fund{font-size:.78rem;color:var(--subtle);margin-top:2px;font-weight:500;}
.province-owner{font-size:.75rem;color:var(--sky);font-weight:600;margin-top:4px;display:flex;align-items:center;gap:4px;}
.province-owner svg{width:13px;height:13px;}
.province-card-body{padding:16px 22px 20px;}

/* ── STATUS CHIPS ── */
.status-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.status-chip{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;user-select:none;}
.status-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-chip.s-pendiente{background:#f1f5f9;color:#64748b;border-color:#e2e8f0;}
.status-chip.s-pendiente .dot{background:var(--gray);}
.status-chip.s-contacto{background:#fff7ed;color:#c2410c;border-color:#fed7aa;}
.status-chip.s-contacto .dot{background:var(--orange);}
.status-chip.s-conversacion{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;}
.status-chip.s-conversacion .dot{background:var(--blue);}
.status-chip.s-confirmado{background:#f0fdf4;color:#15803d;border-color:#bbf7d0;}
.status-chip.s-confirmado .dot{background:var(--green);}
.status-chip.active{box-shadow:0 0 0 2px rgba(6,179,253,.35);transform:scale(1.04);}
.status-chip.s-pendiente.active{border-color:#94a3b8;background:#e2e8f0;}
.status-chip.s-contacto.active{border-color:var(--orange);background:#ffedd5;}
.status-chip.s-conversacion.active{border-color:var(--blue);background:#dbeafe;}
.status-chip.s-confirmado.active{border-color:var(--green);background:#dcfce7;}

/* ── SUB-FIELDS ── */
.sub-fields{display:none;margin-top:12px;padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e8ecf4;}
.sub-fields.visible{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.field-group{margin-bottom:12px;}
.field-group:last-child{margin-bottom:0;}
.field-label{font-size:.75rem;font-weight:600;color:var(--navy);margin-bottom:5px;display:block;}
.field-input{width:100%;padding:8px 12px;border:1px solid #d4dae8;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);background:#fff;transition:border-color .2s;}
.field-input:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(6,179,253,.12);}
textarea.field-input{resize:vertical;min-height:60px;}
.radio-group{display:flex;flex-wrap:wrap;gap:6px;}
.radio-pill{position:relative;}
.radio-pill input{position:absolute;opacity:0;pointer-events:none;}
.radio-pill label{display:block;padding:5px 12px;border:1px solid #d4dae8;border-radius:16px;font-size:.78rem;cursor:pointer;transition:all .2s;background:#fff;color:var(--subtle);font-weight:500;}
.radio-pill input:checked+label{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── PROGRESS BAR ── */
.progress-section{margin-bottom:32px;}
.progress-bar-wrap{background:#e2e8f0;border-radius:10px;height:14px;overflow:hidden;margin-top:8px;}
.progress-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--sky),var(--green));transition:width .5s ease;}
.progress-text{font-size:.82rem;color:var(--subtle);font-weight:500;margin-top:6px;}

/* ── TEAM RESULTS ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:32px;}
.team-card{background:var(--card);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);border-left:4px solid var(--sky);}
.team-card.status-contacto{border-left-color:var(--orange);}
.team-card.status-conversacion{border-left-color:var(--blue);}
.team-card.status-confirmado{border-left-color:var(--gold);background:linear-gradient(135deg,#fffbf0 0%,#fff8e7 100%);animation:goldPulse 3s ease-in-out infinite;}
@keyframes goldPulse{0%,100%{box-shadow:0 2px 12px rgba(201,169,110,.12);}50%{box-shadow:0 4px 24px rgba(201,169,110,.28);}}
.team-card-exec{font-weight:700;font-size:.9rem;color:var(--navy);margin-bottom:2px;}
.team-card-prov{font-size:.82rem;color:var(--subtle);margin-bottom:6px;}
.team-card-status{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:6px;}
.team-card-status.ts-contacto{background:#fff7ed;color:#c2410c;}
.team-card-status.ts-conversacion{background:#eff6ff;color:#1d4ed8;}
.team-card-status.ts-confirmado{background:#f0fdf4;color:#15803d;}
.team-card-institution{font-size:.82rem;color:var(--text);font-weight:500;}
.team-card-celebration{font-size:.88rem;color:#92700c;font-weight:600;line-height:1.45;margin-top:8px;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--subtle);font-size:.9rem;}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4;}

/* ── ESPECIALES TAG ── */
.tag-especial{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:600;background:#fef3c7;color:#92400e;margin-left:6px;vertical-align:middle;}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .header{padding:20px 16px 18px;}
  .header h1{font-size:1.15rem;}
  .header-inner{flex-direction:column;align-items:flex-start;gap:10px;}
  .header-right{width:100%;justify-content:space-between;}
  .container{padding:16px 12px 48px;}
  .countdown-row{grid-template-columns:1fr;}
  .province-grid,.team-grid{grid-template-columns:1fr;}
  .status-chips{gap:5px;}
  .status-chip{padding:5px 10px;font-size:.72rem;}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <svg class="header-logo" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#06b3fd" stroke-width="2.5"/><circle cx="20" cy="20" r="8" fill="#06b3fd" opacity=".3"/><circle cx="20" cy="20" r="4" fill="#fff"/><circle cx="20" cy="10" r="2.5" fill="#C9A96E"/><circle cx="28.5" cy="25" r="2.5" fill="#C9A96E"/><circle cx="11.5" cy="25" r="2.5" fill="#C9A96E"/></svg>
      <h1>FNDR <span>Fondos Activos</span></h1>
    </div>
    <div class="header-right">
      <div class="header-user" id="headerUser"></div>
      <a href="index.html" class="header-back">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
        Volver a Central
      </a>
    </div>
  </div>
</div>

<div class="container">
  <!-- Countdown timers -->
  <div class="countdown-row" id="countdownRow"></div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="section-title">
      <svg viewBox="0 0 22 22" fill="none" stroke="var(--navy)" stroke-width="2"><rect x="2" y="6" width="18" height="12" rx="2"/><path d="M6 6V4a4 4 0 018 0v2"/></svg>
      Progreso General
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <!-- Your provinces -->
  <div id="mySection"></div>

  <!-- Team results -->
  <div id="teamSection"></div>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════ */
const FONDOS = [
  {
    id: 'valparaiso',
    nombre: 'FNDR Valparaiso',
    region: 'Valparaiso',
    cierre: '2026-04-22T23:59:00-04:00',
    provincias: [
      { nombre: 'Valparaiso', ejecutivo: 'Rayen Ogalde' },
      { nombre: 'Marga Marga', ejecutivo: 'Rayen Ogalde' },
      { nombre: 'San Antonio', ejecutivo: 'Roberto Caceres' },
      { nombre: 'Petorca', ejecutivo: 'Roberto Caceres' },
      { nombre: 'Los Andes', ejecutivo: 'William Marin' },
      { nombre: 'Quillota', ejecutivo: 'William Marin' },
      { nombre: 'San Felipe', ejecutivo: 'German Alvarado' },
      { nombre: 'Isla de Pascua', ejecutivo: 'Maximiliano Astudillo' },
    ]
  },
  {
    id: 'santiago',
    nombre: 'FNDR Santiago',
    region: 'Metropolitana',
    cierre: '2026-05-07T23:59:00-04:00',
    provincias: []
  }
];

const ESPECIALES = [
  { nombre: 'Universidades Publicas de Valparaiso', ejecutivo: 'William Marin', fondo: 'valparaiso' }
];

// Display names (with accents) for UI rendering
const DISPLAY_NAMES = {
  'valparaiso': 'FNDR Valparaíso',
  'santiago': 'FNDR Santiago'
};
const DISPLAY_PROVINCIAS = {
  'Valparaiso': 'Valparaíso',
  'Marga Marga': 'Marga Marga',
  'San Antonio': 'San Antonio',
  'Petorca': 'Petorca',
  'Los Andes': 'Los Andes',
  'Quillota': 'Quillota',
  'San Felipe': 'San Felipe',
  'Isla de Pascua': 'Isla de Pascua',
  'Universidades Publicas de Valparaiso': 'Universidades Públicas de Valparaíso'
};
const DISPLAY_REGIONES = {
  'Valparaiso': 'Valparaíso',
  'Metropolitana': 'Metropolitana'
};
const DISPLAY_EJECUTIVOS = {
  'rayen ogalde': 'Rayen Ogalde',
  'roberto caceres': 'Roberto Cáceres',
  'william marin': 'William Marín',
  'german alvarado': 'Germán Alvarado',
  'maximiliano astudillo': 'Maximiliano Astudillo'
};

const API_URL = 'https://script.google.com/macros/s/AKfycbzTSJO4coGFPfYJ1F1PDehKWnDSuqViUAKH_nQ2nIxCTt78XvjHMrUC16i9VAGJx6pJ/exec';

const STORAGE_KEY = 'oc_fndr_data';

const STATUSES = [
  { id: 'pendiente', label: 'Pendiente', css: 's-pendiente' },
  { id: 'contacto', label: 'Contacto realizado', css: 's-contacto' },
  { id: 'conversacion', label: 'En conversación', css: 's-conversacion' },
  { id: 'confirmado', label: 'Proyecto confirmado', css: 's-confirmado' }
];

/* ══════════════════════════════════════════
   USER DETECTION
   ══════════════════════════════════════════ */
function normName(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

const USUARIO_RAW = localStorage.getItem('oc_portal_user') || localStorage.getItem('oc_central_user') || '';
const USUARIO = normName(USUARIO_RAW);
const IS_ADMIN = USUARIO === normName('Rayen Ogalde');

function displayUser(raw) {
  const n = normName(raw);
  return DISPLAY_EJECUTIVOS[n] || raw || 'Usuario';
}

document.getElementById('headerUser').textContent = displayUser(USUARIO_RAW);

/* ══════════════════════════════════════════
   DATA PERSISTENCE
   ══════════════════════════════════════════ */
let DATA = { provinces: {}, updates: [] };

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      DATA = {
        provinces: parsed.provinces || {},
        updates: parsed.updates || []
      };
    }
  } catch (e) {
    console.warn('FNDR loadData error', e);
  }
  return DATA;
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  } catch (e) {
    console.warn('FNDR saveData error', e);
  }
}

function getProvinceKey(fondoId, provNombre) {
  return fondoId + '/' + provNombre;
}

function getProvinceData(key) {
  return DATA.provinces[key] || { status: 'pendiente' };
}

function setProvinceData(key, fields) {
  if (!DATA.provinces[key]) DATA.provinces[key] = { status: 'pendiente' };
  Object.assign(DATA.provinces[key], fields);
  saveData();
}

function pushUpdate(ejecutivo, provincia, fondoId, status, extra) {
  DATA.updates.push({
    ejecutivo: ejecutivo,
    provincia: provincia,
    fondo: fondoId,
    status: status,
    institucion: extra.institucion || '',
    tipo: extra.tipo || '',
    fecha: new Date().toISOString(),
    mensaje: extra.mensaje || ''
  });
  saveData();
}

/* ══════════════════════════════════════════
   BUILD ALL PROVINCE ENTRIES
   ══════════════════════════════════════════ */
function getAllProvinces() {
  const list = [];
  for (const f of FONDOS) {
    for (const p of f.provincias) {
      list.push({
        key: getProvinceKey(f.id, p.nombre),
        fondoId: f.id,
        fondoNombre: DISPLAY_NAMES[f.id] || f.nombre,
        region: DISPLAY_REGIONES[f.region] || f.region,
        nombre: p.nombre,
        displayNombre: DISPLAY_PROVINCIAS[p.nombre] || p.nombre,
        ejecutivo: p.ejecutivo,
        especial: false
      });
    }
  }
  for (const e of ESPECIALES) {
    const fondo = FONDOS.find(f => f.id === e.fondo);
    list.push({
      key: getProvinceKey(e.fondo, e.nombre),
      fondoId: e.fondo,
      fondoNombre: DISPLAY_NAMES[e.fondo] || (fondo ? fondo.nombre : e.fondo),
      region: fondo ? (DISPLAY_REGIONES[fondo.region] || fondo.region) : '',
      nombre: e.nombre,
      displayNombre: DISPLAY_PROVINCIAS[e.nombre] || e.nombre,
      ejecutivo: e.ejecutivo,
      especial: true
    });
  }
  return list;
}

/* ══════════════════════════════════════════
   COUNTDOWN TIMERS
   ══════════════════════════════════════════ */
function renderCountdowns() {
  const row = document.getElementById('countdownRow');
  row.innerHTML = '';
  for (const f of FONDOS) {
    const card = document.createElement('div');
    card.className = 'countdown-card';
    card.id = 'cd-' + f.id;
    card.innerHTML = `
      <div class="countdown-label">${DISPLAY_NAMES[f.id] || f.nombre}</div>
      <div class="countdown-region">Región de ${DISPLAY_REGIONES[f.region] || f.region} — Cierre: ${formatDateShort(f.cierre)}</div>
      <div class="countdown-timer" id="cdt-${f.id}"></div>
    `;
    row.appendChild(card);
  }
  tickCountdowns();
}

function formatDateShort(iso) {
  const d = new Date(iso);
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ', ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function tickCountdowns() {
  const now = Date.now();
  for (const f of FONDOS) {
    const target = new Date(f.cierre).getTime();
    const diff = target - now;
    const card = document.getElementById('cd-' + f.id);
    const timer = document.getElementById('cdt-' + f.id);
    if (diff <= 0) {
      card.className = 'countdown-card closed';
      timer.innerHTML = '<div class="countdown-closed">CERRADO</div>';
      continue;
    }
    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    card.className = 'countdown-card' + (days < 7 ? ' urgent' : '');
    timer.innerHTML =
      unit(days, 'días') + unit(hrs, 'hrs') + unit(mins, 'min') + unit(secs, 'seg');
  }
}
function unit(n, l) {
  return '<div class="countdown-unit"><div class="countdown-num">' + n + '</div><div class="countdown-lbl">' + l + '</div></div>';
}

/* ══════════════════════════════════════════
   RENDER MY PROVINCES
   ══════════════════════════════════════════ */
function renderMyProvinces() {
  const section = document.getElementById('mySection');
  const all = getAllProvinces();
  let mine;
  if (IS_ADMIN) {
    mine = all; // admin sees everything
  } else {
    mine = all.filter(p => normName(p.ejecutivo) === USUARIO);
  }
  if (mine.length === 0 && USUARIO) {
    section.innerHTML = `
      <div class="section-title">
        <svg viewBox="0 0 22 22" fill="none" stroke="var(--navy)" stroke-width="2"><path d="M11 2L2 7l9 5 9-5-9-5z"/><path d="M2 12l9 5 9-5"/><path d="M2 17l9 5 9-5"/></svg>
        Tus Provincias Asignadas
      </div>
      <div class="empty-state">
        <svg viewBox="0 0 48 48" fill="none" stroke="var(--subtle)" stroke-width="2"><circle cx="24" cy="24" r="20"/><path d="M16 28s3 4 8 4 8-4 8-4"/><circle cx="18" cy="20" r="2" fill="var(--subtle)"/><circle cx="30" cy="20" r="2" fill="var(--subtle)"/></svg>
        <p>No tienes provincias asignadas en los fondos activos.</p>
      </div>
    `;
    return;
  }
  if (!USUARIO) {
    section.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 48 48" fill="none" stroke="var(--subtle)" stroke-width="2"><circle cx="24" cy="24" r="20"/><path d="M18 18l12 12M30 18L18 30"/></svg>
        <p>No se detectó usuario. Ingresa desde el portal para ver tus provincias.</p>
      </div>
    `;
    return;
  }

  let html = `
    <div class="section-title">
      <svg viewBox="0 0 22 22" fill="none" stroke="var(--navy)" stroke-width="2"><path d="M11 2L2 7l9 5 9-5-9-5z"/><path d="M2 12l9 5 9-5"/><path d="M2 17l9 5 9-5"/></svg>
      ${IS_ADMIN ? 'Todas las Provincias' : 'Tus Provincias Asignadas'}
      <span class="section-subtitle">${displayUser(USUARIO_RAW)}</span>
    </div>
    <div class="province-grid">
  `;
  for (const p of mine) {
    html += buildProvinceCard(p, IS_ADMIN);
  }
  html += '</div>';
  section.innerHTML = html;
  attachProvinceEvents();
}

function buildProvinceCard(p, showOwner) {
  const data = getProvinceData(p.key);
  const status = data.status || 'pendiente';
  const sid = statusIndex(status);

  let ownerHtml = '';
  if (showOwner) {
    ownerHtml = `<div class="province-owner">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3 3-5 6-5s6 2 6 5"/></svg>
      ${displayUser(p.ejecutivo)}
    </div>`;
  }

  let especialTag = p.especial ? '<span class="tag-especial">Especial</span>' : '';

  let chips = '';
  for (let i = 0; i < STATUSES.length; i++) {
    const s = STATUSES[i];
    const active = s.id === status ? ' active' : '';
    chips += `<div class="status-chip ${s.css}${active}" data-key="${esc(p.key)}" data-status="${s.id}">
      <span class="dot"></span>${s.label}
    </div>`;
  }

  let subFieldsHtml = '';
  // Contacto fields
  subFieldsHtml += `<div class="sub-fields${sid >= 1 ? ' visible' : ''}" data-key="${esc(p.key)}" data-panel="contacto">
    <div class="field-group">
      <label class="field-label">Medio de contacto</label>
      <div class="radio-group">
        ${radioOption(p.key, 'medio', 'Email', data.medio)}
        ${radioOption(p.key, 'medio', 'Llamada telefonica', data.medio)}
        ${radioOption(p.key, 'medio', 'Presencial', data.medio)}
        ${radioOption(p.key, 'medio', 'Otro', data.medio)}
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Fecha de contacto</label>
      <input type="date" class="field-input" data-key="${esc(p.key)}" data-field="fecha" value="${esc(data.fecha || '')}">
    </div>
  </div>`;

  // Conversacion fields
  subFieldsHtml += `<div class="sub-fields${sid >= 2 ? ' visible' : ''}" data-key="${esc(p.key)}" data-panel="conversacion">
    <div class="field-group">
      <label class="field-label">Nombre del contacto</label>
      <input type="text" class="field-input" data-key="${esc(p.key)}" data-field="contactoNombre" value="${esc(data.contactoNombre || '')}" placeholder="Nombre completo">
    </div>
    <div class="field-group">
      <label class="field-label">Cargo</label>
      <input type="text" class="field-input" data-key="${esc(p.key)}" data-field="cargo" value="${esc(data.cargo || '')}" placeholder="Ej: Director, Jefe de Adquisiciones">
    </div>
    <div class="field-group">
      <label class="field-label">Institución</label>
      <input type="text" class="field-input" data-key="${esc(p.key)}" data-field="institucion" value="${esc(data.institucion || '')}" placeholder="Nombre de la institución">
    </div>
    <div class="field-group">
      <label class="field-label">Tipo de proyecto</label>
      <div class="radio-group">
        ${radioOption(p.key, 'tipo', 'Ayudas Tecnicas', data.tipo)}
        ${radioOption(p.key, 'tipo', 'Sala Multisensorial', data.tipo)}
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Notas</label>
      <textarea class="field-input" data-key="${esc(p.key)}" data-field="notas" placeholder="Observaciones, detalles de la conversación...">${esc(data.notas || '')}</textarea>
    </div>
  </div>`;

  // Confirmado fields
  subFieldsHtml += `<div class="sub-fields${sid >= 3 ? ' visible' : ''}" data-key="${esc(p.key)}" data-panel="confirmado">
    <div class="field-group">
      <label class="field-label">Monto estimado (opcional)</label>
      <input type="number" class="field-input" data-key="${esc(p.key)}" data-field="monto" value="${esc(data.monto || '')}" placeholder="$0">
    </div>
  </div>`;

  return `
    <div class="province-card" data-key="${esc(p.key)}">
      <div class="province-card-head">
        <div class="province-name">${p.displayNombre}${especialTag}</div>
        <div class="province-fund">${p.fondoNombre} — Región de ${p.region}</div>
        ${ownerHtml}
      </div>
      <div class="province-card-body">
        <div class="status-chips">${chips}</div>
        ${subFieldsHtml}
      </div>
    </div>
  `;
}

function radioOption(key, field, value, current) {
  const id = 'r-' + normName(key + field + value).replace(/[^a-z0-9]/g, '');
  const checked = normName(current) === normName(value) ? 'checked' : '';
  return `<div class="radio-pill">
    <input type="radio" name="radio-${esc(key)}-${field}" id="${id}" value="${esc(value)}" ${checked} data-key="${esc(key)}" data-field="${field}">
    <label for="${id}">${value === 'Llamada telefonica' ? 'Llamada telefónica' : (value === 'Ayudas Tecnicas' ? 'Ayudas Técnicas' : value)}</label>
  </div>`;
}

function statusIndex(id) {
  return STATUSES.findIndex(s => s.id === id);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════════════
   EVENT HANDLERS
   ══════════════════════════════════════════ */
function attachProvinceEvents() {
  // Status chip clicks
  document.querySelectorAll('.status-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      const key = this.dataset.key;
      const newStatus = this.dataset.status;
      const oldData = getProvinceData(key);
      const oldIdx = statusIndex(oldData.status || 'pendiente');
      const newIdx = statusIndex(newStatus);

      // Update status
      setProvinceData(key, { status: newStatus });

      // Push update if advancing
      if (newIdx > oldIdx) {
        const prov = getAllProvinces().find(p => p.key === key);
        if (prov) {
          const d = getProvinceData(key);
          pushUpdate(prov.ejecutivo, prov.displayNombre, prov.fondoId, newStatus, {
            institucion: d.institucion || '',
            tipo: d.tipo || '',
            mensaje: ''
          });
        }
      }

      // Re-render
      renderMyProvinces();
      renderTeamResults();
      renderProgress();
    });
  });

  // Field inputs
  document.querySelectorAll('.field-input').forEach(input => {
    const ev = input.tagName === 'TEXTAREA' ? 'input' : 'change';
    input.addEventListener(ev, function() {
      const key = this.dataset.key;
      const field = this.dataset.field;
      if (key && field) {
        const obj = {};
        obj[field] = this.value;
        setProvinceData(key, obj);
        renderTeamResults(); // update team view if institution changes
      }
    });
    if (input.type === 'text' || input.type === 'number') {
      input.addEventListener('input', function() {
        const key = this.dataset.key;
        const field = this.dataset.field;
        if (key && field) {
          const obj = {};
          obj[field] = this.value;
          setProvinceData(key, obj);
        }
      });
    }
  });

  // Radio buttons
  document.querySelectorAll('.radio-pill input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const key = this.dataset.key;
      const field = this.dataset.field;
      if (key && field) {
        const obj = {};
        obj[field] = this.value;
        setProvinceData(key, obj);
      }
    });
  });
}

/* ══════════════════════════════════════════
   TEAM RESULTS
   ══════════════════════════════════════════ */
function renderTeamResults() {
  const section = document.getElementById('teamSection');
  const all = getAllProvinces();
  const results = [];

  for (const p of all) {
    // Skip own provinces in team view (unless admin)
    if (!IS_ADMIN && normName(p.ejecutivo) === USUARIO) continue;
    const data = getProvinceData(p.key);
    const si = statusIndex(data.status || 'pendiente');
    if (si >= 1) {
      results.push({ prov: p, data: data, si: si });
    }
  }

  // Sort: confirmado first, then conversacion, then contacto
  results.sort((a, b) => b.si - a.si);

  let html = `
    <div class="section-title" style="margin-top:16px;">
      <svg viewBox="0 0 22 22" fill="none" stroke="var(--navy)" stroke-width="2"><circle cx="8" cy="7" r="4"/><path d="M1 19c0-4 3-7 7-7s7 3 7 7"/><circle cx="17" cy="8" r="3"/><path d="M16 13c2.5 0 5 2 5 5"/></svg>
      Resultados del Equipo
    </div>
  `;

  if (results.length === 0) {
    html += `<div class="empty-state">
      <svg viewBox="0 0 48 48" fill="none" stroke="var(--subtle)" stroke-width="2"><rect x="6" y="10" width="36" height="28" rx="3"/><path d="M6 18h36"/><circle cx="16" cy="28" r="3"/><circle cx="32" cy="28" r="3"/></svg>
      <p>Aún no hay actualizaciones del equipo.</p>
    </div>`;
  } else {
    html += '<div class="team-grid">';
    for (const r of results) {
      const statusLabel = STATUSES[r.si].label;
      const statusCss = r.data.status;
      let cardClass = 'team-card status-' + statusCss;
      let content = '';

      content += `<div class="team-card-exec">${displayUser(r.prov.ejecutivo)}</div>`;
      content += `<div class="team-card-prov">${r.prov.displayNombre} — ${r.prov.fondoNombre}</div>`;
      content += `<div class="team-card-status ts-${statusCss}"><span class="dot" style="width:7px;height:7px;border-radius:50%;display:inline-block;background:currentColor;"></span>${statusLabel}</div>`;

      if (r.data.institucion) {
        content += `<div class="team-card-institution">${esc(r.data.institucion)}</div>`;
      }

      if (statusCss === 'confirmado') {
        const tipoDisplay = r.data.tipo === 'Ayudas Tecnicas' ? 'Ayudas Técnicas' : (r.data.tipo || 'un proyecto FNDR');
        content += `<div class="team-card-celebration">${displayUser(r.prov.ejecutivo)} ya se encuentra de camino a un proyecto FNDR para ${tipoDisplay}${r.data.institucion ? ' con ' + esc(r.data.institucion) : ''} en ${r.prov.displayNombre}.</div>`;
      }

      html += `<div class="${cardClass}">${content}</div>`;
    }
    html += '</div>';
  }

  section.innerHTML = html;
}

/* ══════════════════════════════════════════
   PROGRESS BAR
   ══════════════════════════════════════════ */
function renderProgress() {
  const all = getAllProvinces();
  const total = all.length;
  let active = 0;
  for (const p of all) {
    const data = getProvinceData(p.key);
    if (statusIndex(data.status || 'pendiente') >= 1) active++;
  }
  const pct = total > 0 ? Math.round((active / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    active + ' de ' + total + ' provincias con avance (' + pct + '%)';
}

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
loadData();
renderCountdowns();
renderMyProvinces();
renderTeamResults();
renderProgress();

// Tick countdown every second
setInterval(tickCountdowns, 1000);
</script>
