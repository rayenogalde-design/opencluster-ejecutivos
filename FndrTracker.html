<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNDR Tracker — OpenCluster Tech</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@400;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#001a60;--sky:#06b3fd;--gold:#C9A96E;--gold-lt:#E8D5A8;
  --orange:#ff7e00;--pale:#eaf6ff;--bg:#F4F6FB;
  --text:#1a2535;--subtle:#64748b;
  --green:#22c55e;--red:#ef4444;--gray:#94a3b8;
  --card:#fff;--radius:14px;--shadow:0 2px 12px rgba(0,26,96,.07);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text);}

/* ── Hero Background ── */
.hero-bg{position:fixed;top:0;left:0;right:0;height:320px;
  background:linear-gradient(170deg,#0A0F1E 0%,var(--navy) 35%,#0a2e8a 60%,var(--sky) 100%);
  z-index:0;}
.hero-bg::before{content:'';position:absolute;bottom:60px;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent 5%,var(--gold) 30%,var(--gold-lt) 50%,var(--gold) 70%,transparent 95%);opacity:.35;}
.hero-bg::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:100px;
  background:linear-gradient(to bottom,transparent,var(--bg));}

.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px;}

/* ── Top Bar ── */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 0;opacity:0;animation:fadeUp .6s .1s forwards;}
.top-bar a{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s;display:flex;align-items:center;gap:6px;}
.top-bar a:hover{color:#fff;}
.top-bar .user-tag{color:var(--gold-lt);font-size:12px;font-weight:600;letter-spacing:.5px;}

/* ── Header ── */
.header{text-align:center;padding:20px 0 40px;opacity:0;animation:fadeUp .7s .2s forwards;}
.brand-line{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px;}
.brand-bar{width:40px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);}
.brand-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.brand-text{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.6);text-transform:uppercase;font-weight:700;}
.header h1{font-family:'Montserrat',sans-serif;font-size:34px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.header h1 span{color:var(--gold-lt);font-weight:600;}
.header .sub{font-size:14px;color:rgba(255,255,255,.45);margin-top:8px;font-weight:400;}

/* ── Countdown Section ── */
.countdowns{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-bottom:32px;opacity:0;animation:fadeUp .7s .35s forwards;}
.countdown-card{background:var(--card);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow);border:1px solid rgba(0,26,96,.06);position:relative;overflow:hidden;}
.countdown-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--navy),var(--sky));}
.countdown-card.urgent::before{background:linear-gradient(90deg,var(--red),var(--orange));}
.countdown-card.closed::before{background:var(--gray);}
.countdown-card .fund-name{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.countdown-card .fund-region{font-size:12px;color:var(--subtle);margin-bottom:16px;}
.countdown-card .timer{display:flex;gap:12px;justify-content:center;}
.timer-unit{text-align:center;}
.timer-unit .num{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:800;color:var(--navy);line-height:1;min-width:52px;display:block;}
.timer-unit .lbl{font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:1px;margin-top:4px;display:block;}
.countdown-card.urgent .timer-unit .num{color:var(--red);}
.countdown-card.closed .timer-unit .num{color:var(--gray);font-size:20px;}
.closed-label{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:var(--gray);text-align:center;padding:12px 0;letter-spacing:2px;}

/* ── Progress Bar ── */
.progress-section{margin-bottom:28px;opacity:0;animation:fadeUp .7s .45s forwards;}
.progress-card{background:var(--card);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border:1px solid rgba(0,26,96,.06);}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.progress-header .title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--navy);}
.progress-header .count{font-size:13px;color:var(--subtle);font-weight:600;}
.progress-track{height:10px;background:#e8ecf4;border-radius:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--sky),var(--green));transition:width .6s ease;}

/* ── Fund Section ── */
.fund-section{margin-bottom:32px;opacity:0;animation:fadeUp .7s .55s forwards;}
.fund-section-title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.fund-section-title .dot{width:10px;height:10px;border-radius:50%;background:var(--sky);flex-shrink:0;}

/* ── Province Cards ── */
.prov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:12px;}
.prov-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid rgba(0,26,96,.06);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.prov-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,26,96,.1);}
.prov-card.confirmed{border-color:var(--green);border-width:2px;}
.prov-card.confirmed::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;animation:goldBurst .8s ease-out forwards;opacity:0;}
.prov-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.prov-name{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;color:var(--navy);}
.prov-exec{font-size:12px;color:var(--subtle);margin-top:2px;}
.status-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.status-badge .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-pendiente{background:#f1f5f9;color:#64748b;}.status-pendiente .sdot{background:#94a3b8;}
.status-contacto{background:#fff7ed;color:#c2410c;}.status-contacto .sdot{background:var(--orange);}
.status-conversacion{background:#eff6ff;color:#1d4ed8;}.status-conversacion .sdot{background:var(--sky);}
.status-confirmado{background:#f0fdf4;color:#15803d;}.status-confirmado .sdot{background:var(--green);}

.prov-details{margin-top:12px;padding-top:10px;border-top:1px solid #f1f5f9;font-size:13px;color:var(--text);}
.prov-details label{font-size:11px;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;font-weight:600;}
.prov-details .detail-row{display:flex;gap:16px;margin-bottom:6px;}
.prov-details input,.prov-details select{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;width:100%;outline:none;transition:border-color .2s;}
.prov-details input:focus,.prov-details select:focus{border-color:var(--sky);}

.prov-actions{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;}
.btn-status{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;}
.btn-status:hover{border-color:var(--sky);background:#eff6ff;color:var(--navy);}
.btn-status.active{border-color:var(--sky);background:var(--sky);color:#fff;}

/* ── Celebrations ── */
.celebrations-section{margin-bottom:32px;}
.celebrations-section .section-title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.celeb-card{background:linear-gradient(135deg,#fffbf0,#fff9e8);border:2px solid var(--gold-lt);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;position:relative;overflow:hidden;animation:slideIn .4s ease;}
.celeb-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--gold);}
.celeb-card .celeb-text{font-size:14px;color:var(--text);font-weight:500;padding-left:8px;}
.celeb-card .celeb-text strong{color:var(--navy);font-weight:700;}
.celeb-card .celeb-meta{font-size:11px;color:var(--subtle);margin-top:6px;padding-left:8px;}
.no-celebs{color:var(--subtle);font-size:13px;font-style:italic;}

/* ── Updates Feed ── */
.updates-section{margin-bottom:48px;}
.updates-section .section-title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.update-form{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid rgba(0,26,96,.06);margin-bottom:16px;}
.update-form .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.update-form .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
.update-form .field.wide{flex:2;min-width:200px;}
.update-form label{font-size:11px;color:var(--subtle);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.update-form input,.update-form select,.update-form textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;outline:none;transition:border-color .2s;}
.update-form input:focus,.update-form select:focus,.update-form textarea:focus{border-color:var(--sky);}
.update-form textarea{resize:vertical;min-height:40px;}
.btn-submit{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:8px 20px;border:none;border-radius:8px;background:var(--navy);color:#fff;cursor:pointer;transition:all .2s;white-space:nowrap;align-self:flex-end;}
.btn-submit:hover{background:#0a2e8a;transform:translateY(-1px);}

.update-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #f1f5f9;}
.update-item:last-child{border-bottom:none;}
.update-dot{width:10px;height:10px;border-radius:50%;background:var(--sky);margin-top:5px;flex-shrink:0;}
.update-content .update-header{font-size:13px;font-weight:600;color:var(--navy);}
.update-content .update-header span{color:var(--subtle);font-weight:400;margin-left:6px;font-size:12px;}
.update-content .update-body{font-size:13px;color:var(--text);margin-top:4px;line-height:1.5;}
.update-content .update-prov{font-size:11px;color:var(--sky);font-weight:600;margin-top:2px;}
.no-updates{color:var(--subtle);font-size:13px;font-style:italic;padding:12px 0;}

/* ── Footer ── */
.footer{text-align:center;padding:24px 0 40px;color:var(--subtle);font-size:12px;opacity:.6;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
@keyframes goldBurst{
  0%{opacity:.6;background:radial-gradient(circle at center,rgba(201,169,110,.3),transparent 70%);}
  100%{opacity:0;background:radial-gradient(circle at center,rgba(201,169,110,0),transparent 70%);}
}
@keyframes confirmPulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}
  70%{box-shadow:0 0 0 14px rgba(34,197,94,0);}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
}
.prov-card.just-confirmed{animation:confirmPulse .8s ease-out;}

/* ── SVG Icons inline ── */
.icon{width:16px;height:16px;fill:currentColor;flex-shrink:0;}

/* ── Responsive ── */
@media(max-width:640px){
  .header h1{font-size:24px;}
  .countdowns{grid-template-columns:1fr;}
  .prov-grid{grid-template-columns:1fr;}
  .timer-unit .num{font-size:24px;min-width:40px;}
  .update-form .form-row{flex-direction:column;}
  .update-form .field,.update-form .field.wide{min-width:100%;}
  .prov-details .detail-row{flex-direction:column;gap:8px;}
}
</style>
</head>
<body>

<div class="hero-bg"></div>

<div class="page">
  <!-- Top Bar -->
  <div class="top-bar">
    <a href="index.html" id="backLink">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      Volver a Central
    </a>
    <span class="user-tag" id="userTag"></span>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="brand-line">
      <span class="brand-bar"></span>
      <span class="brand-diamond"></span>
      <span class="brand-text">OpenCluster Tech</span>
      <span class="brand-diamond"></span>
      <span class="brand-bar"></span>
    </div>
    <h1>FNDR <span>&#8212; Fondos Activos</span></h1>
    <div class="sub">Seguimiento de postulaciones a Fondos Nacionales de Desarrollo Regional</div>
  </div>

  <!-- Countdowns -->
  <div class="countdowns" id="countdowns"></div>

  <!-- Progress Bar -->
  <div class="progress-section">
    <div class="progress-card">
      <div class="progress-header">
        <span class="title">Cobertura de Provincias</span>
        <span class="count" id="progressCount">0 de 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Fund Sections (province cards) -->
  <div id="fundSections"></div>

  <!-- Celebrations -->
  <div class="celebrations-section" id="celebSection">
    <div class="section-title">
      <svg class="icon" viewBox="0 0 24 24" style="color:var(--gold);width:20px;height:20px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Proyectos Confirmados
    </div>
    <div id="celebFeed"></div>
  </div>

  <!-- Quick Updates -->
  <div class="updates-section">
    <div class="section-title">
      <svg class="icon" viewBox="0 0 24 24" style="color:var(--sky);width:20px;height:20px;"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      Actualizaciones
    </div>
    <div class="update-form" id="updateForm">
      <div class="form-row">
        <div class="field">
          <label>Provincia / Asignaci&oacute;n</label>
          <select id="updProv"></select>
        </div>
        <div class="field wide">
          <label>Comentario</label>
          <input type="text" id="updText" placeholder="Breve actualizaci&oacute;n..." maxlength="200">
        </div>
        <button class="btn-submit" onclick="postUpdate()">
          <svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px;margin-right:4px;vertical-align:middle;fill:#fff;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          Publicar
        </button>
      </div>
    </div>
    <div id="updatesFeed"></div>
  </div>

  <div class="footer">OpenCluster Tech &mdash; FNDR Tracker</div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG & DATA
// ═══════════════════════════════════════════════

const API_URL = 'https://script.google.com/macros/s/AKfycbwdU9xdu_qtWBB0ZiyaFLZerYEqd3n9EnGDBCkmanWXrzLpdLDbM6IBHEug5DGnBa6O/exec';
const STORAGE_KEY = 'oc_fndr_data';

const USUARIO = localStorage.getItem('oc_portal_user') || localStorage.getItem('oc_central_user') || '';

const FONDOS = [
  {
    id: 'valparaiso',
    nombre: 'FNDR Valpara\u00edso',
    region: 'Valpara\u00edso',
    cierre: '2026-04-22T23:59:00-04:00',
    provincias: [
      { nombre: 'Valparaíso', ejecutivo: 'Rayen Ogalde' },
      { nombre: 'Marga Marga', ejecutivo: 'Rayen Ogalde' },
      { nombre: 'San Antonio', ejecutivo: 'Roberto Cáceres' },
      { nombre: 'Petorca', ejecutivo: 'Roberto Cáceres' },
      { nombre: 'Los Andes', ejecutivo: 'William Marín' },
      { nombre: 'Quillota', ejecutivo: 'William Marín' },
      { nombre: 'San Felipe', ejecutivo: 'Germán Alvarado' },
      { nombre: 'Isla de Pascua', ejecutivo: 'Maximiliano Astudillo' },
    ]
  },
  {
    id: 'santiago',
    nombre: 'FNDR Santiago',
    region: 'Metropolitana',
    cierre: '2026-05-07T23:59:00-04:00',
    provincias: []
  }
];

const ESPECIALES = [
  { nombre: 'Universidades Públicas de Valparaíso', ejecutivo: 'William Marín', fondo: 'valparaiso' }
];

const STATUS_LIST = [
  { key: 'pendiente', label: 'Pendiente', css: 'status-pendiente' },
  { key: 'contacto', label: 'En contacto', css: 'status-contacto' },
  { key: 'conversacion', label: 'En conversaci\u00f3n', css: 'status-conversacion' },
  { key: 'confirmado', label: 'Proyecto confirmado', css: 'status-confirmado' }
];

const STATUS_ORDER = { pendiente: 0, contacto: 1, conversacion: 2, confirmado: 3 };
const TIPO_LABELS = { AT: 'Ayudas T\u00e9cnicas', SM: 'Sala Multisensorial' };

// ═══════════════════════════════════════════════
// DATA LAYER (localStorage now, API later)
// ═══════════════════════════════════════════════

function defaultData() {
  const provincias = {};
  const celebraciones = [];
  const actualizaciones = [];
  FONDOS.forEach(f => {
    f.provincias.forEach(p => {
      const key = f.id + '::' + p.nombre;
      provincias[key] = {
        fondo: f.id,
        nombre: p.nombre,
        ejecutivo: p.ejecutivo,
        status: 'pendiente',
        institucion: '',
        tipo: '',
        especial: false
      };
    });
  });
  ESPECIALES.forEach(e => {
    const key = e.fondo + '::esp::' + e.nombre;
    provincias[key] = {
      fondo: e.fondo,
      nombre: e.nombre,
      ejecutivo: e.ejecutivo,
      status: 'pendiente',
      institucion: '',
      tipo: '',
      especial: true
    };
  });
  return { provincias, celebraciones, actualizaciones };
}

async function loadData() {
  // Future: return (await fetch(API_URL + '?action=getFndr')).json();
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    const d = defaultData();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    return d;
  }
  const data = JSON.parse(raw);
  // Merge any new provinces from config that aren't in stored data
  const def = defaultData();
  Object.keys(def.provincias).forEach(key => {
    if (!data.provincias[key]) {
      data.provincias[key] = def.provincias[key];
    }
  });
  if (!data.celebraciones) data.celebraciones = [];
  if (!data.actualizaciones) data.actualizaciones = [];
  return data;
}

async function saveData(data) {
  // Future: await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'saveFndr', data }) });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

let DATA = null;

// ═══════════════════════════════════════════════
// USER PERMISSIONS
// ═══════════════════════════════════════════════

function canEdit(ejecutivo) {
  if (!USUARIO) return false;
  const u = USUARIO.toLowerCase().trim();
  const e = ejecutivo.toLowerCase().trim();
  // Rayen can edit everything
  if (u === 'rayen' || u.includes('rayen') || u.includes('ogalde')) return true;
  // Match by first name or full name
  const eParts = e.split(' ');
  return u === e || eParts.some(part => part.length > 2 && u.includes(part.toLowerCase()));
}

// ═══════════════════════════════════════════════
// COUNTDOWN TIMERS
// ═══════════════════════════════════════════════

function renderCountdowns() {
  const container = document.getElementById('countdowns');
  container.innerHTML = '';
  FONDOS.forEach(f => {
    const card = document.createElement('div');
    card.className = 'countdown-card';
    card.id = 'cd-' + f.id;
    card.innerHTML = `
      <div class="fund-name">${f.nombre}</div>
      <div class="fund-region">Regi\u00f3n de ${f.region}</div>
      <div class="timer" id="timer-${f.id}"></div>
    `;
    container.appendChild(card);
  });
  updateCountdowns();
}

function updateCountdowns() {
  const now = Date.now();
  FONDOS.forEach(f => {
    const target = new Date(f.cierre).getTime();
    const diff = target - now;
    const card = document.getElementById('cd-' + f.id);
    const timerEl = document.getElementById('timer-' + f.id);
    if (!card || !timerEl) return;

    card.classList.remove('urgent', 'closed');

    if (diff <= 0) {
      card.classList.add('closed');
      timerEl.innerHTML = '<div class="closed-label">CERRADO</div>';
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    if (days < 7) card.classList.add('urgent');

    timerEl.innerHTML = `
      <div class="timer-unit"><span class="num">${days}</span><span class="lbl">d\u00edas</span></div>
      <div class="timer-unit"><span class="num">${String(hrs).padStart(2,'0')}</span><span class="lbl">horas</span></div>
      <div class="timer-unit"><span class="num">${String(mins).padStart(2,'0')}</span><span class="lbl">min</span></div>
      <div class="timer-unit"><span class="num">${String(secs).padStart(2,'0')}</span><span class="lbl">seg</span></div>
    `;
  });
}

// ═══════════════════════════════════════════════
// PROVINCE CARDS
// ═══════════════════════════════════════════════

function renderFundSections() {
  const container = document.getElementById('fundSections');
  container.innerHTML = '';
  FONDOS.forEach(f => {
    const provKeys = Object.keys(DATA.provincias).filter(k => DATA.provincias[k].fondo === f.id);
    if (provKeys.length === 0) return;

    const section = document.createElement('div');
    section.className = 'fund-section';
    section.innerHTML = `<div class="fund-section-title"><span class="dot"></span>${f.nombre}</div>`;

    const grid = document.createElement('div');
    grid.className = 'prov-grid';

    provKeys.forEach(key => {
      const p = DATA.provincias[key];
      const statusInfo = STATUS_LIST.find(s => s.key === p.status) || STATUS_LIST[0];
      const showDetails = STATUS_ORDER[p.status] >= 2;
      const editable = canEdit(p.ejecutivo);
      const isConfirmed = p.status === 'confirmado';

      const card = document.createElement('div');
      card.className = 'prov-card' + (isConfirmed ? ' confirmed' : '');
      card.id = 'card-' + key.replace(/[^a-zA-Z0-9]/g, '_');

      let detailsHTML = '';
      if (showDetails || isConfirmed) {
        detailsHTML = `
          <div class="prov-details">
            <div class="detail-row">
              <div style="flex:2">
                <label>Instituci\u00f3n</label>
                <input type="text" value="${escapeAttr(p.institucion)}" ${editable ? '' : 'disabled'}
                  onchange="updateField('${escapeAttr(key)}','institucion',this.value)" placeholder="Nombre instituci\u00f3n">
              </div>
              <div style="flex:1">
                <label>Tipo</label>
                <select ${editable ? '' : 'disabled'} onchange="updateField('${escapeAttr(key)}','tipo',this.value)">
                  <option value="">--</option>
                  <option value="AT" ${p.tipo==='AT'?'selected':''}>AT - Ayudas T\u00e9cnicas</option>
                  <option value="SM" ${p.tipo==='SM'?'selected':''}>SM - Sala Multisensorial</option>
                </select>
              </div>
            </div>
          </div>`;
      }

      let actionsHTML = '';
      if (editable) {
        actionsHTML = '<div class="prov-actions">';
        STATUS_LIST.forEach(s => {
          actionsHTML += `<button class="btn-status ${p.status === s.key ? 'active' : ''}"
            onclick="changeStatus('${escapeAttr(key)}','${s.key}')">${s.label}</button>`;
        });
        actionsHTML += '</div>';
      }

      card.innerHTML = `
        <div class="prov-top">
          <div>
            <div class="prov-name">${p.especial ? '<svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;fill:var(--gold);"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' : ''}${p.nombre}</div>
            <div class="prov-exec">${p.ejecutivo}</div>
          </div>
          <span class="status-badge ${statusInfo.css}"><span class="sdot"></span>${statusInfo.label}</span>
        </div>
        ${detailsHTML}
        ${actionsHTML}
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

// ═══════════════════════════════════════════════
// STATUS CHANGE
// ═══════════════════════════════════════════════

async function changeStatus(key, newStatus) {
  const p = DATA.provincias[key];
  if (!p) return;
  const oldStatus = p.status;
  p.status = newStatus;

  if (newStatus === 'confirmado' && oldStatus !== 'confirmado') {
    DATA.celebraciones.unshift({
      ejecutivo: p.ejecutivo,
      provincia: p.nombre,
      institucion: p.institucion || '(por definir)',
      tipo: p.tipo || '?',
      fecha: new Date().toISOString()
    });
  }

  await saveData(DATA);
  renderFundSections();
  renderProgress();
  renderCelebrations();

  if (newStatus === 'confirmado' && oldStatus !== 'confirmado') {
    const cardId = 'card-' + key.replace(/[^a-zA-Z0-9]/g, '_');
    const cardEl = document.getElementById(cardId);
    if (cardEl) {
      cardEl.classList.add('just-confirmed');
      setTimeout(() => cardEl.classList.remove('just-confirmed'), 1000);
    }
  }
}

async function updateField(key, field, value) {
  const p = DATA.provincias[key];
  if (!p) return;
  p[field] = value;
  // Also update the celebration if it exists for this province
  if (field === 'institucion' || field === 'tipo') {
    DATA.celebraciones.forEach(c => {
      if (c.provincia === p.nombre && c.ejecutivo === p.ejecutivo) {
        if (field === 'institucion') c.institucion = value;
        if (field === 'tipo') c.tipo = value;
      }
    });
  }
  await saveData(DATA);
  renderCelebrations();
}

// ═══════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════

function renderProgress() {
  const allProvs = Object.values(DATA.provincias);
  const total = allProvs.length;
  const covered = allProvs.filter(p => STATUS_ORDER[p.status] >= 1).length;
  const pct = total > 0 ? Math.round((covered / total) * 100) : 0;
  document.getElementById('progressCount').textContent = covered + ' de ' + total;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ═══════════════════════════════════════════════
// CELEBRATIONS
// ═══════════════════════════════════════════════

function renderCelebrations() {
  const feed = document.getElementById('celebFeed');
  if (DATA.celebraciones.length === 0) {
    feed.innerHTML = '<div class="no-celebs">A\u00fan no hay proyectos confirmados.</div>';
    return;
  }
  feed.innerHTML = DATA.celebraciones.map(c => {
    const tipoLabel = TIPO_LABELS[c.tipo] || c.tipo || '';
    const dateStr = c.fecha ? new Date(c.fecha).toLocaleDateString('es-CL', { day:'numeric', month:'short', year:'numeric' }) : '';
    return `<div class="celeb-card">
      <div class="celeb-text"><strong>${c.ejecutivo}</strong> tiene proyecto confirmado en <strong>${c.provincia}</strong>! ${c.institucion} va por <strong>${tipoLabel || '(tipo por definir)'}</strong></div>
      <div class="celeb-meta">${dateStr}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// QUICK UPDATES
// ═══════════════════════════════════════════════

function populateUpdateSelect() {
  const sel = document.getElementById('updProv');
  sel.innerHTML = '<option value="">Seleccionar...</option>';
  FONDOS.forEach(f => {
    f.provincias.forEach(p => {
      sel.innerHTML += `<option value="${f.id}::${p.nombre}">${p.nombre} (${f.nombre})</option>`;
    });
  });
  ESPECIALES.forEach(e => {
    sel.innerHTML += `<option value="${e.fondo}::esp::${e.nombre}">${e.nombre}</option>`;
  });
}

async function postUpdate() {
  const prov = document.getElementById('updProv').value;
  const text = document.getElementById('updText').value.trim();
  if (!prov || !text) return;

  const provData = DATA.provincias[prov];
  const nombre = USUARIO || (provData ? provData.ejecutivo : 'An\u00f3nimo');

  DATA.actualizaciones.unshift({
    nombre: nombre,
    provincia: provData ? provData.nombre : prov,
    texto: text,
    fecha: new Date().toISOString()
  });

  await saveData(DATA);
  document.getElementById('updText').value = '';
  document.getElementById('updProv').value = '';
  renderUpdates();
}

function renderUpdates() {
  const feed = document.getElementById('updatesFeed');
  if (DATA.actualizaciones.length === 0) {
    feed.innerHTML = '<div class="no-updates">Sin actualizaciones a\u00fan.</div>';
    return;
  }
  feed.innerHTML = DATA.actualizaciones.slice(0, 30).map(u => {
    const dateStr = u.fecha ? new Date(u.fecha).toLocaleDateString('es-CL', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    return `<div class="update-item">
      <div class="update-dot"></div>
      <div class="update-content">
        <div class="update-header">${u.nombre}<span>${dateStr}</span></div>
        <div class="update-prov">${u.provincia}</div>
        <div class="update-body">${escapeHTML(u.texto)}</div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function escapeAttr(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

async function init() {
  // User tag
  const userTag = document.getElementById('userTag');
  if (USUARIO) {
    userTag.textContent = USUARIO;
  }

  // Show/hide update form based on login
  if (!USUARIO) {
    document.getElementById('updateForm').style.display = 'none';
  }

  DATA = await loadData();

  renderCountdowns();
  setInterval(updateCountdowns, 1000);

  renderFundSections();
  renderProgress();
  renderCelebrations();
  populateUpdateSelect();
  renderUpdates();
}

init();
</script>
</body>
</html>
