<title>Buscador de productos</title>
<style>
:root { --navy:#06b3fd; --navy-2:#0a2e8a; --orange:#ff7e00; --blue:#06b3fd;
  --bg:#eef1f5; --surface:#ffffff; --border:#dfe4ea; --ink:#182233; --ink-dim:#5b6779; --ink-faint:#8b96a5;
  --shadow:0 1px 2px rgba(14,33,72,.06),0 6px 18px -10px rgba(14,33,72,.25); }
@media (prefers-color-scheme: dark) { :root { --bg:#0b0f16; --surface:#141a24; --border:#293244; --ink:#eef2f7; --ink-dim:#a7b2c2; --ink-faint:#717c8d; --shadow:0 1px 2px rgba(0,0,0,.5),0 6px 18px -10px rgba(0,0,0,.7); } }
:root[data-theme="dark"] { --bg:#0b0f16; --surface:#141a24; --border:#293244; --ink:#eef2f7; --ink-dim:#a7b2c2; --ink-faint:#717c8d; --shadow:0 1px 2px rgba(0,0,0,.5),0 6px 18px -10px rgba(0,0,0,.7); }
:root[data-theme="light"] { --bg:#eef1f5; --surface:#ffffff; --border:#dfe4ea; --ink:#182233; --ink-dim:#5b6779; --ink-faint:#8b96a5; --shadow:0 1px 2px rgba(14,33,72,.06),0 6px 18px -10px rgba(14,33,72,.25); }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif; line-height:1.45; }
.mono { font-family: ui-monospace,"SF Mono","Cascadia Code","Consolas",monospace; font-variant-numeric:tabular-nums; }
.wrap { max-width:820px; margin:0 auto; padding:0 18px 60px; }
header.top { background:linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%); padding:26px 18px 22px; }
header.top .inner { max-width:820px; margin:0 auto; display:flex; align-items:center; gap:14px; }
.logo-badge { width:46px; height:46px; border-radius:13px; background:var(--orange); display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 4px 14px -4px rgba(245,130,10,.6); }
h1 { font-size:20px; margin:0; color:#fff; letter-spacing:-.01em; }
.sub { font-size:13px; color:#e6f6ff; margin:2px 0 0; }
.pdf-btn { flex-shrink:0; display:flex; align-items:center; gap:6px; padding:9px 14px; border-radius:10px; background:rgba(255,255,255,.16); border:1.5px solid rgba(255,255,255,.4); color:#fff; font-size:13px; font-weight:600; text-decoration:none; white-space:nowrap; }
.pdf-btn:hover { background:rgba(255,255,255,.26); }
.search-shell { position:sticky; top:0; z-index:10; background:var(--bg); padding:18px 0 4px; }
.search-box { position:relative; }
.search-box input { width:100%; padding:14px 16px 14px 44px; font-size:15px; border-radius:12px; border:1.5px solid var(--border); background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
.search-box input:focus-visible { outline:2px solid var(--blue); outline-offset:1px; }
.search-box svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--ink-faint); }
.hint { font-size:12.5px; color:var(--ink-faint); margin:8px 2px 0; }
.chips-scroll { overflow-x:auto; margin:12px -18px 0; padding:0 18px 4px; }
.chips { display:flex; gap:7px; width:max-content; }
.chip { font-size:13px; font-weight:600; padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--ink-dim); cursor:pointer; white-space:nowrap; user-select:none; flex-shrink:0; }
.chip.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.result-count { font-size:12px; color:var(--ink-faint); margin:12px 2px 0; font-family:ui-monospace,monospace; }
.results { display:flex; flex-direction:column; gap:10px; padding:12px 0 40px; }
.row-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; }
.row-top { display:flex; gap:12px; padding:14px; }
.row-thumb { width:96px; height:96px; border-radius:11px; object-fit:contain; object-position:center; flex-shrink:0; background:#ffffff; border:1px solid var(--border); padding:4px; }
.row-thumb-ph { width:96px; height:96px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:34px; border:1px solid var(--border); }
@media (max-width: 480px) {
  .row-thumb, .row-thumb-ph { width:72px; height:72px; }
}
.row-info { flex:1; min-width:0; }
.row-eyebrow { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
.row-name { font-size:14.5px; font-weight:700; margin:2px 0 5px; line-height:1.3; }
.row-tags { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.row-code { font-family:ui-monospace,"SF Mono",monospace; font-size:11px; font-weight:700; background:var(--bg); color:var(--ink-dim); padding:2px 8px; border-radius:6px; border:1px solid var(--border); }
.row-brand { font-size:12px; color:var(--ink-faint); }
.row-price { flex-shrink:0; background:linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%); border-radius:11px; padding:9px 13px; text-align:right; min-width:112px; align-self:center; }
.row-price .k { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#dff3ff; display:block; }
.row-price .v { font-family:ui-monospace,"SF Mono",monospace; font-variant-numeric:tabular-nums; font-weight:700; font-size:15px; color:#fff; display:block; }
.row-price .v2 { font-size:11px; color:#e3f0ff; margin-top:3px; display:block; }
.row-price .undef { font-style:italic; color:#bcdcf5; font-weight:500; text-decoration:line-through; }
.order-bar { display:flex; align-items:center; gap:8px; background:#fdeee0; color:#9a5310; font-size:12.5px; font-weight:600; padding:8px 14px; border-top:1px solid var(--border); }
:root[data-theme="dark"] .order-bar, @media (prefers-color-scheme:dark) { }
.order-bar.dark-safe { background:#3a2a15; color:#f0b878; }
.empty { text-align:center; color:var(--ink-faint); padding:50px 0; font-size:14px; }
.note { font-size:11px; color:var(--ink-faint); font-style:italic; padding:0 14px 10px; }
footer.credits { text-align:center; padding:20px 0; color:var(--ink-faint); font-size:12px; }
.row-thumb { cursor: zoom-in; }
.lightbox {
  position: fixed; inset: 0; background: rgba(9,13,18,0.86); display: none;
  align-items: center; justify-content: center; z-index: 100; padding: 32px;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: min(92vw, 640px); max-height: 86vh; border-radius: 14px; background: #fff; box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6); }
.lightbox-close {
  position: absolute; top: 18px; right: 20px; width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-close:hover { background: rgba(255,255,255,0.22); }

.interes-bar { display:flex; align-items:center; gap:10px; padding:10px 14px; border-top:1px solid var(--border); flex-wrap:wrap; }
.interes-btn {
  display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; padding:7px 13px;
  border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--ink-dim); cursor:pointer;
}
.interes-btn:hover { border-color:#f0b100; color:#9a7000; }
.interes-btn.marcado { background:#fff6da; border-color:#f0b100; color:#8a6200; }
:root[data-theme="dark"] .interes-btn.marcado, @media (prefers-color-scheme:dark){ .interes-btn.marcado { background:#3a2f0c; color:#f0c94a; } }
.interes-nota-toggle { font-size:12px; color:var(--ink-faint); background:none; border:none; cursor:pointer; text-decoration:underline; }
.interes-nota-row { display:none; gap:8px; width:100%; margin-top:6px; }
.interes-nota-row.open { display:flex; }
.interes-nota-row input { flex:1; padding:7px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--ink); font-size:12.5px; }
.interes-nota-row button { font-size:12px; font-weight:700; padding:7px 12px; border-radius:8px; border:none; background:var(--blue); color:#fff; cursor:pointer; }
.interes-msg { font-size:11.5px; color:#2f8f5b; }
.interes-banner { font-size:12px; color:var(--ink-faint); background:var(--surface-2); border:1px dashed var(--border); border-radius:10px; padding:8px 12px; margin-bottom:10px; }
.ranking-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
.ranking-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; }
.ranking-header h3 { margin:0; font-size:14px; }
.ranking-header .toggle-icon { transition: transform .15s; color: var(--ink-faint); }
.ranking-panel.collapsed .ranking-body { display:none; }
.ranking-panel.collapsed .toggle-icon { transform: rotate(-90deg); }
.ranking-body { padding:0 16px 14px; }
.ranking-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0; border-top:1px solid var(--border); font-size:13px; }
.ranking-row:first-child { border-top:none; }
.ranking-count { font-family:ui-monospace,monospace; font-weight:800; background:#fff6da; color:#8a6200; padding:2px 9px; border-radius:20px; font-size:12px; flex-shrink:0; }
:root[data-theme="dark"] .ranking-count, @media (prefers-color-scheme:dark){ .ranking-count { background:#3a2f0c; color:#f0c94a; } }
.ranking-empty { color:var(--ink-faint); font-size:13px; padding:8px 0; }
.ranking-refresh { font-size:12px; color:var(--blue); background:none; border:none; cursor:pointer; text-decoration:underline; }

.results { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; padding:12px 0 90px; }
@media (max-width:900px) { .results { grid-template-columns:repeat(2, 1fr); } }
@media (max-width:560px) { .results { grid-template-columns:1fr; } }
.pcard { background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column; }
.pcard-img-wrap { position:relative; background:#fff; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; border-bottom:1px solid var(--border); cursor:zoom-in; }
.pcard-img { width:100%; height:100%; object-fit:contain; padding:10px; }
.pcard-img-ph { font-size:40px; }
.pcard-code { position:absolute; top:8px; left:8px; font-family:ui-monospace,monospace; font-size:10px; font-weight:700; background:rgba(255,255,255,.92); color:#5b6779; padding:2px 7px; border-radius:6px; border:1px solid var(--border); }
.pcard-body { padding:12px 12px 14px; display:flex; flex-direction:column; gap:5px; flex:1; }
.pcard-eyebrow { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
.pcard-brand { font-size:10.5px; color:var(--ink-faint); }
.pcard-name { font-size:13px; font-weight:700; line-height:1.3; min-height:34px; }
.pcard-price-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); margin-top:2px; }
.pcard-price { font-family:ui-monospace,monospace; font-weight:800; font-size:17px; color:var(--navy-2); }
:root[data-theme="dark"] .pcard-price, @media (prefers-color-scheme:dark){ .pcard-price { color:#7fd1ff; } }
.pcard-price-tramo { font-size:10.5px; color:var(--ink-faint); }
.pcard-actions { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
.pcard-ficha-btn { font-size:11.5px; font-weight:700; padding:7px 10px; border-radius:9px; border:1px solid var(--border); background:var(--bg); color:var(--ink-dim); cursor:pointer; text-align:center; }
.pcard-add-btn { font-size:12px; font-weight:700; padding:9px 10px; border-radius:9px; border:none; background:var(--blue); color:#fff; cursor:pointer; text-align:center; display:flex; align-items:center; justify-content:center; gap:6px; }
.pcard-add-btn.on { background:#0a8a4a; }

.quote-fab { position:fixed; right:18px; bottom:18px; z-index:120; display:flex; align-items:center; gap:8px; padding:12px 18px; border-radius:30px; background:var(--navy-2); color:#fff; border:none; box-shadow:0 8px 24px -8px rgba(10,46,138,.5); font-size:13px; font-weight:700; cursor:pointer; }
.quote-fab b { background:var(--orange); color:#fff; border-radius:12px; padding:1px 8px; font-size:12px; }
.quote-fab.hidden { display:none; }
.quote-overlay { position:fixed; inset:0; background:rgba(9,13,18,.55); z-index:130; display:none; }
.quote-overlay.open { display:block; }
.quote-panel { position:fixed; top:0; right:0; bottom:0; width:min(420px,100vw); background:var(--surface); z-index:131; transform:translateX(100%); transition:transform .2s ease; display:flex; flex-direction:column; box-shadow:-10px 0 30px -10px rgba(0,0,0,.3); }
.quote-panel.open { transform:translateX(0); }
.quote-panel-head { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.quote-panel-body { flex:1; overflow-y:auto; padding:14px 16px; }
.quote-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.quote-item img { width:52px; height:52px; object-fit:contain; background:#fff; border:1px solid var(--border); border-radius:8px; flex-shrink:0; }
.quote-item-info { flex:1; min-width:0; }
.quote-item-name { font-size:12.5px; font-weight:600; line-height:1.3; }
.quote-item-qty { display:flex; align-items:center; gap:8px; margin-top:5px; flex-wrap:wrap; }
.quote-item-qty button { width:22px; height:22px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--ink); cursor:pointer; }
.quote-item-sub { font-family:ui-monospace,monospace; font-size:12px; font-weight:700; white-space:nowrap; }
.quote-item-rm { background:none; border:none; color:#c0392b; font-size:11px; cursor:pointer; text-decoration:underline; }
.quote-total { display:flex; justify-content:space-between; padding:12px 0; font-weight:800; font-size:14px; border-top:2px solid var(--border); margin-top:6px; }
.quote-form { display:flex; flex-direction:column; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.quote-form input, .quote-form textarea { padding:9px 11px; border-radius:9px; border:1px solid var(--border); background:var(--bg); color:var(--ink); font-size:13px; font-family:inherit; }
.quote-panel-foot { padding:14px 16px; border-top:1px solid var(--border); flex-shrink:0; }
.quote-send-btn { width:100%; padding:12px; border-radius:10px; border:none; background:var(--navy-2); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; }
.quote-send-btn:disabled { opacity:.5; cursor:default; }
.quote-status { font-size:12px; margin-top:8px; text-align:center; }
.quote-empty { text-align:center; color:var(--ink-faint); font-size:13px; padding:30px 0; }
.quote-close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink-dim); line-height:1; }

.ficha-overlay { position:fixed; inset:0; background:rgba(9,13,18,.6); z-index:140; display:none; align-items:center; justify-content:center; padding:20px; }
.ficha-overlay.open { display:flex; }
.ficha-modal { background:var(--surface); border-radius:16px; max-width:520px; width:100%; max-height:86vh; overflow-y:auto; padding:22px; position:relative; }
.ficha-close { position:absolute; top:12px; right:12px; background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink-dim); }
.ficha-modal h3 { margin:0 24px 4px 0; font-size:16px; }
.ficha-marca { font-size:12px; color:var(--ink-faint); margin-bottom:10px; }
.ficha-section { margin-top:12px; }
.ficha-section h4 { font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); margin:0 0 6px; }
.ficha-section p { font-size:13.5px; margin:0; line-height:1.5; }
.ficha-section ul { margin:0; padding-left:18px; font-size:13px; line-height:1.55; }
.ficha-tags { display:flex; flex-wrap:wrap; gap:6px; }
.ficha-tag { font-size:11.5px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 10px; color:var(--ink-dim); }
</style>
<header class="top"><div class="inner">
  <div class="logo-badge"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  <div style="flex:1;"><h1>Buscador de productos</h1><p class="sub">OpenCluster Tech · para Roberto</p></div>
  <a class="pdf-btn" href="ListaPrecioDistribuidores.pdf" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>PDF</a>
</div></header>
<div class="wrap">
  <div class="search-shell">
    <div class="search-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="q" type="text" placeholder="Busca por nombre o código (ej: colchón, T012)..." autocomplete="off"></div>
    <p class="hint">Elige una familia abajo o escribe el nombre para ver todos sus productos. Toca "Agregar a cotización" para armar tu lista.</p>

    <div class="result-count" id="count"></div>
  </div>
  
  <div class="results" id="results"></div>
  <footer class="credits">1.142 productos · con foto donde está disponible</footer>
</div>
<div class="lightbox" id="lightbox">

  <img id="lightboxImg" src="" alt="">
</div>

<button class="quote-fab hidden" id="quoteFab"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Mi lista</span><b id="quoteFabCount">0</b></button>
<div class="quote-overlay" id="quoteOverlay"></div>
<div class="quote-panel" id="quotePanel">

  <div class="quote-panel-body">
    <div id="quoteBody"></div>
    <div class="quote-total" id="quoteTotal"></div>

      <input id="fDistribuidora" placeholder="Distribuidora que visitas *">
      <input id="fContacto" placeholder="Nombre de contacto">

  </div>
  <div class="quote-panel-foot">
    <button class="quote-send-btn" id="quoteSendBtn" disabled>Enviar cotización a mi correo</button>
    <div class="quote-status" id="quoteStatus"></div>
  </div>
</div>

const INTERES_API = "https://script.google.com/macros/s/AKfycbzP8Lxz3jabPra4Ugj5D3NdKYWMUxiufT842Zfdd4z02SayuHt7t7htWTE5Sq5ZFEqx/exec";
function interesConfigurado(){ return INTERES_API && INTERES_API.indexOf('PEGAR_URL') !== 0; }
async function marcarInteres(codigo, nombre, nota){
  if(!interesConfigurado()) return { ok:false, error:'no_configurado' };
  try {
    const resp = await fetch(INTERES_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ accion: 'interes_marcar', codigo, nombre, nota: nota || '' })
    });
    return await resp.json();
  } catch(err){ return { ok:false, error:String(err && err.message || err) }; }
}
async function obtenerRankingInteres(){
  if(!interesConfigurado()) return { ok:false, error:'no_configurado' };
  try {
    const resp = await fetch(INTERES_API + '?accion=interes_ranking');
    return await resp.json();
  } catch(err){ return { ok:false, error:String(err && err.message || err) }; }
}



function buildCard(p){
  const fam = FAMILIAS[p.familiaKey];
  const card=document.createElement('div'); card.className='pcard';

  const imgWrap=document.createElement('div'); imgWrap.className='pcard-img-wrap';
  if(p.img){ const img=document.createElement('img'); img.className='pcard-img'; img.src=p.img; img.loading='lazy'; img.alt=p.nombre; imgWrap.appendChild(img); }
  else { const ph=document.createElement('div'); ph.className='pcard-img-ph'; ph.style.background=fam.color+'22'; ph.textContent=fam.emoji; imgWrap.appendChild(ph); }
  const codeBadge=document.createElement('span'); codeBadge.className='pcard-code'; codeBadge.textContent=p.codigo; imgWrap.appendChild(codeBadge);
  card.appendChild(imgWrap);

  const body=document.createElement('div'); body.className='pcard-body';
  const v19 = clp(p.venta1_9); const v10 = clp(p.venta10);
  body.innerHTML =
    '<span class="pcard-eyebrow" style="color:'+fam.color+'">'+esc(fam.short.toUpperCase())+'</span>'+
    (p.proveedorReal ? '<span class="pcard-brand">'+esc(p.proveedorReal)+'</span>' : '') +
    '<div class="pcard-name">'+esc(p.nombre)+'</div>'+
    '<div class="pcard-price-label">Precio · IVA incl.</div>'+
    '<div class="pcard-price">'+(v19||'—')+'</div>'+
    (v10 && p.venta10 !== p.venta1_9 ? '<div class="pcard-price-tramo">'+v10+' desde 10 unid.</div>' : '');

  const actions=document.createElement('div'); actions.className='pcard-actions';
  if(p.ficha){
    const fichaBtn=document.createElement('button'); fichaBtn.className='pcard-ficha-btn'; fichaBtn.textContent='Ficha técnica →';
    fichaBtn.addEventListener('click', function(){ openFicha(p); });
    actions.appendChild(fichaBtn);
  }
  const addBtn=document.createElement('button'); addBtn.className='pcard-add-btn'; addBtn.dataset.addBtn = p.codigo;
  quoteRenderAddBtn(addBtn, p.codigo);
  addBtn.addEventListener('click', function(){ quoteToggle(p.codigo); });
  actions.appendChild(addBtn);
  body.appendChild(actions);
  card.appendChild(body);

  return card;
}

function quoteToggle(codigo){
  if(quoteItems[codigo]) delete quoteItems[codigo];
  else quoteItems[codigo] = 1;
  quoteSave(quoteItems);
  quoteUpdateFab();
  document.querySelectorAll('[data-add-btn="'+codigo+'"]').forEach(function(el){ quoteRenderAddBtn(el, codigo); });
}
function quoteSetQty(codigo, qty){
  quoteItems[codigo] = Math.max(1, qty);
  quoteSave(quoteItems);
  quoteRenderPanel();
}
function quoteRenderAddBtn(btn, codigo){
  const on = !!quoteItems[codigo];
  btn.classList.toggle('on', on);
  btn.innerHTML = on ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>En mi cotización</span>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Agregar a cotización</span>';
}
function quoteRenderPanel(){
  const codigos = Object.keys(quoteItems);
  quoteUpdateFab();
  if(!codigos.length){
    quoteBody.innerHTML = '<div class="quote-empty">Todavía no agregaste productos. Cierra este panel y toca "Agregar a cotización" en lo que te interese.</div>';
    quoteTotalEl.textContent = '';
    quoteSendBtn.disabled = true;
    return;
  }
  let total = 0;
  quoteBody.innerHTML = '';
  codigos.forEach(function(codigo){
    const p = productByCodigo(codigo);
    if(!p){ delete quoteItems[codigo]; return; }
    const qty = quoteItems[codigo];
    const unit = precioTramo(p, qty);
    const sub = (unit||0) * qty;
    total += sub;
    const row = document.createElement('div'); row.className = 'quote-item';
    row.innerHTML = (p.img ? '<img src="'+p.img+'" alt="">' : '') +
      '<div class="quote-item-info">' +
        '<div class="quote-item-name">'+esc(p.nombre)+'</div>' +
        '<div class="quote-item-qty">' +
          '<button data-qty-dec="'+codigo+'">-</button><span>'+qty+'</span><button data-qty-inc="'+codigo+'">+</button>' +
          '<button class="quote-item-rm" data-qty-rm="'+codigo+'">Quitar</button>' +
        '</div>' +
      '</div>' +
      '<div class="quote-item-sub">'+(clp(sub)||'—')+'</div>';
    quoteBody.appendChild(row);
  });
  quoteTotalEl.textContent = 'Total: ' + (clp(total) || '—');
  quoteSendBtn.disabled = false;
}
quoteBody.addEventListener('click', function(e){
  const inc = e.target.closest('[data-qty-inc]'); const dec = e.target.closest('[data-qty-dec]'); const rm = e.target.closest('[data-qty-rm]');
  if(inc){ quoteSetQty(inc.dataset.qtyInc, (quoteItems[inc.dataset.qtyInc]||1) + 1); }
  else if(dec){ const c=dec.dataset.qtyDec; const next=(quoteItems[c]||1)-1; if(next<=0){ delete quoteItems[c]; quoteSave(quoteItems); quoteRenderPanel(); } else quoteSetQty(c, next); }
  else if(rm){ delete quoteItems[rm.dataset.qtyRm]; quoteSave(quoteItems); quoteRenderPanel(); }
});
function quoteOpen(){ quoteRenderPanel(); quoteFillForm(); quoteOverlay.classList.add('open'); quotePanel.classList.add('open'); }
function quoteClose(){ quoteOverlay.classList.remove('open'); quotePanel.classList.remove('open'); }
quoteFab.addEventListener('click', quoteOpen);
document.getElementById('quoteCloseBtn').addEventListener('click', quoteClose);
quoteOverlay.addEventListener('click', quoteClose);

const fDistribuidora = document.getElementById('fDistribuidora');
const fContacto = document.getElementById('fContacto');
const fCorreo = document.getElementById('fCorreo');
const fTelefono = document.getElementById('fTelefono');
const fDireccion = document.getElementById('fDireccion');
const fComentario = document.getElementById('fComentario');
function quoteFillForm(){
  fDistribuidora.value = quoteClient.distribuidora || '';
  fContacto.value = quoteClient.contacto || '';
  fCorreo.value = quoteClient.correo || '';
  fTelefono.value = quoteClient.telefono || '';
  fDireccion.value = quoteClient.direccion || '';
  fComentario.value = quoteClient.comentario || '';
}
[fDistribuidora, fContacto, fCorreo, fTelefono, fDireccion, fComentario].forEach(function(el){
  el.addEventListener('input', function(){
    quoteClient = { distribuidora: fDistribuidora.value, contacto: fContacto.value, correo: fCorreo.value, telefono: fTelefono.value, direccion: fDireccion.value, comentario: fComentario.value };
    clientSave(quoteClient);
  });
});

function quoteEmailHtml(items, total){
  let rows = '';
  items.forEach(function(it){
    rows += '<tr style="border-bottom:1px solid #e5e9f0;">' +
      '<td style="padding:8px 6px;">'+esc(it.nombre)+' <div style="font-family:monospace;font-size:11px;color:#8b96a5;">'+esc(it.codigo)+'</div></td>' +
      '<td style="padding:8px 6px;text-align:center;">'+it.qty+'</td>' +
      '<td style="padding:8px 6px;text-align:right;">'+(clp(it.unit)||'—')+'</td>' +
      '<td style="padding:8px 6px;text-align:right;font-weight:700;">'+(clp(it.sub)||'—')+'</td>' +
    '</tr>';
  });
  return '<div style="font-family:Arial,sans-serif;color:#182233;max-width:600px;">' +
    '<h2 style="color:#0a2e8a;">Nueva cotización armada — '+esc(quoteClient.distribuidora||'Sin distribuidora')+'</h2>' +
    '<p><b>Distribuidora que visitas:</b> '+esc(quoteClient.distribuidora||'—')+'<br>' +
    '<b>Contacto:</b> '+esc(quoteClient.contacto||'—')+'<br>' +
    '<b>Correo contacto:</b> '+esc(quoteClient.correo||'—')+'<br>' +
    '<b>Teléfono:</b> '+esc(quoteClient.telefono||'—')+'<br>' +
    '<b>Dirección:</b> '+esc(quoteClient.direccion||'—')+'</p>' +
    (quoteClient.comentario ? '<p><b>Comentario:</b> '+esc(quoteClient.comentario)+'</p>' : '') +
    '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;">' +
    '<thead><tr style="background:#eef1f5;text-align:left;"><th style="padding:8px 6px;">Producto</th><th style="padding:8px 6px;">Cant.</th><th style="padding:8px 6px;text-align:right;">Precio unit.</th><th style="padding:8px 6px;text-align:right;">Subtotal</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table>' +
    '<p style="text-align:right;font-size:15px;font-weight:800;margin-top:10px;">Total: '+(clp(total)||'—')+'</p>' +
    '<p style="font-size:11.5px;color:#8b96a5;margin-top:16px;">Envío no incluido. Precios con IVA incluido, sujetos a stock. Generado desde el Buscador de productos de OpenCluster Tech.</p>' +
  '</div>';
}
quoteSendBtn.addEventListener('click', function(){
  if(!fDistribuidora.value.trim()){ quoteStatus.style.color = '#c0392b'; quoteStatus.textContent = 'Falta el nombre de la distribuidora.'; fDistribuidora.focus(); return; }
  const codigos = Object.keys(quoteItems);
  if(!codigos.length) return;
  const items = codigos.map(function(codigo){
    const p = productByCodigo(codigo); const qty = quoteItems[codigo]; const unit = precioTramo(p, qty);
    return { codigo: codigo, nombre: p.nombre, qty: qty, unit: unit, sub: (unit||0)*qty };
  });
  const total = items.reduce(function(a,it){ return a + it.sub; }, 0);
  quoteSendBtn.disabled = true;
  quoteStatus.style.color = '#5b6779';
  quoteStatus.textContent = 'Enviando...';
  const payload = {
    accion: 'cotizacion_enviar',
    distribuidora: quoteClient.distribuidora || '',
    contacto: quoteClient.contacto || '',
    correoContacto: quoteClient.correo || '',
    telefono: quoteClient.telefono || '',
    direccion: quoteClient.direccion || '',
    comentario: quoteClient.comentario || '',
    items: items,
    total: total,
    emailHtml: quoteEmailHtml(items, total)
  };
  fetch(INTERES_API, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if(r && r.ok){
        quoteStatus.style.color = '#2f8f5b';
        quoteStatus.textContent = 'Cotización enviada a tu correo.';
        quoteItems = {}; quoteSave(quoteItems); quoteRenderPanel();
      } else {
        quoteStatus.style.color = '#c0392b';
        quoteStatus.textContent = 'No se pudo enviar, intenta de nuevo.';
      }
    })
    .catch(function(){
      quoteStatus.style.color = '#c0392b';
      quoteStatus.textContent = 'No se pudo enviar, intenta de nuevo.';
    })
    .finally(function(){ quoteSendBtn.disabled = false; });
});
quoteUpdateFab();

const fichaModalBody = document.getElementById('fichaModalBody');

    '<h3>'+esc(p.nombre)+'</h3>' +

function closeFicha(){ fichaOverlay.classList.remove('open'); }
fichaOverlay.addEventListener('click', function(e){ if(e.target===fichaOverlay) closeFicha(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeFicha(); quoteClose(); } });


const PAGE_SIZE = 60;
let currentList = [];
let shown = 0;
const sentinel = document.createElement('div');
sentinel.id = 'loadMoreSentinel';
sentinel.style.height = '1px';
sentinel.style.visibility = 'hidden';
const loadMoreObserver = new IntersectionObserver((entries) => {
  if(entries[0].isIntersecting) renderMore();
}, { rootMargin: '400px' });

function renderMore(){
  const next = currentList.slice(shown, shown + PAGE_SIZE);
  if(!next.length) return;
  const frag=document.createDocumentFragment();
  next.forEach(p=>frag.appendChild(buildCard(p)));
  resultsEl.insertBefore(frag, sentinel);
  shown += next.length;
  if(shown >= currentList.length){ loadMoreObserver.unobserve(sentinel); sentinel.style.display='none'; }
  else { sentinel.style.display=''; }
}

function render(list){
  loadMoreObserver.unobserve(sentinel);
  resultsEl.innerHTML='';
  currentList = list;
  shown = 0;
  if(!list.length){resultsEl.innerHTML='<div class="empty">Sin resultados. Prueba con otra palabra, familia o código.</div>';countEl.textContent='';return;}
  countEl.textContent = list.length + (list.length===DATA.length ? ' productos en total' : ' resultado' + (list.length===1?'':'s'));
  resultsEl.appendChild(sentinel);
  renderMore();
  loadMoreObserver.observe(sentinel);
}
function matches(p, nq){
  if(!nq) return true;
  return normalize(p.nombre).includes(nq) || normalize(p.codigo).includes(nq) || normalize(FAMILIAS[p.familiaKey].label).includes(nq) || normalize(p.proveedorReal||'').includes(nq) || normalize(p.skuReal||'').includes(nq);
}
function applyFilters(){
  const nq = normalize(input.value.trim());
  render(DATA.filter(p => (!activeFam || p.familiaKey===activeFam) && matches(p, nq)));
}
input.addEventListener('input', applyFilters);
chipsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.chip');
  if(!btn) return;
  activeFam = btn.dataset.fam;
  [...chipsEl.children].forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
});
render(DATA);
countEl.textContent = DATA.length + ' productos en total';


</script>
