<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#1a2027;--muted:#5c6773;--line:#e3e7ec;--accent:#0d6efd;--ok:#15803d;--okbg:#dcfce7;--add:#b45309;--addbg:#fef3c7;--ph:#eef1f5}
@media(prefers-color-scheme:dark){:root{--bg:#0f1318;--card:#171c22;--ink:#e7ecf2;--muted:#9aa6b2;--line:#2a323b;--accent:#5aa2ff;--ok:#4ade80;--okbg:#14331f;--add:#fbbf24;--addbg:#2a2013;--ph:#222a33}}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:940px;margin:0 auto;padding:16px 14px 96px}
h1{font-size:20px;margin:0 0 6px}
.intro{color:var(--muted);font-size:13.5px;margin-bottom:12px}
.bar{position:sticky;top:0;background:var(--bg);padding:10px 0;border-bottom:1px solid var(--line);z-index:5;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.prog{font-weight:700}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer}
.btn.main{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin:14px 0}
.web{display:flex;gap:12px;align-items:flex-start;border-bottom:1px dashed var(--line);padding-bottom:12px;margin-bottom:10px}
.thumb{width:74px;height:74px;flex:0 0 74px;border-radius:8px;background:var(--ph);object-fit:contain;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--muted);overflow:hidden}
img.thumb{object-fit:contain}
.webname{font-weight:700;font-size:15px}
.tag{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--accent);border-radius:5px;padding:1px 7px;margin-bottom:4px}
.ficha{color:var(--muted);font-size:12px;margin-top:5px;max-height:48px;overflow:hidden}
.q{color:var(--muted);font-size:13px;margin:2px 0 6px;font-weight:600}
.cand{display:flex;gap:10px;align-items:center;width:100%;text-align:left;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:9px;padding:8px 10px;margin-bottom:6px;cursor:pointer;font-size:13.5px}
.cand:hover{border-color:var(--accent)}
.cand.sel{background:var(--okbg);border-color:var(--ok)}
.cand .cn{font-weight:600}
.sku{color:var(--muted);font-size:11.5px}
.none{color:var(--add);justify-content:center;font-weight:600}
.none.sel{background:var(--addbg);border-color:var(--add)}
.done{font-size:12.5px;font-weight:700;margin-top:6px}
.done.u{color:var(--ok)} .done.a{color:var(--add)}
.foot{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}

function upd(){const t=DATA.length,d=Object.keys(dec).length;document.getElementById("prog").textContent=d+" / "+t+" decididos";document.getElementById("prog2").textContent=d+" / "+t;}

});
list.addEventListener("click",function(e){

 else{const c=(DATA[i].cand||[]).find(x=>x.fila==fila);dec[DATA[i].web]={tipo:"UNIFICAR",fila:+fila,lista:c?c.nombre:""};done.className="done u";done.textContent="Marcado: es el mismo → unificar (fila "+fila+")";}
 upd();
});
